                    style={{width:'100%',justifyContent:'center',gap:6,marginBottom:8}}
                    onClick={() => setShowAddForm(true)}
                  >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Contact Manually
                  </button>
                ) : (
                  <div style={{background:'var(--surf-2)',border:'1px solid var(--border)',borderRadius:14,padding:'18px 20px',marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:14}}>Add Contact</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                      <div>
                        <label className="field-label">Name</label>
                        <input className="form-input" placeholder="Jane Smith" value={newContact.name}
                          onChange={e=>setNewContact(p=>({...p,name:e.target.value}))}/>
                      </div>
                      <div>
                        <label className="field-label">Title</label>
                        <input className="form-input" placeholder="VP of Revenue Operations" value={newContact.title}
                          onChange={e=>setNewContact(p=>({...p,title:e.target.value}))}/>
                      </div>
                      <div>
                        <label className="field-label">Role in Deal</label>
                        <select className="select" value={newContact.role} onChange={e=>setNewContact(p=>({...p,role:e.target.value}))}>
                          <option>Champion</option>
                          <option>Economic Buyer</option>
                          <option>Technical</option>
                          <option>Influencer</option>
                          <option>Blocker</option>
                        </select>
                      </div>
                      <div>
                        <label className="field-label">Email <span style={{color:'var(--tfaint)',fontWeight:400}}>— optional</span></label>
                        <input className="form-input" placeholder="jane@company.com" value={newContact.email}
                          onChange={e=>setNewContact(p=>({...p,email:e.target.value}))}/>
                      </div>
                    </div>
                    <div style={{marginBottom:14}}>
                      <label className="field-label">LinkedIn / Notes <span style={{color:'rgba(184,134,11,0.5)',fontWeight:400}}>— optional, helps AI enrich</span></label>
                      <textarea className="context-textarea" rows={3}
                        placeholder="Paste LinkedIn About section, bio, or any notes about this person…"
                        value={newContact.notes} onChange={e=>setNewContact(p=>({...p,notes:e.target.value}))}/>
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                      <button className="btn-secondary" style={{fontSize:12}} onClick={()=>{setShowAddForm(false);setNewContact({name:'',title:'',role:'Champion',email:'',notes:''});}}>
                        Cancel
                      </button>
                      <div style={{display:'flex',gap:8}}>
                        <button className="btn-secondary" style={{fontSize:12}} onClick={()=>addContact(false)}
                          disabled={!newContact.name.trim() && !newContact.title.trim()}>
                          Add Without Enrichment
                        </button>
                        <button className="btn-primary" style={{fontSize:12}} onClick={()=>addContact(true)}
                          disabled={enriching || (!newContact.name.trim() && !newContact.title.trim())}>
                          {enriching ? <><IconSpinner size={12}/>&nbsp;Enriching…</> : <><IconBolt size={12}/>&nbsp;Add + Enrich with AI</>}
                        </button>
                      </div>
                    </div>
                    {enriching && (
                      <div style={{marginTop:10,fontSize:12,color:'var(--tmuted)',textAlign:'center'}}>
                        AI is enriching this contact with background, talking points, and conversation starters…
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Bottom nav bar */}
              <div className="activation-bar" style={{marginTop:24}}>
                <div className="activation-inner">
                  <div className="activation-count">
                    <span>{accounts.filter(a=>contactData[a.name]&&contactData[a.name].length>0).length}</span> of {accounts.length} account{accounts.length!==1?'s':''} researched
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn-secondary" onClick={onBack}>← Module 3</button>
                    <button className="btn-primary" disabled={!hasContacts} onClick={onContinue} style={!hasContacts?{opacity:0.5,cursor:'not-allowed'}:{}}>
                      Continue to Module 5 →
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <ChatPanel
              open={chatOpen}
              onClose={() => setChatOpen(false)}
              account={account}
              pov={povForChat}
              currentModule={4}
              model={model}
            />
          </div>
          <AssistantFAB chatOpen={chatOpen} onClick={() => setChatOpen(o => !o)} />
        </div>
      );
    }

    // ── Module 5 — Sequence Builder ───────────────────────────────

    function sequenceToText(steps, accountName) {
      const lines = [`OUTREACH SEQUENCE — ${accountName}`, '='.repeat(60), ''];
      steps.forEach(s => {
        lines.push(`STEP ${s.step} | Day ${s.day} | ${s.channel} | ${s.type}`);
        lines.push(`Contact: ${s.contact_role}`);
        if (s.subject) lines.push(`Subject: ${s.subject}`);
        lines.push(`Action: ${s.action}`);
        lines.push('');
        lines.push(s.message || '');
        if (s.timing_note) lines.push(`\nTiming: ${s.timing_note}`);
        lines.push('', '-'.repeat(60), '');
      });
      return lines.join('\n');
    }

    function CopyBtn({ text, label }) {
      const [msg, setMsg] = useState('');
      function doCopy() {
        navigator.clipboard.writeText(text).then(() => {
          setMsg('Copied!');
          setTimeout(() => setMsg(''), 2000);
        }).catch(() => { setMsg('Failed'); setTimeout(() => setMsg(''), 2000); });
      }
      return (
        <button onClick={doCopy} style={{
          background:'none', border:'1px solid var(--border)', borderRadius:6,
          color: msg ? 'var(--green)' : 'var(--tmuted)', fontSize:11, fontWeight:600,
          padding:'3px 10px', cursor:'pointer', whiteSpace:'nowrap', transition:'color 0.2s',
        }}>{msg || label}</button>
      );
    }

    function SequenceStepCard({ step, onEdit }) {
      const [expanded, setExpanded] = useState(false);
      const [editingSubject, setEditingSubject] = useState(false);
      const [editingMessage, setEditingMessage] = useState(false);
      const [subjectDraft, setSubjectDraft]     = useState(step.subject || '');
      const [messageDraft, setMessageDraft]     = useState(step.message || '');
      function saveField(field, value) {
        if (onEdit) onEdit(field, value);
      }

      const channelColors = {
        'Email':        { bg: 'var(--amber-muted)',  color: 'var(--amber)'  },
        'Phone':        { bg: 'var(--amber-muted)',     color: 'var(--amber)'    },
        'LinkedIn':     { bg: 'rgba(0,119,181,0.15)', color: '#0077b5'      },
        'Email+Phone':  { bg: 'rgba(255,255,255,0.08)', color: 'var(--text)'},
      };
      const ch = channelColors[step.channel] || { bg: 'var(--tfaint)', color: 'var(--tmuted)' };

      return (
        <div style={{
          background:'var(--surf-2)', border:'1px solid var(--border)',
          borderRadius:14, marginBottom:10, overflow:'hidden', transition:'border-color 0.2s',
        }}>
          {/* Header row */}
          <div
            style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',cursor:'pointer'}}
            onClick={() => setExpanded(e => !e)}
          >
            {/* Step badge */}
            <div style={{
              width:32, height:32, borderRadius:'50%', flexShrink:0,
              background:'var(--amber)', display:'flex', alignItems:'center',
              justifyContent:'center', fontSize:13, fontWeight:700, color:'white',
            }}>{step.step}</div>

            {/* Day badge */}
            <div style={{
              fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:20,
              background:'var(--surf)', color:'var(--tmuted)',
              border:'1px solid var(--border)', flexShrink:0,
            }}>Day {step.day}</div>

            {/* Channel badge */}
            <div style={{
              fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:20,
              background:ch.bg, color:ch.color, flexShrink:0,
            }}>{step.channel}</div>

            <div style={{flex:1, minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{fontSize:12,fontWeight:600,color:'var(--tmuted)',textTransform:'uppercase',letterSpacing:'0.06em'}}>{step.type}</span>
                {step.contact_name && (
                  <span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:10,background:'var(--amber-muted)',color:'var(--amber)'}}>→ {step.contact_name}</span>
                )}
                {step.contact_role && !step.contact_name && (
                  <span style={{fontSize:11,color:'var(--tfaint)',fontStyle:'italic'}}>→ {step.contact_role}</span>
                )}
              </div>
              {step.subject && (
                <div style={{fontSize:12,color:'var(--text)',fontStyle:'italic',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.subject}</div>
              )}
              <div style={{fontSize:13,color:'var(--text)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.action}</div>
            </div>

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tmuted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
              style={{transform:expanded?'rotate(180deg)':'none',transition:'transform 0.2s',flexShrink:0}}>
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>

          {/* Expanded body */}
          {expanded && (
            <div style={{padding:'0 18px 18px',borderTop:'1px solid var(--border)'}}>
              {(step.subject || subjectDraft) && (
                <div style={{marginTop:14}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--amber)'}}>Subject Line</div>
                    <div style={{display:'flex',gap:8}}>
                      <CopyBtn text={subjectDraft} label="⎘ Copy"/>
                      <button onClick={()=>setEditingSubject(e=>!e)} style={{background:'none',border:'none',color:'var(--tmuted)',fontSize:11,cursor:'pointer',fontFamily:'var(--f-ui)'}}>
                        {editingSubject ? 'Done' : '✎ Edit'}
                      </button>
                    </div>
                  </div>
                  {editingSubject ? (
                    <input value={subjectDraft} onChange={e=>setSubjectDraft(e.target.value)}
                      onBlur={()=>{ saveField('subject', subjectDraft); setEditingSubject(false); }}
                      style={{width:'100%',background:'var(--surf)',border:'1px solid var(--amber)',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--text)',fontFamily:'var(--f-ui)',boxSizing:'border-box'}}
                      autoFocus/>
                  ) : (
                    <div style={{fontSize:13,color:'var(--text)',fontStyle:'italic',background:'var(--surf)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>{subjectDraft}</div>
                  )}
                </div>
              )}
              {(step.message || messageDraft) && (
                <div style={{marginTop:14}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                    <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--amber)'}}>
                      {step.channel === 'Phone' ? 'Talk Track' : 'Message'}
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <CopyBtn text={subjectDraft ? `Subject: ${subjectDraft}\n\n${messageDraft}` : messageDraft} label={subjectDraft ? '⎘ Copy Subject + Body' : '⎘ Copy'}/>
                      <button onClick={()=>setEditingMessage(e=>!e)} style={{background:'none',border:'none',color:'var(--tmuted)',fontSize:11,cursor:'pointer',fontFamily:'var(--f-ui)'}}>
                        {editingMessage ? 'Done' : '✎ Edit'}
                      </button>
                    </div>
                  </div>
                  {editingMessage ? (
                    <textarea value={messageDraft} onChange={e=>setMessageDraft(e.target.value)}
                      onBlur={()=>{ saveField('message', messageDraft); setEditingMessage(false); }}
                      style={{width:'100%',minHeight:200,background:'var(--surf)',border:'1px solid var(--amber)',borderRadius:10,padding:'14px 16px',fontSize:13,color:'var(--text)',fontFamily:'var(--f-ui)',lineHeight:1.7,resize:'vertical',boxSizing:'border-box'}}
                      autoFocus/>
                  ) : (
                    <pre style={{fontFamily:'var(--f-ui)',fontSize:13,color:'var(--tmuted)',lineHeight:1.7,whiteSpace:'pre-wrap',wordBreak:'break-word',background:'var(--surf)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px',margin:0}}>{messageDraft}</pre>
                  )}
                </div>
              )}
              {step.timing_note && (
                <div style={{marginTop:12,padding:'10px 14px',background:'var(--amber-muted)',border:'1px solid rgba(251,191,36,0.2)',borderRadius:8}}>
                  <span style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'var(--amber)',marginRight:8}}>Timing</span>
                  <span style={{fontSize:12,color:'var(--tmuted)'}}>{step.timing_note}</span>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function Module5({ territory, model, onBack, onContinue }) {

      const repProfile = (() => { try { return JSON.parse(localStorage.getItem('conga_rep_profile')||'{}'); } catch { return {}; } })();
      const repSig = [repProfile.name, repProfile.title, repProfile.phone, repProfile.linkedin].filter(Boolean).join(' | ');

      const loadAccounts = () => {
        try {
          const d = JSON.parse(localStorage.getItem('conga_activated_data') || '[]');
          if (d.length > 0) return d;
          const names = JSON.parse(localStorage.getItem('conga_activated') || '[]');
          const results = JSON.parse(localStorage.getItem('conga_m2_results') || '[]');
          const norm = s => (s||'').toLowerCase().trim().replace(/[.,]/g,'');
          return results.filter(r => names.map(norm).includes(norm(r.name)));
        } catch { return []; }
      };
      const accounts = loadAccounts();
      const getScore = a => a.combined_score || a.icp_score || a.score || null;
      const getSignals = a => a.buying_signals || a.signals || [];

      const [activeIdx, setActiveIdx]   = useState(0);
      const [chatOpen, setChatOpen]     = useState(false);
      const [generating, setGenerating] = useState(false);
      const [genError, setGenError]     = useState(null);
      const [copyMsg, setCopyMsg]       = useState('');

      // Contact selector state
      const loadM4Contacts = (acctName) => {
        try { return JSON.parse(localStorage.getItem(`conga_contacts_${acctName}`) || 'null') || []; } catch { return []; }
      };
      const [selectedContacts, setSelectedContacts] = useState(() => loadM4Contacts(accounts[0]?.name || ''));
      const [customContacts, setCustomContacts]     = useState([]);
      const [showAddForm, setShowAddForm]           = useState(false);
      const [addingParse, setAddingParse]           = useState(false);
      const [newContact, setNewContact]             = useState({ name:'', title:'', email:'', linkedinUrl:'', notes:'' });

      // When account changes, reload M4 contacts and reset custom contacts
      useEffect(() => {
        const m4 = loadM4Contacts(account?.name || '');
        setSelectedContacts(m4);
        setCustomContacts([]);
        setShowAddForm(false);
        setNewContact({ name:'', title:'', email:'', linkedinUrl:'', notes:'' });
      }, [activeIdx]);

      // seqData: { [accountName]: Step[] }
      const [seqData, setSeqData] = useState(() => {
        const out = {};
        accounts.forEach(a => {
          try { out[a.name] = JSON.parse(localStorage.getItem(`conga_seq_${a.name}`) || 'null') || null; } catch { out[a.name] = null; }
        });
        return out;
      });

      const account  = accounts[activeIdx];
      const steps    = account ? (seqData[account.name] || null) : null;
      const hasSteps = steps && steps.length > 0;

      function exportSequenceCSV() {
        const rows = [];
        accounts.forEach(acct => {
          const steps = seqData[acct.name];
          if (!steps) return;
          steps.forEach(step => {
            rows.push({
              'Account Name': acct.name,
              'Step':         step.step,
              'Day':          step.day,
              'Type':         step.channel || step.type || '',
              'Subject':      step.subject || '',
              'Body':         step.message || '',
              'Contact Name': step.contact_name || '',
              'Contact Role': step.contact_role || '',
              'Action':       step.action || '',
              'Timing Note':  step.timing_note || '',
            });
          });
        });
        if (!rows.length) return;
        const ws = XLSX.utils.json_to_sheet(rows);
        ws['!cols'] = Object.keys(rows[0]).map(k => ({ wch: Math.max(k.length, k==='Body'||k==='Subject'?40:18) }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Sequences');
        XLSX.writeFile(wb, `Conga_Sequences_${new Date().toISOString().slice(0,10)}.xlsx`);
      }

      function saveSeq(accountName, data) {
        setSeqData(prev => {
          const next = { ...prev, [accountName]: data };
          localStorage.setItem(`conga_seq_${accountName}`, JSON.stringify(data));
          return next;
        });
      }

      async function generateSequence() {
        if (!account) return;
        setGenerating(true);
        setGenError(null);

        const pov = (() => { try { return JSON.parse(localStorage.getItem(`conga_pov_${account.name}`) || 'null'); } catch { return null; } })();
        const sigArr = getSignals(account);
        const signals = Array.isArray(sigArr) ? sigArr.join('; ') : (sigArr || 'none noted');
        const score = getScore(account) || 'N/A';
        const productFocus = territory?.product || account.recommended_product || 'All Products';

        const allContacts = [...selectedContacts, ...customContacts];
        const contactSummary = allContacts.length > 0
          ? allContacts.map(c => {
              const parts = [c.name, c.title, c.role ? `(${c.role})` : null, c.email ? `email: ${c.email}` : null, c.linkedinUrl ? `LinkedIn: ${c.linkedinUrl}` : null, c.notes ? `Background: ${c.notes}` : c.background ? `Background: ${c.background}` : null, c.pain_points ? `Pain points: ${Array.isArray(c.pain_points) ? c.pain_points.join(', ') : c.pain_points}` : null];
              return parts.filter(Boolean).join(' | ');
            }).join('\n')
          : 'Not yet researched — generate generic sequence';

        const prompt = `Generate a 10-step outreach sequence for ${account.name}.
Use the account context, POV, and contacts below. Where specific contacts are provided, address messages TO them by name.

ACCOUNT: ${account.name} | ${account.industry || 'Unknown'} | ICP ${score}/10
POV SUMMARY: ${pov?.executive_summary || 'See buying signals below'}
BUYING SIGNALS: ${signals}
PRODUCT FOCUS: ${productFocus}

CONTACTS TO SEQUENCE (write to these specific people):
${contactSummary}

REP SIGNATURE (sign off every email with this):
${repSig || 'Rep name/details not set — leave signature placeholder'}

Return ONLY a raw JSON array of exactly 10 steps. Do NOT wrap in markdown code blocks. Start your response with [ and end with ]:
[
  {
    "step": 1,
    "day": 1,
    "channel": "Email|Phone|LinkedIn|Email+Phone",
    "type": "Cold Outreach|Follow-Up|Value Add|Meeting Ask|Break-Up",
    "subject": "Email subject line (if email)",
    "contact_name": "Specific person this step targets (use their real name from the contacts above)",
    "contact_role": "Economic Buyer|Champion|Technical|All",
    "action": "Short description of the action to take",
    "message": "Full message/script (email body, call talk track, or LinkedIn message) — address the person by their first name",
    "timing_note": "Best time/day to reach out"
  }
]
Make messages specific to ${account.name}, their industry, and the Conga/PROS value prop. Address contacts by first name. No generic templates.`;

        try {
          const raw = await callClaude(model, BASE_ICP_CONTEXT, prompt, 10000);
          const parsed = extractJSON(raw);
          if (!Array.isArray(parsed)) throw new Error('Unexpected format — please try again.');
          saveSeq(account.name, parsed);
        } catch(e) {
          setGenError(`Generation failed: ${e.message}`);
        } finally {
          setGenerating(false);
        }
      }

      async function parseContactFromText() {
        if (!newContact.notes.trim() && !newContact.name.trim()) return;
        setAddingParse(true);
        try {
          const prompt = `Extract structured contact info from this text. Return ONLY a raw JSON object (no markdown):
{"name":"","title":"","email":"","linkedinUrl":"","department":"","role":"Champion|Economic Buyer|Technical|End User","notes":"1-2 sentence summary of their background and relevance"}

TEXT TO PARSE:
${newContact.notes || ''}
${newContact.name ? 'Provided name: ' + newContact.name : ''}
${newContact.title ? 'Provided title: ' + newContact.title : ''}
${newContact.email ? 'Provided email: ' + newContact.email : ''}
${newContact.linkedinUrl ? 'LinkedIn: ' + newContact.linkedinUrl : ''}`;
          const raw = await callClaude(model, BASE_ICP_CONTEXT, prompt, 1000);
          const parsed = extractJSON(raw);
          const contact = { ...parsed, name: parsed.name || newContact.name, title: parsed.title || newContact.title, email: parsed.email || newContact.email, linkedinUrl: parsed.linkedinUrl || newContact.linkedinUrl };
          setCustomContacts(prev => [...prev, contact]);
          setSelectedContacts(prev => [...prev, contact]);
          setNewContact({ name:'', title:'', email:'', linkedinUrl:'', notes:'' });
          setShowAddForm(false);
        } catch(e) {
          // Fallback: just add as-is
          const contact = { name: newContact.name, title: newContact.title, email: newContact.email, linkedinUrl: newContact.linkedinUrl, notes: newContact.notes, role: 'Champion' };
          setCustomContacts(prev => [...prev, contact]);
          setSelectedContacts(prev => [...prev, contact]);
          setNewContact({ name:'', title:'', email:'', linkedinUrl:'', notes:'' });
          setShowAddForm(false);
        } finally {
          setAddingParse(false);
        }
      }

      function addManualContact() {
        if (!newContact.name.trim()) return;
        const contact = { name: newContact.name, title: newContact.title, email: newContact.email, linkedinUrl: newContact.linkedinUrl, notes: newContact.notes, role: 'Champion' };
        setCustomContacts(prev => [...prev, contact]);
        setSelectedContacts(prev => [...prev, contact]);
        setNewContact({ name:'', title:'', email:'', linkedinUrl:'', notes:'' });
        setShowAddForm(false);
      }

      function toggleContact(c) {
        setSelectedContacts(prev => {
          const isSelected = prev.some(x => x.name === c.name);
          return isSelected ? prev.filter(x => x.name !== c.name) : [...prev, c];
        });
      }

      function removeCustomContact(c) {
        setCustomContacts(prev => prev.filter(x => x.name !== c.name));
        setSelectedContacts(prev => prev.filter(x => x.name !== c.name));
      }

      function copyAll() {
        if (!steps || !account) return;
        const text = sequenceToText(steps, account.name);
        navigator.clipboard.writeText(text).then(() => {
          setCopyMsg('Copied!');
          setTimeout(() => setCopyMsg(''), 2000);
        }).catch(() => setCopyMsg('Copy failed'));
      }

      if (!account) {
        return (
          <div className="m3-outer">
            <div className="m3-wrap">
              <div className="m3-main">
                <div className="m3-empty">
                  <div className="m3-empty-title">No Accounts Selected</div>
                  <div className="m3-empty-sub">Go back to Module 2 and select accounts for outreach first.</div>
                  <button className="btn-secondary" style={{marginTop:24}} onClick={onBack}>← Module 4</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const povForChat = (() => { try { return JSON.parse(localStorage.getItem(`conga_pov_${account.name}`) || 'null'); } catch { return null; } })();
      const builtCount = accounts.filter(a => seqData[a.name] && seqData[a.name].length > 0).length;

      return (
        <div className="m3-outer">
          <div className={`m3-wrap ${chatOpen ? 'chat-open' : ''}`}>
            <div className="m3-main">

              <div className="phase-label">Module 5 of 6 — Sequence Builder</div>
              <h1 className="module-title">Sequence Builder</h1>
              <p className="module-sub">Generate a personalized 10-step outreach sequence for each account — tailored to their POV, contacts, and buying signals.</p>

              {/* Account selector */}
              <div className="acct-selector">
                <button className="acct-nav-btn" disabled={activeIdx===0} onClick={()=>setActiveIdx(i=>i-1)}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div style={{flex:1,position:'relative'}}>
                  <select className="acct-select" value={activeIdx} onChange={e=>{setActiveIdx(Number(e.target.value));setChatOpen(false);}}>
                    {accounts.map((acc,i)=>{
                      const hasS = !!(seqData[acc.name] && seqData[acc.name].length > 0);
                      return <option key={acc.name} value={i}>{hasS?'● ':'○ '}{acc.name}  (ICP {getScore(acc)||'—'}/10)</option>;
                    })}
                  </select>
                  <div className="acct-counter">{activeIdx+1} of {accounts.length}</div>
                </div>
                <button className="acct-nav-btn" disabled={activeIdx===accounts.length-1} onClick={()=>setActiveIdx(i=>i+1)}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
              </div>

              {/* Account summary */}
              <div className="card" style={{marginBottom:20}}>
                <div className="card-header">
                  <div className="card-icon">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                  </div>
                  <div>
                    <div className="card-title">{account.name}</div>
                    <div className="card-subtitle">{[account.industry, account.revenue ? fmtRevenue(account.revenue) : null, account.state].filter(Boolean).join(' · ')}</div>
                  </div>
                  {getScore(account) && (
                    <span style={{marginLeft:'auto',fontSize:13,fontWeight:700,padding:'4px 12px',borderRadius:20,background:'var(--amber-muted)',color:'var(--amber)'}}>
                      ICP {getScore(account)}/10
                    </span>
                  )}
                </div>
                {getSignals(account).length > 0 && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:6,paddingTop:4}}>
                    {getSignals(account).map((s,i)=>(
                      <span key={i} style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:'var(--amber-muted)',color:'var(--amber)',fontWeight:500}}>{s}</span>
                    ))}
                  </div>
                )}
              </div>

              {/* Contact Selector */}
              {(() => {
                const m4Contacts = loadM4Contacts(account.name);
                const allAvailable = [...m4Contacts, ...customContacts];
                return (
                  <div className="card" style={{marginBottom:20}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                      <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>
                        Sequence Targets
                        {selectedContacts.length > 0 && (
                          <span style={{marginLeft:8,fontSize:12,fontWeight:500,padding:'2px 8px',borderRadius:12,background:'var(--amber-muted)',color:'var(--amber)'}}>
                            {selectedContacts.length} selected
                          </span>
                        )}
                      </div>
                      <button className="btn-secondary" style={{fontSize:12,padding:'5px 12px'}} onClick={() => setShowAddForm(f=>!f)}>
                        {showAddForm ? '✕ Cancel' : '+ Add Contact'}
                      </button>
                    </div>

                    {allAvailable.length === 0 && !showAddForm && (
                      <div style={{fontSize:13,color:'var(--tmuted)',padding:'8px 0'}}>
                        No contacts from Module 4. Add contacts manually or run Contact Research first.
                      </div>
                    )}

                    {allAvailable.map((c, i) => {
                      const isSelected = selectedContacts.some(x => x.name === c.name);
                      const isCustom = customContacts.some(x => x.name === c.name);
                      return (
                        <div key={c.name + i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 0',borderBottom:'1px solid var(--surf)'}}>
                          <input type="checkbox" checked={isSelected} onChange={() => toggleContact(c)}
                            style={{marginTop:3,accentColor:'var(--amber)',width:15,height:15,flexShrink:0,cursor:'pointer'}}/>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>{c.name}
                              {isCustom && <span style={{marginLeft:6,fontSize:10,padding:'1px 6px',borderRadius:8,background:'rgba(74,222,128,0.15)',color:'var(--green)'}}>custom</span>}
                            </div>
                            <div style={{fontSize:12,color:'var(--tmuted)'}}>{[c.title, c.role, c.department].filter(Boolean).join(' · ')}</div>
                            {c.email && <div style={{fontSize:11,color:'var(--amber)',marginTop:2}}>{c.email}</div>}
                            {c.linkedinUrl && <div style={{fontSize:11,marginTop:1}}><a href={c.linkedinUrl} target="_blank" rel="noopener" style={{color:'var(--amber)'}}>{c.linkedinUrl}</a></div>}
                            {(c.notes || c.background) && <div style={{fontSize:11,color:'var(--tmuted)',marginTop:4,fontStyle:'italic'}}>{c.notes || c.background}</div>}
                          </div>
                          {isCustom && (
                            <button onClick={() => removeCustomContact(c)} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:16,padding:'0 4px',opacity:0.7}}>✕</button>
                          )}
                        </div>
                      );
                    })}

                    {showAddForm && (
                      <div style={{marginTop:16,padding:16,background:'var(--surf)',borderRadius:10,display:'flex',flexDirection:'column',gap:10}}>
                        <div style={{fontWeight:600,fontSize:13,color:'var(--text)',marginBottom:4}}>Add Contact</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                          <input className="settings-input" placeholder="Full Name *" value={newContact.name} onChange={e=>setNewContact(p=>({...p,name:e.target.value}))}/>
                          <input className="settings-input" placeholder="Title / Role" value={newContact.title} onChange={e=>setNewContact(p=>({...p,title:e.target.value}))}/>
                          <input className="settings-input" placeholder="Email" value={newContact.email} onChange={e=>setNewContact(p=>({...p,email:e.target.value}))}/>
                          <input className="settings-input" placeholder="LinkedIn URL" value={newContact.linkedinUrl} onChange={e=>setNewContact(p=>({...p,linkedinUrl:e.target.value}))}/>
                        </div>
                        <textarea className="settings-input" placeholder="Paste their LinkedIn About section, bio, or any background info — AI will parse it automatically..." value={newContact.notes} onChange={e=>setNewContact(p=>({...p,notes:e.target.value}))} style={{minHeight:90,resize:'vertical',fontFamily:'inherit',fontSize:13}}/>
                        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                          <button className="btn-secondary" style={{fontSize:12,padding:'6px 14px'}} onClick={addManualContact} disabled={!newContact.name.trim()}>
                            Add Without Parsing
                          </button>
                          <button className="btn-primary" style={{fontSize:12,padding:'6px 14px'}} onClick={parseContactFromText} disabled={addingParse || (!newContact.name.trim() && !newContact.notes.trim())}>
                            {addingParse ? <><IconSpinner size={12}/>&nbsp;Parsing…</> : <><IconBolt size={12}/>&nbsp;Parse with AI</>}
                          </button>
                        </div>
                        <div style={{fontSize:11,color:'var(--tmuted)'}}>💡 Tip: paste their full LinkedIn profile text or About section and AI will extract name, title, background, and role automatically.</div>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Generate / action row */}
              {generating && (
                <div className="pov-generating">
                  <IconSpinner size={18}/>
                  <span>Building sequence for <strong style={{color:'var(--text)'}}>{account.name}</strong>… 15–30 seconds.</span>
                </div>
              )}
              {genError && <div className="error-box" style={{marginBottom:16}}>{genError}</div>}

              <div className="action-row" style={{marginBottom:24}}>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn-secondary" onClick={onBack}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:4}}><polyline points="15 18 9 12 15 6"/></svg>
                    Module 4
                  </button>
                  {hasSteps && (
                    <button className="btn-secondary" onClick={onContinue}>
                      Module 6
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:4}}><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                  )}
                  {hasSteps && (
                    <button className="btn-secondary" onClick={copyAll}>
                      {copyMsg || '⎘ Copy All Steps'}
                    </button>
                  )}
                  {Object.values(seqData).some(s=>s&&s.length) && (
                    <button className="btn-secondary" onClick={exportSequenceCSV}>↓ Export CSV</button>
                  )}
                </div>
                <button className="btn-primary" disabled={generating} onClick={generateSequence}>
                  <IconBolt size={15}/>
                  {hasSteps ? 'Re-generate Sequence' : 'Generate Sequence'}
                </button>
              </div>

              {/* Step cards */}
              {steps && steps.map((step, i) => (
                <SequenceStepCard key={i} step={step} onEdit={(field, value) => {
                  const updated = steps.map((s, j) => j === i ? { ...s, [field]: value } : s);
                  saveSeq(account.name, updated);
                }}/>
              ))}

              {!steps && !generating && (
                <div style={{textAlign:'center',padding:'48px 24px',color:'var(--tmuted)'}}>
                  <div style={{marginBottom:12,opacity:0.4}}>
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                  </div>
                  <div style={{fontSize:16,fontWeight:500,color:'var(--text)',marginBottom:8}}>No sequence yet</div>
                  <div style={{fontSize:13,lineHeight:1.6,maxWidth:380,margin:'0 auto'}}>Click "Generate Sequence" and AI will build a personalized 10-step outreach sequence for {account.name}.</div>
                </div>
              )}

              {/* Bottom nav bar */}
              <div className="activation-bar" style={{marginTop:24}}>
                <div className="activation-inner">
                  <div className="activation-count">
                    <span>{builtCount}</span> of {accounts.length} sequence{accounts.length!==1?'s':''} built
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn-secondary" onClick={onBack}>← Module 4</button>
                    <button className="btn-primary" disabled={!hasSteps} onClick={onContinue} style={!hasSteps?{opacity:0.5,cursor:'not-allowed'}:{}}>
                      Continue to Module 6 →
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {/* Chat panel */}
            <ChatPanel
              open={chatOpen}
              onClose={() => setChatOpen(false)}
              account={account}
              pov={povForChat}
              currentModule={5}
              model={model}
            />
          </div>
          <AssistantFAB chatOpen={chatOpen} onClick={() => setChatOpen(o => !o)} />
        </div>
      );
    }

    // ── Module 6 — Activity Tracker ───────────────────────────────

    function Module6({ onBack, onNav }) {
      const loadAccounts = () => {
        try {
          const d = JSON.parse(localStorage.getItem('conga_activated_data') || '[]');
          if (d.length > 0) return d;
          const names = JSON.parse(localStorage.getItem('conga_activated') || '[]');
          const results = JSON.parse(localStorage.getItem('conga_m2_results') || '[]');
          const norm = s => (s||'').toLowerCase().trim().replace(/[.,]/g,'');
          return results.filter(r => names.map(norm).includes(norm(r.name)));
        } catch { return []; }
      };
      const accounts = loadAccounts();
      const getScore = a => a.combined_score || a.icp_score || a.score || null;

      // activityData: { [accountName]: { accountStatus, contacts, notes, lastUpdated } }
      const [activityData, setActivityData] = useState(() => {
        const out = {};
        accounts.forEach(a => {
          try {
            const saved = JSON.parse(localStorage.getItem(`conga_activity_${a.name}`) || 'null');
            if (saved) { out[a.name] = saved; return; }
            // Bootstrap from contacts if available
            const contacts = JSON.parse(localStorage.getItem(`conga_contacts_${a.name}`) || 'null');
            out[a.name] = {
              accountStatus: 'Not Started',
              contacts: contacts ? contacts.map(c => ({
                name: c.name, title: c.title, role: c.role,
                attempts: 0, status: 'Not Contacted', lastActivity: null, notes: '',
              })) : [],
              notes: '',
              lastUpdated: null,
            };
          } catch {
            out[a.name] = { accountStatus: 'Not Started', contacts: [], notes: '', lastUpdated: null };
          }
        });
        return out;
      });

      const [expandedAccts, setExpandedAccts] = useState({});

      function updateActivity(accountName, updater) {
        setActivityData(prev => {
          const existing = prev[accountName] || { accountStatus:'Not Started', contacts:[], notes:'', lastUpdated:null };
          const next = { ...prev, [accountName]: { ...updater(existing), lastUpdated: new Date().toISOString() } };
          localStorage.setItem(`conga_activity_${accountName}`, JSON.stringify(next[accountName]));
          return next;
        });
      }

      function toggleExpand(name) {
        setExpandedAccts(prev => ({ ...prev, [name]: !prev[name] }));
      }

      function exportActivityReport() {
        const summaryRows = [];
        const contactRows = [];
        accounts.forEach(acc => {
          const act = activityData[acc.name] || {};
          const score = getScore(acc);
          const contacts = act.contacts || [];
          summaryRows.push({
            'Account':            acc.name,
            'Industry':           acc.industry || '',
            'ICP Score':          score || '',
            'Est. ACV Range':     acc.est_acv_range || '',
            'Status':             act.accountStatus || 'Not Started',
            'Contacts Attempted': contacts.filter(c=>c.attempts>0).length,
            'Meetings Set':       contacts.filter(c=>c.status==='Meeting Set').length,
            'Last Updated':       act.lastUpdated ? new Date(act.lastUpdated).toLocaleDateString() : '',
            'Notes':              act.notes || '',
          });
          contacts.forEach(c => {
            contactRows.push({
              'Account':       acc.name,
              'Contact Name':  c.name || '',
              'Title':         c.title || '',
              'Role':          c.role || '',
              'Status':        c.status || '',
              'Attempts':      c.attempts || 0,
              'Last Activity': c.lastActivity || '',
              'Notes':         c.notes || '',
            });
          });
        });
        const wb = XLSX.utils.book_new();
        const wsSummary  = XLSX.utils.json_to_sheet(summaryRows);
        const wsContacts = XLSX.utils.json_to_sheet(contactRows.length ? contactRows : [{'No contacts tracked yet':''}]);
        wsSummary['!cols']  = Object.keys(summaryRows[0]||{}).map(k=>({wch:Math.max(k.length,18)}));
        wsContacts['!cols'] = Object.keys((contactRows[0]||{})).map(k=>({wch:Math.max(k.length,18)}));
        XLSX.utils.book_append_sheet(wb, wsSummary,  'Account Summary');
        XLSX.utils.book_append_sheet(wb, wsContacts, 'Contact Details');
        XLSX.writeFile(wb, `Conga_Activity_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
      }

      // Stat totals
      const totalAccounts  = accounts.length;
      const inProgress     = accounts.filter(a => activityData[a.name]?.accountStatus === 'In Progress').length;
      const meetingsSet    = accounts.filter(a => activityData[a.name]?.accountStatus === 'Meeting Set').length;
      const passedNoFit   = accounts.filter(a => ['Closed','Passed'].includes(activityData[a.name]?.accountStatus)).length;

      const ACCT_STATUSES  = ['Not Started', 'In Progress', 'Meeting Set', 'Closed', 'Passed'];
      const CONTACT_STATUSES = ['Not Contacted', 'Attempted', 'Connected', 'Meeting Set', 'Unresponsive'];

      const roleColors = {
        'Economic Buyer': { bg:'var(--amber-muted)',   color:'var(--amber)'          },
        'Champion':       { bg:'var(--green-dim)',   color:'var(--green)'         },
        'Technical':      { bg:'var(--amber-muted)',  color:'var(--amber)'  },
        'Influencer':     { bg:'rgba(255,255,255,0.08)',color:'var(--text)'      },
        'Blocker':        { bg:'var(--red-dim)',     color:'var(--red)'           },
      };

      const acctStatusColors = {
        'Not Started': { color:'var(--tmuted)',  bg:'var(--tfaint)'  },
        'In Progress': { color:'var(--amber)',     bg:'var(--amber-muted)'   },
        'Meeting Set': { color:'var(--green)',      bg:'var(--green-dim)'    },
        'Closed':      { color:'var(--amber)',       bg:'var(--amber-muted)'     },
        'Passed':      { color:'var(--red)',        bg:'var(--red-dim)'      },
      };

      return (
        <div className="m3-outer">
          <div className="m3-wrap">
            <div className="m3-main">

              <div className="phase-label">Module 6 of 6 — Activity Tracker</div>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
                <h1 className="module-title" style={{margin:0}}>Activity Tracker</h1>
                {accounts.length > 0 && (
                  <button className="btn-secondary" onClick={exportActivityReport}>↓ Export Activity Report</button>
                )}
              </div>
              <p className="module-sub">Track outreach progress across all selected accounts. Update contact status, log attempts, and keep notes — all saved automatically.</p>

              {/* Stat cards */}
              <div className="stat-cards">
                <div className="stat-card">
                  <div className="stat-card-num">{totalAccounts}</div>
                  <div className="stat-card-label">Total Accounts</div>
                </div>
                <div className="stat-card">
                  <div className="stat-card-num" style={{color:'var(--amber)'}}>{inProgress}</div>
                  <div className="stat-card-label">In Progress</div>
                </div>
                <div className="stat-card">
                  <div className="stat-card-num" style={{color:'var(--green)'}}>{meetingsSet}</div>
                  <div className="stat-card-label">Meetings Set</div>
                </div>
                <div className="stat-card">
                  <div className="stat-card-num" style={{color:'var(--tmuted)'}}>{passedNoFit}</div>
                  <div className="stat-card-label">Closed / Passed</div>
                </div>
              </div>

              {/* Account cards */}
              {accounts.map(acc => {
                const activity = activityData[acc.name] || { accountStatus:'Not Started', contacts:[], notes:'', lastUpdated:null };
                const isExpanded = !!expandedAccts[acc.name];
                const score = getScore(acc);
                const statusStyle = acctStatusColors[activity.accountStatus] || acctStatusColors['Not Started'];
                const hasContacts = activity.contacts && activity.contacts.length > 0;

                return (
                  <div key={acc.name} className="activity-card">
                    {/* Card header */}
                    <div className="activity-card-header" onClick={() => toggleExpand(acc.name)}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                          <span style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>{acc.name}</span>
                          {score && (
                            <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,background:'var(--amber-muted)',color:'var(--amber)'}}>ICP {score}/10</span>
                          )}
                          <span className="acct-status-badge" style={{background:statusStyle.bg,color:statusStyle.color}}>
                            {activity.accountStatus}
                          </span>
                        </div>
                        <div style={{fontSize:12,color:'var(--tmuted)'}}>
                          {[acc.industry, acc.state].filter(Boolean).join(' · ')}
                          {activity.lastUpdated && (
                            <span style={{marginLeft:12,color:'var(--tfaint)',fontSize:11}}>
                              Updated {new Date(activity.lastUpdated).toLocaleDateString()}
                            </span>
                          )}
                        </div>
                      </div>
                      {/* Account status selector (stops propagation so it doesn't toggle expand) */}
                      <select
                        className="status-select"
                        style={{marginRight:8}}
                        value={activity.accountStatus}
                        onClick={e => e.stopPropagation()}
                        onChange={e => {
                          e.stopPropagation();
                          updateActivity(acc.name, prev => ({ ...prev, accountStatus: e.target.value }));
                        }}
                      >
                        {ACCT_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tmuted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                        style={{transform:isExpanded?'rotate(180deg)':'none',transition:'transform 0.2s',flexShrink:0}}>
                        <polyline points="6 9 12 15 18 9"/>
                      </svg>
                    </div>

                    {/* Expanded body */}
                    {isExpanded && (
                      <div className="activity-card-body">
                        {hasContacts ? (
                          <table className="contact-table">
                            <thead>
                              <tr>
                                <th>Name</th>
                                <th>Title</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Attempts</th>
                                <th>Notes</th>
                              </tr>
                            </thead>
                            <tbody>
                              {activity.contacts.map((c, ci) => {
                                const rc = roleColors[c.role] || { bg:'var(--tfaint)', color:'var(--tmuted)' };
                                return (
                                  <tr key={ci}>
                                    <td style={{color:'var(--text)',fontWeight:500,fontSize:13}}>{c.name}</td>
                                    <td style={{color:'var(--tmuted)',fontSize:12}}>{c.title}</td>
                                    <td>
                                      <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,background:rc.bg,color:rc.color,textTransform:'uppercase',letterSpacing:'0.05em',whiteSpace:'nowrap'}}>
                                        {c.role}
                                      </span>
                                    </td>
                                    <td>
                                      <select
                                        className="status-select"
                                        value={c.status || 'Not Contacted'}
                                        onChange={e => updateActivity(acc.name, prev => {
                                          const contacts = [...prev.contacts];
                                          contacts[ci] = { ...contacts[ci], status: e.target.value };
                                          return { ...prev, contacts };
                                        })}
                                      >
                                        {CONTACT_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                      </select>
                                    </td>
                                    <td>
                                      <div style={{display:'flex',alignItems:'center',gap:4}}>
                                        <button className="attempt-btn" onClick={() => updateActivity(acc.name, prev => {
                                          const contacts = [...prev.contacts];
                                          contacts[ci] = { ...contacts[ci], attempts: Math.max(0, (contacts[ci].attempts||0) - 1) };
                                          return { ...prev, contacts };
                                        })}>−</button>
                                        <span style={{minWidth:20,textAlign:'center',fontSize:13,color:'var(--text)'}}>{c.attempts||0}</span>
                                        <button className="attempt-btn" onClick={() => updateActivity(acc.name, prev => {
                                          const contacts = [...prev.contacts];
                                          contacts[ci] = { ...contacts[ci], attempts: (contacts[ci].attempts||0) + 1 };
                                          return { ...prev, contacts };
                                        })}>+</button>
                                      </div>
                                    </td>
                                    <td>
                                      <input
                                        className="notes-input"
                                        type="text"
                                        placeholder="Add note…"
                                        value={c.notes || ''}
                                        onChange={e => updateActivity(acc.name, prev => {
                                          const contacts = [...prev.contacts];
                                          contacts[ci] = { ...contacts[ci], notes: e.target.value };
                                          return { ...prev, contacts };
                                        })}
                                      />
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        ) : (
                          <div style={{padding:'20px 0',textAlign:'center',color:'var(--tmuted)',fontSize:13}}>
                            Research contacts in Module 4 first.{' '}
                            <button
                              style={{background:'none',border:'none',color:'var(--amber)',cursor:'pointer',fontFamily:'var(--f-ui)',fontSize:13,textDecoration:'underline'}}
                              onClick={() => onNav && onNav(4)}
                            >Go to Module 4 →</button>
                          </div>
                        )}

                        {/* Account notes */}
                        <div style={{marginTop:14}}>
                          <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase',color:'var(--tmuted)',display:'block',marginBottom:6}}>Account Notes</label>
                          <textarea
                            className="context-textarea"
                            rows={2}
                            placeholder="Meeting outcomes, next steps, blockers…"
                            value={activity.notes || ''}
                            onChange={e => updateActivity(acc.name, prev => ({ ...prev, notes: e.target.value }))}
                          />
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}

              {accounts.length === 0 && (
                <div style={{textAlign:'center',padding:'48px 24px',color:'var(--tmuted)'}}>
                  <div style={{fontSize:16,fontWeight:500,color:'var(--text)',marginBottom:8}}>No accounts selected</div>
                  <div style={{fontSize:13,lineHeight:1.6}}>Go back to Module 2 to select accounts for outreach.</div>
                  <button className="btn-secondary" style={{marginTop:20}} onClick={onBack}>← Back to Module 5</button>
                </div>
              )}

              {/* Bottom nav */}
              <div className="activation-bar" style={{marginTop:24}}>
                <div className="activation-inner">
                  <div className="activation-count">
                    <span>{meetingsSet}</span> meeting{meetingsSet!==1?'s':''} set · <span style={{color:'var(--amber)'}}>{inProgress}</span> in progress
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn-secondary" onClick={onBack}>← Module 5</button>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // ── Account Manager Panel ──────────────────────────────────────

    function AccountManagerPanel({ onClose, onNav }) {
      const [accounts, setAccounts] = useState(() => {
        try { return JSON.parse(localStorage.getItem('conga_activated_data') || '[]'); } catch { return []; }
      });

      function removeAccount(name) {
        const nextData = accounts.filter(a => a.name !== name);
        const nextNames = nextData.map(a => a.name);
        setAccounts(nextData);
        localStorage.setItem('conga_activated_data', JSON.stringify(nextData));
        localStorage.setItem('conga_activated', JSON.stringify(nextNames));
        // Also update Module2's activated state via a custom event
        window.dispatchEvent(new CustomEvent('accounts-changed', { detail: { names: nextNames, data: nextData } }));
      }

      const getScore = a => a.combined_score || a.icp_score || a.score || null;

      return (
        <div className="acct-mgr-backdrop" onClick={onClose}>
          <div className="acct-mgr-panel" onClick={e => e.stopPropagation()}>
            <div className="acct-mgr-header">
              <div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Selected Accounts</div>
                <div style={{fontSize:11,color:'var(--tmuted)',marginTop:2}}>{accounts.length} account{accounts.length!==1?'s':''} selected for outreach</div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <button className="btn-secondary" style={{fontSize:12,padding:'6px 14px'}} onClick={()=>{onClose();onNav(2);}}>Change in Module 2</button>
                <button className="btn-close-chat" onClick={onClose}>✕</button>
              </div>
            </div>
            {accounts.length === 0 ? (
              <div style={{padding:'24px',textAlign:'center',color:'var(--tmuted)',fontSize:13}}>
                No accounts selected. Go to Module 2 to select accounts.
              </div>
            ) : (
              <div className="acct-mgr-list">
                {accounts.map(acc => {
                  const hasPov = !!localStorage.getItem(`conga_pov_${acc.name}`);
                  const score = getScore(acc);
                  return (
                    <div key={acc.name} className="acct-mgr-row">
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{acc.name}</div>
                        <div style={{fontSize:11,color:'var(--tmuted)'}}>
                          {[acc.industry, score ? `ICP ${score}/10` : null].filter(Boolean).join(' · ')}
                        </div>
                      </div>
                      <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                        {hasPov && (
                          <span style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:20,background:'var(--green-dim)',color:'var(--green)'}}>POV ✓</span>
                        )}
                        <button
                          onClick={() => removeAccount(acc.name)}
                          style={{background:'var(--red-dim)',border:'1px solid rgba(248,113,113,0.2)',color:'var(--red)',fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:6,cursor:'pointer',fontFamily:'var(--f-ui)'}}
                        >Remove</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Header + Module Nav ────────────────────────────────────────

    const MODULE_LABELS = [
      'Territory Setup',
      'Account Prioritization',
      'POV Builder',
      'Contact Research',
      'Sequence Builder',
      'Activity Tracker',
    ];

    function Header({ step, unlockedUpTo, onNav }) {
      const [showAcctMgr, setShowAcctMgr] = useState(false);
      const [showClearConfirm, setShowClearConfirm] = useState(false);
      const navRef = useRef(null);

      function clearAllData() {
        const keysToRemove = Object.keys(localStorage).filter(k => k.startsWith('conga_'));
        keysToRemove.forEach(k => localStorage.removeItem(k));
        setShowClearConfirm(false);
        window.location.reload();
      }
      // Read count from conga_activated_data (same source as AccountManagerPanel)
      const activatedCount = (() => {
        try { return JSON.parse(localStorage.getItem('conga_activated_data') || '[]').length; } catch { return 0; }
      })();

      // Scroll the active module tab into view whenever step changes
      useEffect(() => {
        if (!navRef.current) return;
        const active = navRef.current.querySelector('.module-nav-item.active');
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, [step]);

      return (
        <>
          <header>
            <div className="header-left">
              <div className="logo-mark">
                <svg id="a" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1039.041 1080">
                  <path d="M760.081,809.993c-54.616,21.347-116.877,31.991-186.827,31.991-92.119,0-165.068-25.169-218.802-75.507-53.749-50.308-80.623-119.846-80.623-208.584v-51.161c0-95.53,20.038-169.332,60.144-221.375,40.061-52.043,95.971-78.065,167.626-78.065,68.23,0,118.567,17.083,150.999,51.191,32.387,34.137,48.618,86.18,48.618,156.1v51.191h273.844v-51.191c0-134.754-40.106-237.576-120.287-308.378C774.562,35.431,659.391,0,509.274,0,169.743,0,0,180.005,0,539.985,0,715.727,49.015,849.657,147.147,941.777c98.088,92.149,235.856,138.223,413.317,138.223,97.25,0,187.664-13.702,271.286-40.958,83.563-27.286,152.675-62.276,207.291-104.939l-94.692-217.523c-68.259,40.958-129.682,72.096-184.268,93.413Z" fill="#fff"/>
                </svg>
              </div>
              <div><div className="logo-name">Conga <span>Prospecting Agent</span></div></div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              {activatedCount > 0 && (
                <button
                  onClick={() => setShowAcctMgr(s => !s)}
                  style={{
                    display:'flex',alignItems:'center',gap:7,
                    background:'var(--amber-muted)',border:'1px solid rgba(184,134,11,0.3)',
                    color:'var(--text)',fontSize:12,fontWeight:600,
                    padding:'7px 14px',borderRadius:20,cursor:'pointer',
                    fontFamily:'var(--f-ui)',transition:'all 0.18s'
                  }}
                >
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                  </svg>
                  {activatedCount} Account{activatedCount!==1?'s':''} Selected
                </button>
              )}
              {!showClearConfirm ? (
                <button
                  onClick={() => setShowClearConfirm(true)}
                  title="Clear all cached data and start fresh"
                  style={{
                    background:'none',border:'1px solid var(--border)',color:'var(--tfaint)',
                    fontSize:11,padding:'6px 12px',borderRadius:20,cursor:'pointer',
                    fontFamily:'var(--f-ui)',transition:'all 0.18s'
                  }}
                >↺ Clear Data</button>
              ) : (
                <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--surf-2)',border:'1px solid rgba(239,68,68,0.4)',borderRadius:20,padding:'5px 12px'}}>
                  <span style={{fontSize:11,color:'var(--red)'}}>Clear everything?</span>
                  <button onClick={clearAllData} style={{fontSize:11,fontWeight:700,color:'var(--red)',background:'none',border:'none',cursor:'pointer',padding:0}}>Yes</button>
                  <button onClick={() => setShowClearConfirm(false)} style={{fontSize:11,color:'var(--tmuted)',background:'none',border:'none',cursor:'pointer',padding:0}}>No</button>
                </div>
              )}
              <div className="header-steps">
                {[1,2,3,4,5,6].map(n=>(
                  <div key={n} className={`step-dot ${n===step?'active':n<step?'done':''}`} title={`Module ${n}: ${MODULE_LABELS[n-1]}`}/>
                ))}
              </div>
            </div>
          </header>
          <nav className="module-nav" ref={navRef}>
            {MODULE_LABELS.map((label, i) => {
              const n = i + 1;
              const isActive = n === step;
              const isDone   = n < step;
              const canClick = n <= unlockedUpTo;
              return (
                <button
                  key={n}
                  className={`module-nav-item ${isActive?'active':isDone?'done':''}`}
                  disabled={!canClick}
                  onClick={() => canClick && onNav(n)}
                >
                  <span className="module-nav-num">{n}</span>
                  {label}
                </button>
              );
            })}
          </nav>
          {showAcctMgr && <AccountManagerPanel onClose={() => setShowAcctMgr(false)} onNav={n => { setShowAcctMgr(false); onNav(n); }}/>}
        </>
      );
    }

    // ── App ────────────────────────────────────────────────────────

    // Sync conga_activated_data and conga_activated so they always agree.
    // conga_activated_data is the authoritative source (full objects).
    // conga_activated may have more names from old sessions → find & add missing ones.
    function migrateActivatedData() {
      try {
        const existingData  = JSON.parse(localStorage.getItem('conga_activated_data') || '[]');
        const allNames      = JSON.parse(localStorage.getItem('conga_activated') || '[]');
        if (allNames.length === 0) return;

        const norm = s => (s||'').toLowerCase().trim().replace(/[.,]/g,'');
        const existingNorm  = new Set(existingData.map(a => norm(a.name)));
        const missingNames  = allNames.filter(n => !existingNorm.has(norm(n)));

        if (missingNames.length === 0) {
          // Everything in allNames is already in existingData — just sync the names list
          localStorage.setItem('conga_activated', JSON.stringify(existingData.map(a => a.name)));
          return;
        }

        // Look up missing accounts in conga_m2_results
        const results   = JSON.parse(localStorage.getItem('conga_m2_results') || '[]');
        const missingSet = new Set(missingNames.map(norm));
        const found      = results.filter(r => missingSet.has(norm(r.name)));

        const merged = [...existingData, ...found];
        localStorage.setItem('conga_activated_data', JSON.stringify(merged));
        localStorage.setItem('conga_activated', JSON.stringify(merged.map(a => a.name)));
      } catch(e) { /* silent */ }
    }
    migrateActivatedData();

    function App() {
      const [currentModule, setCurrentModule] = useState(() => {
        const saved = parseInt(localStorage.getItem('conga_current_module') || '1');
        return isNaN(saved) ? 1 : saved;
      });
      // Restore territory from localStorage so navigating back to M2 works after page refresh
      const [territory, setTerritory] = useState(() => {
        try { return JSON.parse(localStorage.getItem('conga_territory') || 'null'); } catch { return null; }
      });
      const [uploadedFile, setUploadedFile]   = useState(null);
      const [manualAccounts, setManualAccounts] = useState([]);

      const model = localStorage.getItem('conga_model') || DEFAULT_MODEL;

      function nav(n) {
        setCurrentModule(n);
        localStorage.setItem('conga_current_module', n);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function handleModule1Complete({ geo, segment, product, uploadedFile: f, manualAccounts: m }) {
        const t = { geo, segment, product };
        setTerritory(t);
        localStorage.setItem('conga_territory', JSON.stringify(t)); // persist across refreshes
        setUploadedFile(f);
        setManualAccounts(m);
        nav(2);
      }

      // Compute which modules are unlocked based on what's actually been completed
      function getUnlockedUpTo() {
        // Always have M1
        let max = 1;
        // M2 unlocked after M1 setup (always, since M1 just sets territory)
        max = 2;
        // M3 unlocked when there are activated accounts with M2 results
        const hasResults = !!localStorage.getItem('conga_m2_results');
        const hasActivated = (() => { try { return JSON.parse(localStorage.getItem('conga_activated')||'[]').length > 0; } catch { return false; } })();
        if (hasResults && hasActivated) max = 3;
        // M4 unlocked when at least one POV has been built
        const hasPov = (() => {
          try {
            const acts = JSON.parse(localStorage.getItem('conga_activated')||'[]');
            return acts.some(name => localStorage.getItem(`conga_pov_${name}`));
          } catch { return false; }
        })();
        if (hasPov) max = Math.max(max, 4);
        // M5 unlocked when at least one account has contacts researched
        const hasContacts = (() => {
          try {
            const acts = JSON.parse(localStorage.getItem('conga_activated')||'[]');
            return acts.some(name => localStorage.getItem(`conga_contacts_${name}`));
          } catch { return false; }
        })();
        if (hasContacts) max = Math.max(max, 5);
        const hasSequences = (() => {
          try {
            const acts = JSON.parse(localStorage.getItem('conga_activated')||'[]');
            return acts.some(name => localStorage.getItem(`conga_seq_${name}`));
          } catch { return false; }
        })();
        if (hasSequences) max = Math.max(max, 6);
        return max;
      }

      const unlockedUpTo = getUnlockedUpTo();

      return (
        <>
          <Header step={currentModule} unlockedUpTo={unlockedUpTo} onNav={nav}/>
          {currentModule === 1 && <Module1 onComplete={handleModule1Complete}/>}
          {currentModule === 2 && (
            <Module2
              territory={territory}
              uploadedFile={uploadedFile}
              manualAccounts={manualAccounts}
              onBack={()=>nav(1)}
              onContinue={()=>nav(3)}
            />
          )}
          {currentModule === 3 && (
            <Module3
              territory={territory}
              model={model}
              onBack={()=>nav(2)}
              onContinue={()=>nav(4)}
            />
          )}
          {currentModule === 4 && (
            <Module4
              territory={territory}
              model={model}
              onBack={()=>nav(3)}
              onContinue={()=>nav(5)}
            />
          )}
          {currentModule === 5 && (
            <Module5
              territory={territory}
              model={model}
              onBack={()=>nav(4)}
              onContinue={()=>nav(6)}
            />
          )}
          {currentModule === 6 && (
            <Module6
              onBack={()=>nav(5)}
              onNav={nav}
            />
          )}
          <footer style={{
            background: 'var(--surf)',
            borderTop: '1px solid rgba(184,134,11,0.15)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            padding: '0 24px',
            height: '34px',
            position: 'sticky',
            bottom: 0,
            zIndex: 50
          }}>
            <div style={{display:'flex', alignItems:'center', gap:'5px'}}>
              <span style={{fontFamily:"'IBM Plex Mono', monospace", color:'#B8860B', fontWeight:700, fontSize:'13px'}}>/</span>
              <span style={{fontFamily:"'Epilogue', sans-serif", fontWeight:800, color:'#B8860B', fontSize:'13px'}}>Z</span>
              <span style={{fontFamily:"'Epilogue', sans-serif", fontWeight:800, color:'rgba(255,255,255,0.5)', fontSize:'13px'}}>nith</span>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
              <span style={{fontFamily:"'IBM Plex Mono', monospace", fontSize:'9px', color:'rgba(255,255,255,0.2)', letterSpacing:'0.08em'}}>Prospecting Agent</span>
              <div style={{width:'4px', height:'4px', borderRadius:'50%', background:'#B8860B', boxShadow:'0 0 6px rgba(184,134,11,0.5)'}}></div>
              <span style={{fontFamily:"'IBM Plex Mono', monospace", fontSize:'9px', color:'rgba(255,255,255,0.2)', letterSpacing:'0.08em'}}>v1.0</span>
            </div>
          </footer>
        </>
      );
    }

    const _rootEl = document.getElementById('root');
    _rootEl.innerHTML = '';
    ReactDOM.createRoot(_rootEl).render(<App/>);
  </script>
</body>
</html>
