                    <div className="breakdown-bar" style={{width:`${(dim.score||0)*10}%`}}/>
                  </div>
                  <span className="breakdown-score">{dim.score}</span>
                  {dim.rationale && <span className="breakdown-rationale">{dim.rationale}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function Module2({ territory, uploadedFile, manualAccounts, onBack, onContinue }) {
      // Closed lost data — load from localStorage
      const [closedLostData] = useState(() => {
        try { return JSON.parse(localStorage.getItem('conga_closed_lost') || '[]'); } catch { return []; }
      });

      // Model setting
      const model = localStorage.getItem('conga_model') || DEFAULT_MODEL;

      // Mode
      const [mode, setMode] = useState(uploadedFile || manualAccounts.some(a=>a.company) ? 'upload' : 'discover');

      // Parsed accounts
      const [parsedAccounts, setParsedAccounts] = useState(null);
      const [parseError, setParseError]         = useState(null);
      const [filteredInfo, setFilteredInfo]     = useState(null); // {original, filtered}

      // Discover mode
      const [discoverStates, setDiscoverStates]         = useState([]);
      const [discoverIndustries, setDiscoverIndustries] = useState([]);

      // Auto-invalidate cache if territory settings changed since last run
      React.useEffect(() => {
        const savedTerritory = JSON.parse(localStorage.getItem('conga_last_territory') || 'null');
        const currentKey = JSON.stringify({ geo: territory?.geo, segment: territory?.segment, product: territory?.product });
        const savedKey = savedTerritory ? JSON.stringify({ geo: savedTerritory?.geo, segment: savedTerritory?.segment, product: savedTerritory?.product }) : null;
        if (savedKey && savedKey !== currentKey) {
          localStorage.removeItem('conga_m2_results');
          setStatus('idle');
          setResults([]);
        }
      }, []);

      // Analysis — restore 'done' if we have cached results
      const [status, setStatus]   = useState(()=> localStorage.getItem('conga_m2_results') ? 'done' : 'idle');
      const [pass1Done, setPass1Done] = useState(false);
      const [pass1Count, setPass1Count] = useState(0);
      const [error, setError]     = useState(null);

      // Results
      const [results, setResults] = useState(()=>{
        const c = localStorage.getItem('conga_m2_results');
        return c ? JSON.parse(c) : null;
      });

      // Account owners
      const [owners, setOwners] = useState(()=>{
        try { return JSON.parse(localStorage.getItem('conga_owners') || '{}'); } catch { return {}; }
      });
      const setOwner = (accountName, value) => {
        setOwners(prev => {
          const next = { ...prev, [accountName]: value };
          localStorage.setItem('conga_owners', JSON.stringify(next));
          return next;
        });
      };

      // Sort / filter state
      const [sortBy, setSortBy]         = useState('score');
      const [filterTier, setFilterTier] = useState('all');
      const [filterType, setFilterType] = useState('all');

      // Activated accounts — always boot from conga_activated_data (authoritative source)
      // so Module2's count matches the header pill.
      const [activatedData, setActivatedData] = useState(()=>{
        try { return JSON.parse(localStorage.getItem('conga_activated_data') || '[]'); } catch { return []; }
      });
      // Derived names list — kept in sync whenever activatedData changes
      const [activated, setActivated] = useState(()=>{
        try {
          const data = JSON.parse(localStorage.getItem('conga_activated_data') || '[]');
          if (data.length > 0) return data.map(a => a.name);
          // fallback to old format
          const c = localStorage.getItem('conga_activated');
          return c ? JSON.parse(c) : [];
        } catch { return []; }
      });

      // Parse file when component mounts
      useEffect(()=>{
        if (uploadedFile) {
          parseAccountFile(uploadedFile)
            .then(accounts=>{
              if (accounts.length > 200) {
                const filtered = preFilterAccounts(accounts, 200);
                setFilteredInfo({ original: accounts.length, filtered: filtered.length });
                setParsedAccounts(filtered);
              } else {
                setParsedAccounts(accounts);
              }
            })
            .catch(err=>setParseError(err.message));
        } else if (manualAccounts.some(a=>a.company)) {
          setParsedAccounts(manualAccounts.filter(a=>a.company.trim()).map(a=>({
            name: a.company, revenue: null, employees: null,
            state: a.hq||null, industry: a.industry||null, type:'Prospect',
          })));
        }
      }, []);

      function toggleActivated(name) {
        const isOn = activated.includes(name);
        const nextNames = isOn ? activated.filter(n=>n!==name) : [...activated, name];
        // Also track full account objects so Module 3 can load them reliably
        const accountObj = results ? results.find(r => r.name === name) : null;
        const nextData = isOn
          ? activatedData.filter(a => a.name !== name)
          : accountObj ? [...activatedData, accountObj] : activatedData;
        setActivated(nextNames);
        setActivatedData(nextData);
        localStorage.setItem('conga_activated', JSON.stringify(nextNames));
        localStorage.setItem('conga_activated_data', JSON.stringify(nextData));
      }

      function exportAccountsToExcel() {
        if (!results) return;
        const rows = results.map((a, i) => ({
          'Rank': i + 1,
          'Company': a.name,
          'Industry': a.industry || '',
          'ICP Score': a.combined_score || a.icp_score || '',
          'Signal Score': a.signal_score || '',
          'Revenue': a.revenue || a.estimated_revenue || '',
          'Employees': a.employees || a.estimated_employees || '',
          'State': a.state || '',
          'Type': a.company_type || '',
          'Recommended Product': a.recommended_product || '',
          'Why They Fit': a.primary_reason || '',
          'Outreach Angle': a.outreach_angle || '',
          'Tech Stack': Array.isArray(a.tech_stack) ? a.tech_stack.join(', ') : (a.tech_stack || ''),
          'Buying Signals': Array.isArray(a.buying_signals) ? a.buying_signals.join('; ') : (a.buying_signals || ''),
          'Selected': activated.includes(a.name) ? 'Yes' : 'No',
        }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const colWidths = Object.keys(rows[0]).map(k => ({ wch: Math.max(k.length, 18) }));
        ws['!cols'] = colWidths;
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Account List');
        XLSX.writeFile(wb, `Conga_Accounts_${new Date().toISOString().slice(0,10)}.xlsx`);
      }

      async function runAnalysis() {
        setError(null); setResults(null);
        setPass1Done(false);

        try {
          // ─ Pass 1: ICP scoring ─
          setStatus('pass1');

          let accountList;
          let pass1Prompt;

          const productContext = BASE_ICP_CONTEXT + '\n\n' + getProductICP(territory?.product || 'All Products');

          if (mode === 'upload') {
            if (!parsedAccounts?.length) { setError('No accounts found to analyze.'); setStatus('error'); return; }
            const acctJSON = JSON.stringify(parsedAccounts.map((a,i)=>({
              id: i,
              name: a.name,
              revenue: a.revenue ? fmtRevenue(a.revenue) : 'Unknown',
              employees: a.employees || 'Unknown',
              state: a.state || 'Unknown',
              industry: a.industry || 'Unknown',
              type: a.type || 'Unknown',
            })));
            pass1Prompt = `TERRITORY: Region=${territory?.geo||'All'}, Segment=${territory?.segment||'All'}, Product Focus=${territory?.product||'All Products'}

Analyze this list of ${parsedAccounts.length} accounts for ICP fit.

ACCOUNTS:
${acctJSON}

Score each account and return the TOP 30 as a JSON array:
{
  "id": <original id>,
  "name": "<company name>",
  "icp_score": <1-10, one decimal>,
  "industry": "<industry>",
  "state": "<state>",
  "revenue": "<revenue>",
  "employees": <number or null>,
  "industry_tier": "<Priority 1|Priority 2|Priority 3>",
  "primary_reason": "<one sentence why strong fit for ${territory?.product||'All Products'}>",
  "recommended_product": "<CLM|CPQ|DocAuto|Aime|Price Optimization|RLM|All Products>",
  "company_type": "<Prospect|Customer>"
}
Return ONLY the JSON array.`;
          } else {
            // Discover mode — build segment-specific revenue constraint
            const segmentRevenueRule = (() => {
              const seg = territory?.segment || '';
              if (seg === 'Commercial') return 'HARD RULE: Only include companies with revenue between $100M and $1B. Do NOT include any company over $1B revenue.';
              if (seg === 'Growth')     return 'HARD RULE: Only include companies with revenue under $100M.';
              if (seg === 'Enterprise') return 'HARD RULE: Only include companies with revenue between $1B and $10B.';
              if (seg === 'Strategic')  return 'HARD RULE: Only include companies with revenue over $5B.';
              return '';
            })();

            pass1Prompt = `TERRITORY: Region=${territory?.geo||'All'}, Segment=${territory?.segment||'All'}, Product Focus=${territory?.product||'All Products'}
Sub-regions: ${discoverStates.length>0 ? discoverStates.join(', ') : 'All of '+(territory?.geo||'region')}
Industries: ${discoverIndustries.length>0 ? discoverIndustries.join(', ') : 'All priority industries'}
${segmentRevenueRule ? '\n' + segmentRevenueRule + '\n' : ''}
Identify the TOP 30 real companies in these markets that are strong ICP fits for ${territory?.product||'All Products'}. Only include companies you are confident actually exist.

Return a JSON array:
{
  "name": "<company name>",
  "icp_score": <1-10, one decimal>,
  "industry": "<industry>",
  "state": "<state or country>",
  "estimated_revenue": "<revenue range>",
  "estimated_employees": "<employee range>",
  "industry_tier": "<Priority 1|Priority 2|Priority 3>",
  "primary_reason": "<one sentence why strong fit for ${territory?.product||'All Products'}>",
  "recommended_product": "<CLM|CPQ|DocAuto|Aime|Price Optimization|RLM|All Products>",
  "company_type": "Prospect"
}
Return ONLY the JSON array.`;
          }

          const pass1Text = await callClaude(model, productContext, pass1Prompt, 10000);
          const pass1Results = extractJSON(pass1Text);
          setPass1Count(pass1Results.length);
          setPass1Done(true);

          // ─ Pass 2: Deep research ─
          setStatus('pass2');

          const p2ProductFocus = territory?.product || 'All Products';
          const p2SegmentRule = (() => {
            if (mode !== 'discover') return ''; // upload mode: respect whatever was in the list
            const seg = territory?.segment || '';
            if (seg === 'Commercial') return '\nSEGMENT ENFORCEMENT: This is a Commercial territory. Remove any account over $1B revenue from the final list and replace with a $100M–$1B fit instead.';
            if (seg === 'Growth')     return '\nSEGMENT ENFORCEMENT: This is a Growth territory. Remove any account over $100M revenue.';
            if (seg === 'Enterprise') return '\nSEGMENT ENFORCEMENT: This is an Enterprise territory. Only include accounts between $1B–$10B revenue.';
            return '';
          })();
          const pass2Prompt = `You identified these ${pass1Results.length} accounts as strong ICP fits. Now do deeper research on each.${p2SegmentRule}

For each company, use your knowledge to identify:
1. Known or likely CRM platform (Salesforce, SAP, Oracle, MS Dynamics, etc.)
2. Business model and revenue structure
3. Known M&A, PE backing, recent funding, or IPO activity
4. Specific pain points that map to ${p2ProductFocus} (and other Conga/PROS products)
5. Any other buying signals or propensity indicators

If this account shows strong propensity for a DIFFERENT product than the primary focus (${p2ProductFocus}), list those in cross_sell_products. Only include genuine fits.

Then re-rank as FINAL TOP 20, combining ICP score with signal strength.

ACCOUNTS:
${JSON.stringify(pass1Results)}

Return a JSON array of the FINAL TOP 20 with:
{
  "name": "<company name>",
  "icp_score": <1-10>,
  "signal_score": <1-10>,
  "combined_score": <1-10, weighted average>,
  "industry": "<industry>",
  "state": "<state>",
  "revenue": "<revenue>",
  "estimated_revenue": "<revenue if no exact>",
  "employees": <number or null>,
  "estimated_employees": "<range if no exact>",
  "industry_tier": "<Priority 1|2|3>",
  "recommended_product": "<product>",
  "primary_reason": "<why strong ICP fit>",
  "buying_signals": ["<signal 1>", "<signal 2>", "<signal 3>"],
  "tech_stack": ["<known tech>"],
  "outreach_angle": "<one-line recommended opening for outreach>",
  "company_type": "<Prospect|Customer>",
  "cross_sell_products": ["<product>"],
  "cross_sell_reason": "<one line or empty string>",
  "est_acv_range": "<e.g. $15,000–$45,000 based on industry + segment + product>",
  "score_breakdown": {
    "industry_fit":        { "score": <1-10>, "rationale": "<one line>" },
    "revenue_band":        { "score": <1-10>, "rationale": "<one line>" },
    "tech_stack":          { "score": <1-10>, "rationale": "<one line>" },
    "business_model":      { "score": <1-10>, "rationale": "<one line>" },
    "relationship_signal": { "score": <1-10>, "rationale": "<one line>" }
  }
}
Return ONLY the JSON array.`;

          const pass2Text = await callClaude(model, productContext, pass2Prompt, 12000);
          let finalResults = extractJSON(pass2Text);

          // Client-side segment revenue enforcement for Discover mode
          if (mode === 'discover') {
            const seg = territory?.segment || '';
            const parseRev = r => {
              if (!r) return null;
              const s = String(r).replace(/[^0-9.BbMmKk]/g,'');
              const n = parseFloat(s);
              if (isNaN(n)) return null;
              if (/[Bb]/.test(String(r))) return n * 1e9;
              if (/[Mm]/.test(String(r))) return n * 1e6;
              if (/[Kk]/.test(String(r))) return n * 1e3;
              return n;
            };
            finalResults = finalResults.filter(a => {
              const rev = parseRev(a.revenue || a.estimated_revenue);
              if (rev === null) return true; // unknown — keep
              if (seg === 'Commercial') return rev >= 1e8 && rev <= 1e9;
              if (seg === 'Growth')     return rev < 1e8;
              if (seg === 'Enterprise') return rev >= 1e9 && rev <= 1e10;
              return true;
            });
          }

          // Sort by combined_score descending
          finalResults.sort((a,b)=>(b.combined_score||b.icp_score||0)-(a.combined_score||a.icp_score||0));

          setResults(finalResults);
          localStorage.setItem('conga_m2_results', JSON.stringify(finalResults));
          localStorage.setItem('conga_last_territory', JSON.stringify(territory));
          setStatus('done');

        } catch(err) {
          setStatus('error');
          setError(err.message);
        }
      }

      const availableStates = GEO_REGIONS[territory?.geo] || [];
      const toggleState = s => setDiscoverStates(prev => prev.includes(s) ? prev.filter(x=>x!==s) : [...prev,s]);
      const toggleIndustry = i => setDiscoverIndustries(prev => prev.includes(i) ? prev.filter(x=>x!==i) : [...prev,i]);

      const isAnalyzing = status==='pass1' || status==='pass2';
      const canRun = (
        (mode==='upload' && (parsedAccounts?.length>0)) ||
        (mode==='discover')
      );

      return (
        <div className="main">
          <div className="phase-label">Module 2 of 6 — Account Prioritization</div>
          <h1 className="phase-title">Find Your Best Accounts</h1>
          <p className="phase-subtitle">
            {mode==='upload'
              ? 'Claude will analyze your account list in two passes — first scoring against ICP criteria, then doing deeper research on the top accounts to surface buying signals.'
              : 'No list? No problem. Tell Claude where to look and it will research and surface the best accounts in your territory.'}
          </p>

          {/* Mode selector + clear cache */}
          {!isAnalyzing && (
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
                <div className="tab-row" style={{marginBottom:0}}>
                  <button className={`tab ${mode==='upload'?'active':''}`} onClick={()=>{setMode('upload');setResults(null);setStatus('idle');}}>Score My List</button>
                  <button className={`tab ${mode==='discover'?'active':''}`} onClick={()=>{setMode('discover');setResults(null);setStatus('idle');}}>Find My Accounts</button>
                </div>
                {results && (
                  <button className="btn-secondary" style={{fontSize:12,padding:'6px 14px'}}
                    onClick={()=>{
                      localStorage.removeItem('conga_m2_results');
                      localStorage.removeItem('conga_activated');
                      localStorage.removeItem('conga_activated_data');
                      setResults(null); setStatus('idle'); setError(null);
                    }}>
                    ↺ New Search
                  </button>
                )}
              </div>

              {!results && mode==='upload' && (
                <div className="card">
                  <div className="card-header">
                    <div className="card-icon"><IconList size={17}/></div>
                    <div>
                      <div className="card-title">Account List</div>
                      <div className="card-subtitle">
                        {parsedAccounts
                          ? `${parsedAccounts.length} accounts ready for analysis${filteredInfo ? ` (pre-filtered from ${filteredInfo.original})` : ''}`
                          : parseError ? 'Could not parse file' : 'Parsing file...'}
                      </div>
                    </div>
                  </div>

                  {filteredInfo && (
                    <div className="info-banner" style={{marginBottom:16}}>
                      <IconInfo size={15}/>
                      <span>Your file has <strong style={{color:'var(--text)'}}>{filteredInfo.original.toLocaleString()} accounts</strong>. We pre-filtered to the top <strong style={{color:'var(--text)'}}>200</strong> by industry priority and revenue before AI analysis.</span>
                    </div>
                  )}

                  {parseError && <div className="error-box">{parseError}</div>}

                  {parsedAccounts && !parseError && (
                    <div style={{overflowX:'auto',borderRadius:10,border:'1px solid var(--border)',maxHeight:280,overflowY:'auto'}}>
                      <table className="accounts-table">
                        <thead><tr><th>#</th><th>Company</th><th>Industry</th><th>Revenue</th><th>State</th><th>Type</th></tr></thead>
                        <tbody>
                          {parsedAccounts.slice(0,10).map((a,i)=>(
                            <tr key={i}>
                              <td style={{color:'var(--tfaint)',width:32,textAlign:'center',fontSize:11}}>{i+1}</td>
                              <td style={{fontWeight:500,color:'var(--text)'}}>{a.name}</td>
                              <td>{a.industry||'—'}</td>
                              <td>{fmtRevenue(a.revenue)||'—'}</td>
                              <td>{a.state||'—'}</td>
                              <td><span style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',
                                color:a.type==='Customer'?'var(--green)':'var(--tmuted)',
                                background:a.type==='Customer'?'var(--green-dim)':'var(--tfaint)',
                                padding:'2px 8px',borderRadius:20}}>{a.type||'—'}</span></td>
                            </tr>
                          ))}
                          {parsedAccounts.length>10 && (
                            <tr><td colSpan={6} style={{textAlign:'center',color:'var(--tfaint)',fontSize:12,padding:'10px'}}>
                              + {parsedAccounts.length-10} more accounts
                            </td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              )}

              {!results && mode==='discover' && (
                <>
                  <div className="card">
                    <div className="card-header">
                      <div className="card-icon"><IconPin size={17}/></div>
                      <div><div className="card-title">Sub-Region</div><div className="card-subtitle">Select specific states or countries (leave blank for all of {territory?.geo || 'your region'})</div></div>

    function buildChatSystemPrompt(account, pov, currentModule) {
      const povSummary = pov
        ? SECTION_CONFIG.map(s => {
            const content = pov[s.key];
            if (!content) return `${s.title}: (not yet generated)`;
            if (Array.isArray(content)) return `${s.title}:\n${content.map((x,i) => `${i+1}. ${x}`).join('\n')}`;
            return `${s.title}:\n${content}`;
          }).join('\n\n')
        : '(POV not yet generated)';

      const score   = account.combined_score || account.icp_score || account.score || null;
      const sigArr  = account.buying_signals || account.signals || [];
      const why     = account.primary_reason || account.outreach_angle || account.why || '';

      return `${BASE_ICP_CONTEXT}

You are an AI sales assistant helping a Conga + PROS sales rep build and refine their prospecting strategy.

CURRENT ACCOUNT: ${account.name}
Industry: ${account.industry || 'Unknown'}
Revenue: ${account.revenue ? fmtRevenue(account.revenue) : 'Unknown'}
ICP Score: ${score || 'N/A'}/10
Buying Signals: ${Array.isArray(sigArr) ? sigArr.join('; ') : (sigArr || 'None noted')}
Why They Fit: ${why}

CURRENT MODULE: ${currentModule === 3 ? 'Prospecting POV Builder' : currentModule === 4 ? 'Contact Research' : 'Sequence Builder'}

CURRENT POV FOR THIS ACCOUNT:
${povSummary}

You can help the rep:
- Research and refine the POV for this account
- Challenge assumptions or suggest better angles
- Provide additional proof points, use cases, or pain points
- Suggest edits to specific sections

IMPORTANT — When you want to suggest a direct edit to a POV section, wrap it EXACTLY like this:
[EDIT:section_key]Your suggested replacement content here[/EDIT]

Valid section keys: executive_summary, pain_points, conga_fit, use_cases, proof_points, next_steps

For bullet/numbered sections, separate items with newlines. For the executive_summary, write a single compelling statement.

Keep responses concise and actionable. Be a sharp, opinionated strategic advisor.`;
    }

    function parseAssistantMessage(text) {
      const editPattern = /\[EDIT:(\w+)\]([\s\S]*?)\[\/EDIT\]/g;
      const edits = [];
      let match;
      while ((match = editPattern.exec(text)) !== null) {
        edits.push({ sectionKey: match[1], content: match[2].trim() });
      }
      const cleanText = text.replace(/\[EDIT:\w+\][\s\S]*?\[\/EDIT\]/g, '').trim();
      return { cleanText, edits };
    }

    function parseSectionContent(text) {
      // Convert newline-separated text into array of items
      const lines = text.split('\n').map(l => l.replace(/^[-•*\d.]+\s*/, '').trim()).filter(Boolean);
      return lines;
    }

    function POVSection({ config, data, sources, onSave, onSaveSources, highlight }) {
      const [editing, setEditing]       = useState(false);
      const [editVal, setEditVal]       = useState('');
      const [showSources, setShowSources] = useState(false);
      const [editSources, setEditSources] = useState('');
      const [editingSources, setEditingSources] = useState(false);

      function startEdit() {
        setEditVal(Array.isArray(data) ? data.join('\n') : (data || ''));
        setEditing(true);
      }

      function saveEdit() {
        if (config.type === 'statement' || config.type === 'paragraph') {
          onSave(config.key, editVal.trim());
        } else {
          onSave(config.key, parseSectionContent(editVal));
        }
        setEditing(false);
      }

      function renderContent() {
        if (!data) return <p style={{fontSize:13,color:'var(--tfaint)',fontStyle:'italic'}}>Not yet generated — click "Generate POV" above.</p>;
        if (config.type === 'statement') return <p className="pov-statement-text">{data}</p>;
        if (config.type === 'paragraph')  return <p className="pov-paragraph">{data}</p>;
        if (config.type === 'bullets') {
          const items = Array.isArray(data) ? data : [data];
          return <ul className="pov-bullets">{items.map((item,i)=><li key={i}>{item}</li>)}</ul>;
        }
        if (config.type === 'numbered') {
          const items = Array.isArray(data) ? data : [data];
          return <ol className="pov-numbered">{items.map((item,i)=><li key={i}>{item}</li>)}</ol>;
        }
        return null;
      }

      const srcList = Array.isArray(sources) ? sources : [];

      return (
        <div className={`pov-section ${highlight ? 'highlight' : ''}`}>
          <div className="pov-section-header">
            <div className="pov-section-meta">
              <div className="pov-section-icon">{config.icon}</div>
              <div>
                <div className="pov-section-title">{config.title}</div>
                <div className="pov-section-desc">{config.desc}</div>
              </div>
            </div>
            {data && !editing && (
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {srcList.length > 0 && (
                  <button
                    className="btn-edit-section"
                    style={{color:'var(--text)',borderColor:'rgba(184,134,11,0.3)'}}
                    onClick={() => setShowSources(s => !s)}
                    title="View sources"
                  >
                    {showSources ? 'Hide Sources' : `Sources (${srcList.length})`}
                  </button>
                )}
                <button className="btn-edit-section" onClick={startEdit}>Edit</button>
              </div>
            )}
          </div>

          {editing ? (
            <>
              <textarea
                className="pov-edit-area"
                value={editVal}
                onChange={e => setEditVal(e.target.value)}
                placeholder={config.type === 'bullets' || config.type === 'numbered' ? 'One item per line…' : 'Enter content…'}
              />
              <div className="pov-edit-actions">
                <button className="btn-cancel-edit" onClick={() => setEditing(false)}>Cancel</button>
                <button className="btn-save-edit" onClick={saveEdit}>Save</button>
              </div>
            </>
          ) : renderContent()}

          {/* Sources panel */}
          {data && showSources && !editing && (
            <div className="pov-sources">
              <div className="pov-sources-header">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                Sources &amp; Basis for this section
                <button className="btn-edit-section" style={{marginLeft:'auto',fontSize:11}} onClick={() => {
                  setEditSources(srcList.join('\n'));
                  setEditingSources(true);
                }}>Edit</button>
              </div>
              {editingSources ? (
                <>
                  <textarea
                    className="pov-edit-area"
                    style={{minHeight:70,marginTop:8,fontSize:12}}
                    value={editSources}
                    onChange={e => setEditSources(e.target.value)}
                    placeholder="One source per line (e.g. Gartner 2024, Company earnings call, LinkedIn)"
                  />
                  <div className="pov-edit-actions">
                    <button className="btn-cancel-edit" onClick={() => setEditingSources(false)}>Cancel</button>
                    <button className="btn-save-edit" onClick={() => {
                      onSaveSources(config.key, editSources.split('\n').map(s=>s.trim()).filter(Boolean));
                      setEditingSources(false);
                    }}>Save</button>
                  </div>
                </>
              ) : (
                <ul className="pov-sources-list">
                  {srcList.length > 0
                    ? srcList.map((s,i) => <li key={i}>{s}</li>)
                    : <li style={{fontStyle:'italic',opacity:0.5}}>No sources recorded — click Edit to add</li>
                  }
                </ul>
              )}
            </div>
          )}
        </div>
      );
    }

    function ChatPanel({ open, onClose, account, pov, currentModule, model }) {
      const storageKey = `conga_chat_${account.name}`;
      const [messages, setMessages] = useState(() => {
        try { return JSON.parse(localStorage.getItem(storageKey) || '[]'); } catch { return []; }
      });
      const [input, setInput] = useState('');
      const [thinking, setThinking] = useState(false);
      const [pendingEdits, setPendingEdits] = useState([]);
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        localStorage.setItem(storageKey, JSON.stringify(messages));
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      // expose applyEdit callback via window so POVSection can call it
      // Instead we'll bubble it up through onApplyEdit prop
      async function sendMessage() {
        const text = input.trim();
        if (!text || thinking) return;
        setInput('');
        const newMessages = [...messages, { role: 'user', content: text, module: currentModule }];
        setMessages(newMessages);
        setThinking(true);
        setPendingEdits([]);

        try {
          const systemPrompt = buildChatSystemPrompt(account, pov, currentModule);
          const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
          const raw = await callClaude(model, systemPrompt, null, 2000, apiMessages);
          const { cleanText, edits } = parseAssistantMessage(raw);
          setMessages(prev => [...prev, { role: 'assistant', content: cleanText, module: currentModule, edits }]);
          if (edits.length > 0) setPendingEdits(edits);
        } catch(e) {
          setMessages(prev => [...prev, { role: 'assistant', content: `Sorry, something went wrong: ${e.message}`, module: currentModule, edits: [] }]);
        } finally {
          setThinking(false);
        }
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      }

      return (
        <div className={`m3-chat-panel ${open ? 'open' : ''}`}>
          <div className="chat-panel-inner">
            <div className="chat-panel-header">
              <div>
                <div className="chat-panel-title">AI Assistant</div>
                <div className="chat-panel-account">{account.name}</div>
              </div>
              <button className="btn-close-chat" onClick={onClose}>✕</button>
            </div>

            <div className="chat-messages">
              {messages.length === 0 && (
                <div style={{textAlign:'center',padding:'24px 12px',color:'var(--tmuted)'}}>
                  <div style={{fontSize:28,marginBottom:12,opacity:0.4}}>
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                  </div>
                  <p style={{fontSize:13,lineHeight:1.6}}>Ask me to research this account, challenge the POV, suggest edits, or find proof points.</p>
                </div>
              )}

              {messages.map((msg, i) => (
                <div key={i} className={`chat-msg ${msg.role}`}>
                  {msg.role === 'assistant' ? (
                    <>
                      <div className="chat-bubble">{msg.content}</div>
                      {msg.edits && msg.edits.map((edit, j) => (
                        <EditSuggestionCard
                          key={j}
                          edit={edit}
                          onApply={(key, content) => {
                            // dispatch a custom event so Module3 can intercept it
                            window.dispatchEvent(new CustomEvent('pov-apply-edit', { detail: { key, content } }));
                          }}
                        />
                      ))}
                    </>
                  ) : (
                    <span>{msg.content}</span>
                  )}
                </div>
              ))}

              {thinking && (
                <div className="chat-msg assistant">
                  <div className="chat-thinking">
                    <div className="chat-dot"/><div className="chat-dot"/><div className="chat-dot"/>
                  </div>
                </div>
              )}
              <div ref={messagesEndRef}/>
            </div>

            <div className="chat-input-area">
              <div className="chat-input-row">
                <textarea
                  ref={inputRef}
                  className="chat-input"
                  rows={1}
                  placeholder="Ask about this account…"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                />
                <button className="btn-send" disabled={!input.trim() || thinking} onClick={sendMessage}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                  </svg>
                </button>
              </div>
              <div className="chat-hint">Shift+Enter for new line · Enter to send</div>
            </div>
          </div>
        </div>
      );
    }

    function EditSuggestionCard({ edit, onApply }) {
      const config = SECTION_CONFIG.find(s => s.key === edit.sectionKey);
      if (!config) return null;
      const preview = edit.content.length > 120 ? edit.content.slice(0, 120) + '…' : edit.content;
      return (
        <div className="edit-suggestion">
          <div className="edit-suggestion-label">Suggested edit → {config.title}</div>
          <div className="edit-suggestion-preview">{preview}</div>
          <button className="btn-apply-edit" onClick={() => onApply(edit.sectionKey, edit.content)}>
            Apply to POV
          </button>
        </div>
      );
    }

    function AssistantFAB({ chatOpen, onClick }) {
      return (
        <button className={`assistant-fab ${chatOpen ? 'open' : ''}`} onClick={onClick}>
          {chatOpen ? (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          ) : (
            <>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              Assistant
            </>
          )}
        </button>
      );
    }

    function Module3({ territory, onBack, onContinue, model }) {
      // Load activated account objects directly — avoids name-matching issues
      // Primary: conga_activated_data (full objects saved when toggling)
      // Fallback: try to match names from conga_m2_results
      const loadAccounts = () => {
        const savedData = JSON.parse(localStorage.getItem('conga_activated_data') || '[]');
        if (savedData.length > 0) return savedData;
        // Fallback: loose name match
        const names = JSON.parse(localStorage.getItem('conga_activated') || '[]');
        const allResults = JSON.parse(localStorage.getItem('conga_m2_results') || '[]');
        const norm = s => (s||'').toLowerCase().trim().replace(/[.,]/g,'');
        const normNames = names.map(norm);
        return allResults.filter(r => normNames.includes(norm(r.name)));
      };
      const accounts = loadAccounts();
      // Helper to get the real score field (pass2 uses icp_score / combined_score)
      const getScore = a => a.combined_score || a.icp_score || a.score || null;
      const getSignals = a => a.buying_signals || a.signals || [];
      const getWhy = a => a.primary_reason || a.outreach_angle || a.why || '';

      const [activeIdx, setActiveIdx] = useState(0);
      const [chatOpen, setChatOpen] = useState(false);
      const [generating, setGenerating] = useState(false);
      const [genError, setGenError] = useState(null);
      // povData: { [accountName]: { section_key: content, ... } }
      const [povData, setPovData] = useState(() => {
        const out = {};
        accounts.forEach(a => {
          try { out[a.name] = JSON.parse(localStorage.getItem(`conga_pov_${a.name}`) || 'null') || {}; } catch { out[a.name] = {}; }
        });
        return out;
      });
      // context per account: { [accountName]: { notes, stakeholders, recentNews, productFocus } }
      const [contextData, setContextData] = useState(() => {
        const out = {};
        accounts.forEach(a => {
          try { out[a.name] = JSON.parse(localStorage.getItem(`conga_ctx_${a.name}`) || 'null') || {}; } catch { out[a.name] = {}; }
        });
        return out;
      });
      const [highlightedSection, setHighlightedSection] = useState(null);

      const account = accounts[activeIdx];

      // Listen for edit-apply events from chat panel
      useEffect(() => {
        function handleApplyEdit(e) {
          const { key, content } = e.detail;
          applyEditToSection(key, content);
          setHighlightedSection(key);
          setTimeout(() => setHighlightedSection(null), 2500);
        }
        window.addEventListener('pov-apply-edit', handleApplyEdit);
        return () => window.removeEventListener('pov-apply-edit', handleApplyEdit);
      }, [activeIdx, account]);

      function applyEditToSection(sectionKey, rawContent) {
        if (!account) return;
        const sConfig = SECTION_CONFIG.find(s => s.key === sectionKey);
        if (!sConfig) return;
        let parsed;
        if (sConfig.type === 'statement' || sConfig.type === 'paragraph') {
          parsed = rawContent.trim();
        } else {
          parsed = parseSectionContent(rawContent);
        }
        savePovSection(account.name, sectionKey, parsed);
      }

      function savePovSection(accountName, key, value, sourcesValue) {
        setPovData(prev => {
          const existing = prev[accountName] || {};
          const update = { [key]: value };
          if (sourcesValue !== undefined) update[`${key}_sources`] = sourcesValue;
          const next = { ...prev, [accountName]: { ...existing, ...update } };
          localStorage.setItem(`conga_pov_${accountName}`, JSON.stringify(next[accountName]));
          return next;
        });
      }

      function updateContext(field, value) {
        if (!account) return;
        setContextData(prev => {
          const next = { ...prev, [account.name]: { ...(prev[account.name] || {}), [field]: value } };
          localStorage.setItem(`conga_ctx_${account.name}`, JSON.stringify(next[account.name]));
          return next;
        });
      }

      async function generatePOV() {
        if (!account) return;
        setGenerating(true);
        setGenError(null);

        const ctx = contextData[account.name] || {};
        const sigArr = getSignals(account);
        const signals = Array.isArray(sigArr) ? sigArr.join('; ') : (sigArr || 'none noted');

        const accountContext = `ACCOUNT: ${account.name}
Industry: ${account.industry || 'Unknown'}
Revenue: ${account.revenue ? fmtRevenue(account.revenue) : 'Unknown'}
Employees: ${account.employees ? account.employees.toLocaleString() : 'Unknown'}
ICP Score: ${getScore(account) || 'N/A'}/10
Why They Fit ICP: ${getWhy(account)}
Buying Signals: ${signals}
${ctx.productFocus ? `Product Focus: ${ctx.productFocus}` : territory?.product ? `Product Focus: ${territory.product}` : ''}
${ctx.stakeholders ? `Known Stakeholders: ${ctx.stakeholders}` : ''}
${ctx.recentNews ? `Recent News / Context: ${ctx.recentNews}` : ''}
${ctx.notes ? `Rep Notes: ${ctx.notes}` : ''}`;

        const prompt1 = `Generate the first half of a Prospecting POV for this account. Return ONLY valid JSON — no markdown, no explanation.

${accountContext}

Return this EXACT JSON structure:
{
  "executive_summary": "One compelling executive value statement (2-3 sentences, no bullets)",
  "executive_summary_sources": ["source or basis for this statement"],
  "pain_points": ["specific pain point 1", "specific pain point 2", "specific pain point 3", "specific pain point 4"],
  "pain_points_sources": ["source 1", "source 2"],
  "conga_fit": ["specific fit reason 1", "specific fit reason 2", "specific fit reason 3"],
  "conga_fit_sources": ["source 1", "source 2"]
}

Sources should be specific: company filings, earnings calls, analyst reports (Gartner/Forrester), news articles, LinkedIn signals, or known customer references. If uncertain, note "Based on industry pattern" or "Inferred from ICP signals".
Make everything specific to ${account.name}'s industry, profile, and known signals. Draw directly on Conga + PROS product capabilities.`;

        const prompt2 = `Generate the second half of a Prospecting POV for this account. Return ONLY valid JSON — no markdown, no explanation.

${accountContext}

Return this EXACT JSON structure:
{
  "use_cases": ["use case 1 with specific outcome/metric", "use case 2 with outcome", "use case 3 with outcome"],
  "use_cases_sources": ["source 1", "source 2"],
  "proof_points": ["similar customer or ROI data point 1", "proof point 2", "proof point 3"],
  "proof_points_sources": ["source 1", "source 2"],
  "next_steps": ["specific actionable next step 1", "next step 2", "next step 3"],
  "next_steps_sources": ["rationale source 1"]
}

Sources should be specific: company filings, earnings calls, analyst reports (Gartner/Forrester), news articles, LinkedIn signals, or known customer references. If uncertain, note "Based on industry pattern" or "Inferred from ICP signals".
Make everything specific to ${account.name}'s industry, profile, and known signals. Draw directly on Conga + PROS product capabilities.`;

        try {
          const [raw1, raw2] = await Promise.all([
            callClaude(model, BASE_ICP_CONTEXT, prompt1, 3000),
            callClaude(model, BASE_ICP_CONTEXT, prompt2, 3000),
          ]);
          const parsed1 = extractJSON(raw1);
          const parsed2 = extractJSON(raw2);
          if (typeof parsed1 !== 'object' || Array.isArray(parsed1)) throw new Error('Unexpected response format (part 1). Please try again.');
          if (typeof parsed2 !== 'object' || Array.isArray(parsed2)) throw new Error('Unexpected response format (part 2). Please try again.');
          const parsed = { ...parsed1, ...parsed2 };
          setPovData(prev => {
            const next = { ...prev, [account.name]: parsed };
            localStorage.setItem(`conga_pov_${account.name}`, JSON.stringify(parsed));
            return next;
          });
        } catch(e) {
          setGenError(`Generation failed: ${e.message}`);
        } finally {
          setGenerating(false);
        }
      }

      function exportPOVsToExcel() {
        const wb = XLSX.utils.book_new();
        accounts.forEach(acc => {
          const pov = povData[acc.name] || {};
          const rows = [
            { Section: 'Executive Summary', Content: pov.executive_summary || '', Sources: (pov.executive_summary_sources || []).join('; ') },
            { Section: 'Business Pain Points', Content: Array.isArray(pov.pain_points) ? pov.pain_points.join('\n') : '', Sources: (pov.pain_points_sources || []).join('; ') },
            { Section: 'Conga + PROS Fit', Content: Array.isArray(pov.conga_fit) ? pov.conga_fit.join('\n') : '', Sources: (pov.conga_fit_sources || []).join('; ') },
            { Section: 'Use Cases', Content: Array.isArray(pov.use_cases) ? pov.use_cases.join('\n') : '', Sources: (pov.use_cases_sources || []).join('; ') },
            { Section: 'Proof Points', Content: Array.isArray(pov.proof_points) ? pov.proof_points.join('\n') : '', Sources: (pov.proof_points_sources || []).join('; ') },
            { Section: 'Next Steps', Content: Array.isArray(pov.next_steps) ? pov.next_steps.join('\n') : '', Sources: (pov.next_steps_sources || []).join('; ') },
          ];
          const ws = XLSX.utils.json_to_sheet(rows);
          ws['!cols'] = [{ wch: 22 }, { wch: 60 }, { wch: 30 }];
          const sheetName = acc.name.replace(/[:\\/?*[\]]/g, '').slice(0, 31);
          XLSX.utils.book_append_sheet(wb, ws, sheetName);
        });
        XLSX.writeFile(wb, `Conga_POVs_${new Date().toISOString().slice(0,10)}.xlsx`);
      }

      if (!account) {
        return (
          <div className="m3-outer">
            <div className="m3-wrap">
              <div className="m3-main">
                <div className="m3-empty">
                  <div className="m3-empty-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                  </div>
                  <div className="m3-empty-title">No Accounts Selected</div>
                  <div className="m3-empty-sub">Go back to Module 2 and select at least one account for outreach to build your POV.</div>
                  <button className="btn-secondary" style={{marginTop:24}} onClick={onBack}>← Back to Module 2</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const currentPov = povData[account.name] || {};
      const currentCtx = contextData[account.name] || {};
      const hasAnyPov = SECTION_CONFIG.some(s => currentPov[s.key]);

      return (
        <div className="m3-outer">
          <div className={`m3-wrap ${chatOpen ? 'chat-open' : ''}`}>
            <div className="m3-main">

              {/* Module header */}
              <div className="phase-label">Module 3</div>
              <h1 className="module-title">Prospecting POV Builder</h1>
              <p className="module-sub">Build a tailored point-of-view for each account — then let AI refine it through conversation.</p>

              {/* Account selector — dropdown + prev/next arrows */}
              <div className="acct-selector">
                <button
                  className="acct-nav-btn"
                  disabled={activeIdx === 0}
                  onClick={() => { setActiveIdx(i => i - 1); setChatOpen(false); }}
                  title="Previous account"
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>

                <div style={{flex:1,position:'relative'}}>
                  <select
                    className="acct-select"
                    value={activeIdx}
                    onChange={e => { setActiveIdx(Number(e.target.value)); setChatOpen(false); }}
                  >
                    {accounts.map((acc, i) => {
                      const hasPov = povData[acc.name] && SECTION_CONFIG.some(s => povData[acc.name][s.key]);
                      return (
                        <option key={acc.name} value={i}>
                          {hasPov ? '● ' : '○ '}{acc.name}  (ICP {getScore(acc) || '—'}/10)
                        </option>
                      );
                    })}
                  </select>
                  <div className="acct-counter">{activeIdx + 1} of {accounts.length}</div>
                </div>

                <button
                  className="acct-nav-btn"
                  disabled={activeIdx === accounts.length - 1}
                  onClick={() => { setActiveIdx(i => i + 1); setChatOpen(false); }}
                  title="Next account"
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
              </div>

              {/* Account overview card */}
              <div className="card" style={{marginBottom:20}}>
                <div className="card-header">
                  <div className="card-icon">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                  </div>
                  <div>
                    <div className="card-title">{account.name}</div>
                    <div className="card-subtitle">
                      {[account.industry, account.revenue ? fmtRevenue(account.revenue) : null, account.state].filter(Boolean).join(' · ')}
                    </div>
                  </div>
                  <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
                    {getScore(account) && (
                      <span style={{
                        fontSize:13,fontWeight:700,padding:'4px 12px',borderRadius:20,
                        background:'var(--amber-muted)',color:'var(--amber)'
                      }}>ICP {getScore(account)}/10</span>
                    )}
                  </div>
                </div>
                {getSignals(account).length > 0 && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:6,paddingTop:4}}>
                    {getSignals(account).map((s,i)=>(
                      <span key={i} style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:'var(--amber-muted)',color:'var(--amber)',fontWeight:500}}>{s}</span>
                    ))}
                  </div>
                )}
              </div>

              {/* Context form */}
              <div className="card" style={{marginBottom:20}}>
                <div className="card-header">
                  <div className="card-icon">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07"/><path d="M21.18 2.82A14 14 0 0 0 2.82 21.18"/>
                    </svg>
                  </div>
                  <div>
                    <div className="card-title">Rep Context <span style={{fontSize:11,color:'var(--tmuted)',fontWeight:400}}>(optional — helps AI personalize the POV)</span></div>
                  </div>
                </div>
                <div className="context-grid">
                  <div className="context-field">
                    <label className="field-label">Product Focus</label>
                    <select className="select" value={currentCtx.productFocus || territory?.product || ''} onChange={e=>updateContext('productFocus',e.target.value)}>
                      <option value="">Use territory default ({territory?.product || 'All Products'})</option>
                      {PRODUCTS.map(p=><option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                  <div className="context-field">
                    <label className="field-label">Known Stakeholders <span style={{fontWeight:400,color:'rgba(184,134,11,0.5)',fontSize:10,letterSpacing:'0.04em'}}>— optional</span></label>
                    <textarea className="context-textarea" rows={2} placeholder="e.g. Sarah Chen, CFO — met at Dreamforce" value={currentCtx.stakeholders||''} onChange={e=>updateContext('stakeholders',e.target.value)}/>
                  </div>
                  <div className="context-field">
                    <label className="field-label">Recent News / Signals <span style={{fontWeight:400,color:'rgba(184,134,11,0.5)',fontSize:10,letterSpacing:'0.04em'}}>— optional</span></label>
                    <textarea className="context-textarea" rows={2} placeholder="e.g. Just acquired XYZ, announced SAP migration" value={currentCtx.recentNews||''} onChange={e=>updateContext('recentNews',e.target.value)}/>
                  </div>
                  <div className="context-field">
                    <label className="field-label">Rep Notes <span style={{fontWeight:400,color:'rgba(184,134,11,0.5)',fontSize:10,letterSpacing:'0.04em'}}>— optional</span></label>
                    <textarea className="context-textarea" rows={2} placeholder="Anything else to help AI write a sharper POV" value={currentCtx.notes||''} onChange={e=>updateContext('notes',e.target.value)}/>
                  </div>
                </div>
              </div>

              {/* Generate button */}
              {generating && (
                <div className="pov-generating">
                  <IconSpinner size={18}/>
                  <span>Generating POV for <strong style={{color:'var(--text)'}}>{account.name}</strong>… This takes 15–30 seconds.</span>
                </div>
              )}
              {genError && <div className="error-box" style={{marginBottom:16}}>{genError}</div>}

              <div className="action-row" style={{marginBottom:24}}>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn-secondary" onClick={onBack}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:4}}><polyline points="15 18 9 12 15 6"/></svg>
                    Module 2
                  </button>
                  {hasAnyPov && (
                    <button className="btn-secondary" onClick={onContinue}>
                      Module 4
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:4}}><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                  )}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn-secondary" disabled={!hasAnyPov} onClick={exportPOVsToExcel}>↓ Export POVs</button>
                  <button className="btn-primary" disabled={generating} onClick={generatePOV}>
                    <IconBolt size={15}/>
                    {hasAnyPov ? 'Re-generate POV' : 'Generate POV'}
                  </button>
                </div>
              </div>

              {/* POV sections */}
              {SECTION_CONFIG.map(sConfig => (
                <POVSection
                  key={sConfig.key}
                  config={sConfig}
                  data={currentPov[sConfig.key]}
                  sources={currentPov[`${sConfig.key}_sources`]}
                  highlight={highlightedSection === sConfig.key}
                  onSave={(key, val) => savePovSection(account.name, key, val)}
                  onSaveSources={(key, val) => savePovSection(account.name, key, currentPov[key], val)}
                />
              ))}

              {/* Progress bar + Module 4 CTA */}
              <div className="activation-bar" style={{marginTop:24}}>
                <div className="activation-inner">
                  <div className="activation-count">
                    <span>{accounts.filter(a => povData[a.name] && SECTION_CONFIG.some(s => povData[a.name][s.key])).length}</span> of {accounts.length} POV{accounts.length!==1?'s':''} built
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn-secondary" onClick={onBack}>← Module 2</button>
                    <button className="btn-primary" disabled={!hasAnyPov} onClick={onContinue} style={!hasAnyPov?{opacity:0.5,cursor:'not-allowed'}:{}}>
                      Continue to Module 4 →
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {/* Chat panel */}
            <ChatPanel
              open={chatOpen}
              onClose={() => setChatOpen(false)}
              account={account}
              pov={currentPov}
              currentModule={3}
              model={model}
            />
          </div>

          <AssistantFAB chatOpen={chatOpen} onClick={() => setChatOpen(o => !o)} />
        </div>
      );
    }

    // ── Module 4 — Contact Research ───────────────────────────────

    function ContactCard({ contact, rank, onDelete, onEnrich }) {
      const [expanded, setExpanded] = useState(false);
      const roleColor = {
        'Economic Buyer': 'var(--amber)',
        'Champion':       'var(--green)',
        'Technical':      'var(--amber)',
        'Influencer':     'var(--text)',
        'Blocker':        'var(--red)',
      };

      const bgColor = contact.role === 'Economic Buyer' ? 'var(--amber-muted)'
        : contact.role === 'Champion'  ? 'var(--green-dim)'
        : contact.role === 'Blocker'   ? 'var(--red-dim)'
        : 'var(--amber-muted)';

        <div style={{
          background:'var(--surf-2)', border:'1px solid var(--border)',
          borderRadius:14, marginBottom:12, overflow:'hidden',
          transition:'border-color 0.2s',
        }}>
          {/* Header row */}
          <div
            style={{display:'flex',alignItems:'center',gap:14,padding:'18px 20px',cursor:'pointer'}}

            <div style={{
              width:40, height:40, borderRadius:'50%', flexShrink:0,

            }}>
              {(contact.name||'?').charAt(0).toUpperCase()}

            <div style={{flex:1, minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                <span style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{contact.name}</span>
                <span style={{
                  fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:20,
                  background:bgColor, color:color, letterSpacing:'0.05em', textTransform:'uppercase',
                }}>{contact.role}</span>
              </div>
              <div style={{fontSize:12,color:'var(--tmuted)'}}>{contact.title}</div>

                  onClick={e => e.stopPropagation()}
                  style={{color:'var(--text)',fontSize:11,textDecoration:'none'}}
                >LinkedIn ↗</a>
              )}
              {contact._manual && !contact.why_relevant && onEnrich && (
                <button
                  onClick={e => { e.stopPropagation(); onEnrich(); }}
                  style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:'var(--amber-muted)',color:'var(--amber)',border:'none',cursor:'pointer',fontWeight:600}}
                >✦ Enrich</button>
              )}
              {onDelete && (
                <button
                  onClick={e => { e.stopPropagation(); onDelete(); }}
                  title="Remove contact"
                  style={{background:'none',border:'none',cursor:'pointer',color:'var(--tfaint)',padding:4,lineHeight:1,fontSize:16,display:'flex',alignItems:'center'}}
                >×</button>
              )}
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tmuted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                style={{transform: expanded ? 'rotate(180deg)' : 'none', transition:'transform 0.2s'}}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>

          {/* Expanded detail */}
          {expanded && (
            <div style={{padding:'0 20px 20px', borderTop:'1px solid var(--border)'}}>
              {contact.why_relevant && (
                <div style={{marginTop:14}}>
                  <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--amber)',marginBottom:6}}>Why They Matter</div>
                  <p style={{fontSize:13,color:'var(--tmuted)',lineHeight:1.6}}>{contact.why_relevant}</p>
                </div>
              )}
              {contact.background && (
                <div style={{marginTop:14}}>
                  <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--amber)',marginBottom:6}}>Background & Signals</div>
                  <p style={{fontSize:13,color:'var(--tmuted)',lineHeight:1.6}}>{contact.background}</p>
                </div>
              )}
              {contact.conversation_starter && (
                <div style={{marginTop:14,padding:'12px 14px',background:'var(--amber-muted)',border:'1px solid rgba(184,134,11,0.25)',borderRadius:10}}>
                  <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--amber)',marginBottom:6}}>Conversation Starter</div>
                  <p style={{fontSize:13,color:'var(--text)',lineHeight:1.6,fontStyle:'italic'}}>"{contact.conversation_starter}"</p>
                </div>
              )}
              {contact.pain_points && contact.pain_points.length > 0 && (
                <div style={{marginTop:14}}>
                  <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--amber)',marginBottom:6}}>Likely Pain Points</div>
                  <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:6}}>
                    {contact.pain_points.map((p,i) => (
                      <li key={i} style={{display:'flex',gap:8,fontSize:13,color:'var(--tmuted)',lineHeight:1.5}}>
                        <span style={{width:6,height:6,borderRadius:'50%',background:'var(--amber)',flexShrink:0,marginTop:6}}/>
                        {p}
                      </li>
                    ))}
                  </ul>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function Module4({ territory, onBack, onContinue, model }) {
      const loadAccounts = () => {
        try {
          const d = JSON.parse(localStorage.getItem('conga_activated_data') || '[]');
          if (d.length > 0) return d;
          const names = JSON.parse(localStorage.getItem('conga_activated') || '[]');
          const results = JSON.parse(localStorage.getItem('conga_m2_results') || '[]');
          const norm = s => (s||'').toLowerCase().trim().replace(/[.,]/g,'');
          return results.filter(r => names.map(norm).includes(norm(r.name)));
        } catch { return []; }
      };
      const accounts = loadAccounts();
      const getScore = a => a.combined_score || a.icp_score || a.score || null;
      const getSignals = a => a.buying_signals || a.signals || [];

      const [activeIdx, setActiveIdx]   = useState(0);
      const [chatOpen, setChatOpen]     = useState(false);
      const [generating, setGenerating] = useState(false);
      const [genError, setGenError]     = useState(null);

      // contactData: { [accountName]: Contact[] }
      const [contactData, setContactData] = useState(() => {
        const out = {};
        accounts.forEach(a => {
          try { out[a.name] = JSON.parse(localStorage.getItem(`conga_contacts_${a.name}`) || 'null') || null; } catch { out[a.name] = null; }
        });
        return out;
      });

      const account  = accounts[activeIdx];
      const contacts = account ? (contactData[account.name] || null) : null;
      const hasContacts = contacts && contacts.length > 0;

      // Manual add-contact form state
      const [showAddForm, setShowAddForm] = useState(false);
      const [newContact, setNewContact] = useState({ name:'', title:'', role:'Champion', email:'', notes:'' });
      const [enriching, setEnriching] = useState(false);

      // Reset add form when switching accounts
      useEffect(() => {
        setShowAddForm(false);
        setNewContact({ name:'', title:'', role:'Champion', email:'', notes:'' });
        setGenError(null);
      }, [activeIdx]);

      function saveContacts(accountName, data) {
        setContactData(prev => {
          const next = { ...prev, [accountName]: data };
          localStorage.setItem(`conga_contacts_${accountName}`, JSON.stringify(data));
          return next;
        });
      }

      function deleteContact(idx) {
        if (!account) return;
        const current = contactData[account.name] || [];
        const next = current.filter((_, i) => i !== idx);
        saveContacts(account.name, next);
      }

      async function enrichContact(draft) {
        setEnriching(true);
        const pov = (() => { try { return JSON.parse(localStorage.getItem(`conga_pov_${account.name}`) || 'null'); } catch { return null; } })();
        const sigArr = getSignals(account);
        const signals = Array.isArray(sigArr) ? sigArr.join('; ') : (sigArr || 'none noted');
        const prompt = `Enrich this contact record for a B2B sales outreach at ${account.name}. Return ONLY a raw JSON object (no markdown):

CONTACT:
Name: ${draft.name || 'Unknown'}
Title: ${draft.title || 'Unknown'}
Role in deal: ${draft.role}
Notes / LinkedIn text: ${draft.notes || 'none provided'}
Email: ${draft.email || 'not provided'}

ACCOUNT:
Company: ${account.name}
Industry: ${account.industry || 'Unknown'}
Revenue: ${account.revenue ? fmtRevenue(account.revenue) : 'Unknown'}
ICP Score: ${getScore(account) || 'N/A'}/10
Buying Signals: ${signals}
Recommended Product: ${account.recommended_product || territory?.product || 'All Products'}
${pov ? `POV Summary: ${pov.executive_summary || ''}` : ''}

Return this JSON structure:
{
  "name": "${draft.name || 'Unknown'}",
  "title": "${draft.title || 'Unknown'}",
  "department": "Department inferred from title",
  "role": "${draft.role}",
  "linkedin": true,
  "why_relevant": "Why this person is critical to this deal (2 sentences)",
  "background": "Relevant professional background, likely tenure, signals based on title and company",
  "conversation_starter": "A specific, sharp opening line for outreach — personalized to their role and company context",
  "pain_points": ["pain point 1 specific to their role", "pain point 2", "pain point 3"]
}`;
        try {
          const raw = await callClaude(model, BASE_ICP_CONTEXT, prompt, 1500);
          const parsed = extractJSON(raw);
          if (typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('Unexpected format');
          return { ...draft, ...parsed, _manual: true };
        } catch(e) {
          setGenError(`Enrichment failed: ${e.message}`);
          return null;
        } finally {
          setEnriching(false);
        }
      }

      async function addContact(doEnrich) {
        if (!newContact.name.trim() && !newContact.title.trim()) return;
        let contact = {
          name: newContact.name.trim() || `Likely ${newContact.title}`,
          title: newContact.title.trim(),
          role: newContact.role,
          department: '',
          linkedin: false,
          why_relevant: '',
          background: '',
          conversation_starter: '',
          pain_points: [],
          _manual: true,
          ...(newContact.email ? { email: newContact.email.trim() } : {}),
          ...(newContact.notes ? { notes: newContact.notes.trim() } : {}),
        };
        if (doEnrich) {
          const enriched = await enrichContact({ ...contact, notes: newContact.notes });
          if (enriched) contact = enriched;
        }
        const current = contactData[account.name] || [];
        saveContacts(account.name, [...current, contact]);
        setNewContact({ name:'', title:'', role:'Champion', email:'', notes:'' });
        setShowAddForm(false);
      }

      async function generateContacts() {
        if (!account) return;
        setGenerating(true);
        setGenError(null);

        const pov = (() => { try { return JSON.parse(localStorage.getItem(`conga_pov_${account.name}`) || 'null'); } catch { return null; } })();
        const sigArr = getSignals(account);
        const signals = Array.isArray(sigArr) ? sigArr.join('; ') : (sigArr || 'none noted');

        const prompt = `Research and identify the top 4-5 contacts to reach out to at ${account.name} for a Conga + PROS sales outreach.

ACCOUNT CONTEXT:
Company: ${account.name}
Industry: ${account.industry || 'Unknown'}
Revenue: ${account.revenue ? fmtRevenue(account.revenue) : 'Unknown'}
ICP Score: ${getScore(account) || 'N/A'}/10
Buying Signals: ${signals}
Tech Stack: ${Array.isArray(account.tech_stack) ? account.tech_stack.join(', ') : (account.tech_stack || 'Unknown')}
Recommended Product: ${account.recommended_product || territory?.product || 'All Products'}
${pov ? `POV Summary: ${pov.executive_summary || ''}` : ''}

Identify 4-5 key contacts including: Economic Buyer (CFO/CPO/COO/CRO), Champion (RevOps/Sales Ops/Pricing Manager), Technical contact (IT/CTO/Architect), and key Influencer.

Return ONLY a JSON array, no markdown:
[
  {
    "name": "First Last (or 'Likely [Title]' if unknown)",
    "title": "Job Title",
    "department": "Department",
    "role": "Economic Buyer|Champion|Technical|Influencer|Blocker",
    "linkedin": true,
    "why_relevant": "Why this person matters for this deal (2 sentences)",
    "background": "Relevant background, tenure, recent activity, or signals you know about this type of role at this company",
    "conversation_starter": "A specific, personalized opening line for outreach — reference something real about them or their company",
    "pain_points": ["pain point specific to their role", "pain point 2", "pain point 3"]
  }
]

Make contact names realistic for this company (use known executives if you know them, otherwise use 'Likely [Title]'). Make conversation starters sharp and specific — no generic openers.`;

        try {
          const raw = await callClaude(model, BASE_ICP_CONTEXT, prompt, 4000);
          const parsed = extractJSON(raw);
          if (!Array.isArray(parsed)) throw new Error('Unexpected format — please try again.');
          saveContacts(account.name, parsed);
        } catch(e) {
          setGenError(`Research failed: ${e.message}`);
        } finally {
          setGenerating(false);
        }
      }

      if (!account) {
        return (
          <div className="m3-outer">
            <div className="m3-wrap">
              <div className="m3-main">
                <div className="m3-empty">
                  <div className="m3-empty-title">No Accounts Selected</div>
                  <div className="m3-empty-sub">Go back to Module 2 and select accounts for outreach first.</div>
                  <button className="btn-secondary" style={{marginTop:24}} onClick={onBack}>← Module 3</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const povForChat = (() => { try { return JSON.parse(localStorage.getItem(`conga_pov_${account.name}`) || 'null'); } catch { return null; } })();

      return (
        <div className="m3-outer">
          <div className={`m3-wrap ${chatOpen ? 'chat-open' : ''}`}>
            <div className="m3-main">

              <div className="phase-label">Module 4</div>
              <h1 className="module-title">Contact Research</h1>
              <p className="module-sub">Identify and research the key contacts at each account — who to call, why they care, and how to open the conversation.</p>

              {/* Account selector */}
              <div className="acct-selector">
                <button className="acct-nav-btn" disabled={activeIdx===0} onClick={()=>setActiveIdx(i=>i-1)}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div style={{flex:1,position:'relative'}}>
                  <select className="acct-select" value={activeIdx} onChange={e=>{setActiveIdx(Number(e.target.value));setChatOpen(false);}}>
                    {accounts.map((acc,i)=>{
                      const hasC = !!(contactData[acc.name] && contactData[acc.name].length > 0);
                      return <option key={acc.name} value={i}>{hasC?'● ':'○ '}{acc.name}  (ICP {getScore(acc)||'—'}/10)</option>;
                    })}
                  </select>
                  <div className="acct-counter">{activeIdx+1} of {accounts.length}</div>
                </div>
                <button className="acct-nav-btn" disabled={activeIdx===accounts.length-1} onClick={()=>setActiveIdx(i=>i+1)}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
              </div>

              {/* Account summary */}
              <div className="card" style={{marginBottom:20}}>
                <div className="card-header">
                  <div className="card-icon">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                  </div>
                  <div>
                    <div className="card-title">{account.name}</div>
                    <div className="card-subtitle">{[account.industry, account.revenue ? fmtRevenue(account.revenue) : null, account.state].filter(Boolean).join(' · ')}</div>
                  </div>
                  {getScore(account) && (
                    <span style={{marginLeft:'auto',fontSize:13,fontWeight:700,padding:'4px 12px',borderRadius:20,background:'var(--amber-muted)',color:'var(--amber)'}}>
                      ICP {getScore(account)}/10
                    </span>
                  )}
                </div>
                {getSignals(account).length > 0 && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:6,paddingTop:4}}>
                    {getSignals(account).map((s,i)=>(
                      <span key={i} style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:'var(--amber-muted)',color:'var(--amber)',fontWeight:500}}>{s}</span>
                    ))}
                  </div>
                )}
              </div>

              {/* Generate / action row */}
              {generating && (
                <div className="pov-generating">
                  <IconSpinner size={18}/>
                  <span>Researching contacts at <strong style={{color:'var(--text)'}}>{account.name}</strong>… 15–30 seconds.</span>
                </div>
              )}
              {genError && <div className="error-box" style={{marginBottom:16}}>{genError}</div>}

              <div className="action-row" style={{marginBottom:24}}>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn-secondary" onClick={onBack}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:4}}><polyline points="15 18 9 12 15 6"/></svg>
                    Module 3
                  </button>
                  {hasContacts && (
                    <button className="btn-secondary" onClick={onContinue}>
                      Module 5
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:4}}><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                  )}
                </div>
                <button className="btn-primary" disabled={generating} onClick={generateContacts}>
                  <IconBolt size={15}/>
                  {hasContacts ? 'Re-research Contacts' : 'Research Contacts'}
                </button>
              </div>

              {/* Contact cards */}
              {contacts && contacts.map((c, i) => (
                <ContactCard key={i} contact={c} rank={i+1}
                  onDelete={() => deleteContact(i)}
                  onEnrich={async () => {
                    const enriched = await enrichContact(c);
                    if (enriched) {
                      const current = contactData[account.name] || [];
                      const updated = current.map((x, xi) => xi === i ? enriched : x);
                      saveContacts(account.name, updated);
                    }
                  }}
                />
              ))}

              {!contacts && !generating && (
                <div style={{textAlign:'center',padding:'48px 24px',color:'var(--tmuted)'}}>
                  <div style={{marginBottom:12,opacity:0.4}}>
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    </svg>
                  </div>
                  <div style={{fontSize:16,fontWeight:500,color:'var(--text)',marginBottom:8}}>No contacts yet</div>
                  <div style={{fontSize:13,lineHeight:1.6,maxWidth:380,margin:'0 auto'}}>Click "Research Contacts" and AI will identify the 4–5 key people to reach out to at {account.name}. Or add contacts manually below.</div>
                </div>
              )}

              {/* Add contact form */}
              <div style={{marginTop: contacts && contacts.length > 0 ? 8 : 0}}>
                {!showAddForm ? (
                  <button
                    className="btn-secondary"
