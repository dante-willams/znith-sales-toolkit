function ContextPanel({ dealState }) {
  const { setup, stakeholders, meddpicc, calls, coaching } = dealState;
  const healthScore = computeHealthScore(meddpicc);

  const getInitials = (name) => {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  };

  // Health arc — use stroke-dasharray for reliability
  // Semicircle from left to right, radius 45, circumference of half-circle = PI * 45 ≈ 141.37
  const arcPath = "M 15 60 A 45 45 0 0 1 105 60"; // left to right semicircle
  const arcLength = Math.PI * 45; // ~141.37
  const filledLength = (healthScore / 100) * arcLength;
  const healthColor = healthScore >= 70 ? 'var(--green)' : healthScore >= 40 ? 'var(--yellow)' : 'var(--red)';

  const sortedCalls = [...calls].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

  return (
    <div className="context-panel">
      {/* Health Widget */}
      <div className="ctx-section">
        <div className="health-widget">
          <div className="health-arc">
            <svg width="120" height="68" viewBox="0 0 120 68">
              <path d={arcPath} fill="none" stroke="var(--border)" strokeWidth="8" strokeLinecap="round" />
              <path d={arcPath} fill="none" stroke={healthColor} strokeWidth="8" strokeLinecap="round"
                strokeDasharray={`${filledLength} ${arcLength}`} />
            </svg>
          </div>
          <div className="health-value" style={{color: healthColor}}>{healthScore}%</div>
          <div className="health-label">Deal Health</div>
        </div>
      </div>

      {/* Coaching: Forecast + Next Actions */}
      {coaching?.forecast && (
        <div className="ctx-section">
          <div className="ctx-title">Forecast</div>
          <div style={{
            fontFamily: 'var(--f-brand)', fontSize: 16, fontWeight: 800,
            color: {Commit:'var(--green)','Best Case':'var(--yellow)',Pipeline:'var(--amber)','At Risk':'var(--red)'}[coaching.forecast]||'var(--amber)',
            marginBottom: 4,
          }}>{coaching.forecast}</div>
          <div style={{fontSize: 11, color: 'var(--tfaint)', lineHeight: 1.4}}>{coaching.forecastReason?.slice(0, 100)}{coaching.forecastReason?.length > 100 ? '...' : ''}</div>
        </div>
      )}

      {coaching?.nextActions?.length > 0 && (
        <div className="ctx-section">
          <div className="ctx-title">Next Actions</div>
          {[...coaching.nextActions].sort((a,b)=>(a.priority||99)-(b.priority||99)).slice(0, 3).map((a, i) => (
            <div key={i} style={{display:'flex',gap:8,paddingBottom:8,marginBottom:8,borderBottom:'1px solid var(--border)',fontSize:12}}>
              <span style={{fontFamily:'var(--f-mono)',fontSize:11,fontWeight:700,color:'var(--accent)',flexShrink:0}}>{i+1}</span>
              <span style={{color:'var(--text)',lineHeight:1.4}}>{a.action}</span>
            </div>
          ))}
        </div>
      )}

      {/* MEDDPICC Quick */}
      <div className="ctx-section">
        <div className="ctx-title">MEDDPICC</div>
        <div className="meddpicc-quick">
          {Object.entries(MEDDPICC_LABELS).map(([key, label]) => {
            const abbr = label.split(' ').map(w => w[0]).join('');
            return (
              <div className="meddpicc-pill" key={key}>
                <span className={`dot dot-${meddpicc[key]?.status || 'red'}`}></span>
                {abbr}
              </div>
            );
          })}
        </div>
      </div>

      {/* Stakeholders */}
      <div className="ctx-section">
        <div className="ctx-title">
          Stakeholders
          <span style={{fontFamily: 'var(--f-mono)', fontSize: 10, color: 'var(--tfaint)'}}>{stakeholders.length}</span>
        </div>
        {stakeholders.slice(0, 5).map(s => (
          <div className="ctx-stakeholder" key={s.id}>
            <div className="avatar">{getInitials(s.name)}</div>
            <span className="name">{s.name || 'Unnamed'}</span>
            <span className="role">{s.role}</span>
          </div>
        ))}
        {stakeholders.length === 0 && (
          <div style={{fontSize: 12, color: 'var(--tfaint)', padding: '4px 0'}}>No stakeholders mapped</div>
        )}
      </div>

      {/* Account Intel */}
      <div className="ctx-section">
        <div className="ctx-title">Account Intel</div>
        <div className="ctx-intel">
          <strong>Account:</strong> {setup.account || 'Not set'}<br/>
          <strong>Industry:</strong> {setup.industry || 'N/A'}<br/>
          <strong>CRM:</strong> {setup.crm || 'N/A'} | <strong>ERP:</strong> {setup.erp || 'N/A'}<br/>
          <strong>Stage:</strong> {setup.stage || 'N/A'}<br/>

      ) : (

function ChatPanel({ open, onClose, dealState }) {
  const { chatHistory, setChatHistory, dealContext } = dealState;
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  };

  useEffect(() => { scrollToBottom(); }, [chatHistory, loading]);

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: 'user', content: input.trim() };
    const newHistory = [...chatHistory, userMsg];
    setChatHistory(newHistory);
    setInput('');
    setLoading(true);

    try {
      // Build messages for API - include deal context in first message
      const apiMessages = newHistory.map((m, i) => ({
        role: m.role === 'ai' ? 'assistant' : m.role,
        content: i === 0 ? dealContext + '\n\nUser question: ' + m.content : m.content,
      }));

      const data = await callAPI({
        model: API_CONFIG.fastModel,
        system: [{ type: 'text', text: DEAL_COACH_BRAIN, cache_control: { type: 'ephemeral' } }],
        messages: apiMessages,
        maxTokens: 2000,
      });
      const text = extractText(data);
      setChatHistory(prev => [...prev, { role: 'ai', content: text }]);
    } catch (err) {
      setChatHistory(prev => [...prev, { role: 'ai', content: `Error: ${err.message}` }]);
    }
    setLoading(false);
  };

  return (
    <div className={`chat-panel ${open ? 'open' : ''}`}>
      <div className="chat-top">
        <h3><span className="dot"></span> Deal Coach</h3>
        <button className="chat-close" onClick={onClose}>&times;</button>
      </div>
      <div className="chat-messages">
        {chatHistory.length === 0 && (
          <div style={{textAlign: 'center', color: 'var(--tmuted)', fontSize: 13, padding: '20px 0'}}>
            Ask me about your deal strategy, MEDDPICC gaps, or next steps.
          </div>
        )}
        {chatHistory.map((m, i) => (
          <div key={i} className={`chat-msg ${m.role === 'user' ? 'user' : 'ai'}`}>
            {m.content}
          </div>
        ))}
        {loading && (
          <div className="chat-msg ai">
            <LoadingDots />
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>
      <div className="chat-input-area">
        <div className="chat-input-row">
          <input
            className="chat-input"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && sendMessage()}
            placeholder="Ask the Deal Coach..."
          />
          <button className="chat-send-btn" onClick={sendMessage} disabled={loading || !input.trim()}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Deal Landing / Home Page ───
function DealLandingPage({ dealState, onOpenDeal, onCreateDeal }) {
  const [showCreate, setShowCreate] = useState(false);

      setShowCreate(false);
    }

  const deleteDeal = (id, name) => {
    if (confirm(`Delete "${name}"? This cannot be undone.`)) {
      // Remove from deals list
      const updated = dealState.deals.filter(d => d.id !== id);
      localStorage.setItem('winroom_deals', JSON.stringify(updated));
      // Clean up localStorage for this deal
      ['setup','stakeholders','calls','meddpicc','msp','summary','chat','docs','prepResult','debriefResult','coaching','coachingTs'].forEach(suffix => {
        localStorage.removeItem(`winroom_${id}_${suffix}`);

    <>
      <div style={{background: 'var(--navy)', height: 56, display: 'flex', alignItems: 'center', padding: '0 24px', gap: 16, flexShrink: 0}}>
        <svg style={{height: 22, opacity: 0.9}} viewBox="0 0 4069.194 1080" xmlns="http://www.w3.org/2000/svg" fill="#fff"><path d={CONGA_LOGO_PATH} /></svg>
        <div style={{width: 1, height: 24, background: 'rgba(255,255,255,0.12)'}}></div>
        <div style={{fontFamily: 'var(--f-brand)', fontSize: 16, fontWeight: 600, color: '#fff', display: 'flex', alignItems: 'center', gap: 8}}>
          <span style={{width: 8, height: 8, borderRadius: '50%', background: 'var(--amber)', boxShadow: '0 0 6px var(--amber-glow)'}}></span>
          Win Room
        </div>
      </div>
      <div style={{flex: 1, overflow: 'auto', padding: '40px 32px', maxWidth: 900, margin: '0 auto', width: '100%'}}>
        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 32}}>
          <div>
            <h1 style={{fontFamily: 'var(--f-brand)', fontSize: 28, fontWeight: 800, color: 'var(--navy)', marginBottom: 4}}>Your Deal Rooms</h1>
            <p style={{fontSize: 14, color: 'var(--tmuted)'}}>Select a deal to open or create a new one.</p>
          </div>
          <button className="btn btn-primary" onClick={() => setShowCreate(true)} style={{fontSize: 13, padding: '10px 22px'}}>
            + New Deal

        </div>

        {showCreate && (
          <div className="card" style={{borderLeft: '3px solid var(--amber)', marginBottom: 20}}>
            <div className="card-label">Create New Deal Room</div>
            <div style={{display: 'flex', gap: 10, alignItems: 'center'}}>

              <button className="btn btn-primary" onClick={handleCreate} disabled={!newName.trim()}>Create</button>
              <button className="btn btn-secondary" onClick={() => { setShowCreate(false); setNewName(''); }}>Cancel</button>
            </div>
          </div>
        )}

        {dealState.deals.length === 0 && !showCreate && (
          <div className="empty-state" style={{padding: '60px 20px'}}>
            <h3>No deals yet</h3>
            <p>Create your first deal room to start AI-powered coaching.</p>
          </div>
        )}

        <div style={{display: 'flex', flexDirection: 'column', gap: 10}}>
          {dealState.deals.sort((a,b) => new Date(b.lastModified) - new Date(a.lastModified)).map(deal => {
            const health = deal.health || 0;
            const healthColor = health >= 70 ? 'var(--green)' : health >= 40 ? 'var(--yellow)' : 'var(--red)';
            const setupData = (() => { try { return JSON.parse(localStorage.getItem(`winroom_${deal.id}_setup`)) || {}; } catch { return {}; } })();
            const callCount = (() => { try { return JSON.parse(localStorage.getItem(`winroom_${deal.id}_calls`))?.length || 0; } catch { return 0; } })();
            const stakeCount = (() => { try { return JSON.parse(localStorage.getItem(`winroom_${deal.id}_stakeholders`))?.length || 0; } catch { return 0; } })();

            return (

                onMouseOut={e => e.currentTarget.style.borderColor = ''}
              >
                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start'}}>

                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <Footer />
    </>
  );
}

function App() {
  const dealState = useDealState();
  const [view, setView] = useState('home');
  const [activeSection, setActiveSection] = useState('call-hub');
  const [chatOpen, setChatOpen] = useState(false);
  const [pendingDealId, setPendingDealId] = useState(null);
  const [pendingSection, setPendingSection] = useState('call-hub');

  // When a deal is requested, wait for activeDealId to match before showing deal view
  useEffect(() => {
    if (pendingDealId && dealState.activeDealId === pendingDealId) {
      // Deal state is loaded — safe to show
      setView('deal');
      setActiveSection(pendingSection);
      setPendingDealId(null);
    }
  }, [dealState.activeDealId, pendingDealId, pendingSection]);

  const openDeal = (id) => {
    setPendingSection('call-hub');
    setPendingDealId(id);
    dealState.switchDeal(id);
  };

  const createAndOpenDeal = (name) => {
    const id = dealState.createDeal(name);
    setPendingSection('deal-setup');
    setPendingDealId(id);
  };

  const goHome = () => {
    dealState.updateDealIndex();
    setView('home');
    setChatOpen(false);
  };

  if (view === 'home') {
    return <DealLandingPage dealState={dealState} onOpenDeal={openDeal} onCreateDeal={createAndOpenDeal} />;
  }

  if (!dealState.activeDealId) return <DealLandingPage dealState={dealState} onOpenDeal={openDeal} onCreateDeal={createAndOpenDeal} />;

  return (
    <>
      <TopBar dealState={dealState} onNewDeal={goHome} onGoHome={goHome} />
      <div className="app-body">
        <NavRail active={activeSection} onNav={setActiveSection} />
        <main className="workspace">
          <div style={{display: activeSection === 'deal-setup' ? 'block' : 'none'}}><DealSetup dealState={dealState} /></div>
          <div style={{display: activeSection === 'stakeholders' ? 'block' : 'none'}}><StakeholderSection dealState={dealState} /></div>
          <div style={{display: activeSection === 'call-hub' ? 'block' : 'none'}}><CallHub dealState={dealState} /></div>
          <div style={{display: activeSection === 'strategy' ? 'block' : 'none'}}><StrategySection dealState={dealState} /></div>
          <div style={{display: activeSection === 'mutual-plan' ? 'block' : 'none'}}><MutualPlanSection dealState={dealState} /></div>
          <div style={{display: activeSection === 'deal-review' ? 'block' : 'none'}}><DealReviewSection dealState={dealState} /></div>
          <div style={{display: activeSection === 'deal-brief' ? 'block' : 'none'}}><DealBriefSection dealState={dealState} /></div>
        </main>
        <ContextPanel dealState={dealState} />
      </div>
      <Footer />
      <ChatFAB open={chatOpen} onToggle={() => setChatOpen(!chatOpen)} />
      <ChatPanel open={chatOpen} onClose={() => setChatOpen(false)} dealState={dealState} />
    </>
  );
}

// RENDER
// ═══════════════════════════════════════════════════════════════════

const root = document.getElementById('root');
ReactDOM.createRoot(root).render(<App />);
</script>
</body>
