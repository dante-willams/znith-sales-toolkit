// CALL HUB (Phase 3 - Fully Functional with AI)
// ═══════════════════════════════════════════════════════════════════

function CallHub({ dealState }) {
  const [tab, setTab] = useState('prep');
  // Lift state up so it survives tab switches
  const [prepResult, setPrepResult] = usePersistedState(`winroom_${dealState.activeDealId}_prepResult`, null);
  const [prepLoading, setPrepLoading] = useState(false);
  const [prepError, setPrepError] = useState('');
  const [debriefResult, setDebriefResult] = usePersistedState(`winroom_${dealState.activeDealId}_debriefResult`, null);
  const [debriefLoading, setDebriefLoading] = useState(false);
  const [debriefError, setDebriefError] = useState('');
  const [debriefForm, setDebriefForm] = useState({ callType: '', callDate: new Date().toISOString().split('T')[0], attendees: '', notes: '' });
  const [debriefFiles, setDebriefFiles] = useState([]);
  const [debriefTranscriptText, setDebriefTranscriptText] = useState('');

  return (
    <div style={{animation: 'fadeIn 0.25s ease'}}>
      <div className="section-header">
        <div className="section-header-text">
          <h2>Call Hub</h2>
          <p>Prepare, execute, and debrief every customer interaction</p>
        </div>
        <SectionSaveBtn dealState={dealState} />
      </div>

      <div className="hub-tabs">
        <button className={`hub-tab ${tab === 'prep' ? 'active' : ''}`} onClick={() => setTab('prep')}>Next Call Prep</button>
        <button className={`hub-tab ${tab === 'debrief' ? 'active' : ''}`} onClick={() => setTab('debrief')}>Log a Call</button>
        <button className={`hub-tab ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>Call History ({dealState.calls.length})</button>
      </div>

      <CallTimeline dealState={dealState} />

      {/* Use display:none instead of unmounting so state survives */}
      <div style={{display: tab === 'prep' ? 'block' : 'none'}}>
        <CallPrep dealState={dealState} prepResult={prepResult} setPrepResult={setPrepResult} loading={prepLoading} setLoading={setPrepLoading} error={prepError} setError={setPrepError} />
      </div>
      <div style={{display: tab === 'debrief' ? 'block' : 'none'}}>
        <CallDebrief dealState={dealState} debriefResult={debriefResult} setDebriefResult={setDebriefResult} loading={debriefLoading} setLoading={setDebriefLoading} error={debriefError} setError={setDebriefError} form={debriefForm} setForm={setDebriefForm} files={debriefFiles} setFiles={setDebriefFiles} transcriptText={debriefTranscriptText} setTranscriptText={setDebriefTranscriptText} />
      </div>
      <div style={{display: tab === 'history' ? 'block' : 'none'}}>
        <CallHistory dealState={dealState} />
      </div>
    </div>
  );
}

function CallTimeline({ dealState }) {
  const { calls } = dealState;
  const [selectedCall, setSelectedCall] = useState(null);
  const sortedCalls = [...calls].sort((a, b) => new Date(a.date) - new Date(b.date));

  return (
    <>
      <div className="call-timeline">
        {sortedCalls.length === 0 && (
          <div style={{width: '100%', textAlign: 'center', color: 'var(--tmuted)', fontSize: 12, padding: '8px 0'}}>
            No calls logged yet. Use Debrief to add completed calls.
          </div>
        )}
        {sortedCalls.map((c, i) => (
          <React.Fragment key={c.id}>
            <div className="call-node past" onClick={() => setSelectedCall(c)}>
              <div className="call-dot"></div>
              <span className="call-num">{c.type}</span>
              <span className="call-date">{formatDate(c.date)}</span>
            </div>
            {i < sortedCalls.length - 1 && <div className="call-connector done"></div>}
          </React.Fragment>
        ))}
        {sortedCalls.length > 0 && <div className="call-connector"></div>}
        <div className="call-node upcoming">
          <div className="call-dot"></div>
          <span className="call-num">Next</span>
          <span className="call-date">Upcoming</span>
        </div>
      </div>

      {selectedCall && (
        <div className="call-detail-overlay" onClick={() => setSelectedCall(null)}>
          <div className="call-detail-box" onClick={e => e.stopPropagation()}>
            <h3 style={{fontFamily: 'var(--f-brand)', fontSize: 16, fontWeight: 600, marginBottom: 4}}>{selectedCall.type}</h3>
            <div style={{fontFamily: 'var(--f-mono)', fontSize: 11, color: 'var(--tmuted)', marginBottom: 16}}>
              {selectedCall.date} | {selectedCall.attendees}
            </div>
            {selectedCall.summary && <p style={{fontSize: 13, color: 'var(--tmuted)', lineHeight: 1.6, marginBottom: 12}}>{selectedCall.summary}</p>}
            {selectedCall.transcript && (
              <div style={{fontSize: 12, color: 'var(--tmuted)', background: 'var(--surf-2)', padding: 12, borderRadius: 6, maxHeight: 200, overflowY: 'auto', whiteSpace: 'pre-wrap'}}>
                {selectedCall.transcript.slice(0, 2000)}
              </div>
            )}
            <button className="btn btn-secondary" onClick={() => setSelectedCall(null)} style={{marginTop: 16}}>Close</button>
          </div>
        </div>
      )}
    </>
  );
}

// ─── Call History (editable list of all past calls) ───
function CallHistory({ dealState }) {
  const { calls, setCalls } = dealState;
  const sortedCalls = [...calls].sort((a, b) => new Date(b.date) - new Date(a.date));
  const [editingId, setEditingId] = useState(null);
  const [saved, setSaved] = useState('');

  const updateCall = (id, field, value) => {
    setCalls(prev => prev.map(c => c.id === id ? {...c, [field]: value} : c));
  };

  const deleteCall = (id) => {
    if (confirm('Delete this call? This cannot be undone.')) {
      setCalls(prev => prev.filter(c => c.id !== id));
    }
  };

  const saveEdits = () => {
    setEditingId(null);
    setSaved('Changes saved');
    setTimeout(() => setSaved(''), 2000);
  };

  if (!calls.length) {
    return (
      <div className="empty-state">
        <h3>No Calls Logged</h3>
        <p>Use the "Log a Call" tab to add your first call with transcript and notes.</p>
      </div>
    );
  }

  return (
    <div>
      {saved && <div style={{padding: '8px 14px', background: 'rgba(22,163,74,0.08)', color: 'var(--green)', fontSize: 12, fontFamily: 'var(--f-mono)', marginBottom: 12, clipPath: 'var(--clip-sm)'}}>{saved}</div>}
      <div style={{fontSize: 12, color: 'var(--tmuted)', marginBottom: 16}}>{calls.length} call{calls.length !== 1 ? 's' : ''} logged</div>
      {sortedCalls.map((c, i) => {
        const isEditing = editingId === c.id;
        const callNum = calls.length - i;
        // Flags
        const flags = [];
        if (!c.attendees) flags.push('No attendees recorded');
        if (!c.summary || c.summary.length < 20) flags.push('Missing or incomplete summary');
        if (!c.transcript && (!c.notes || c.notes.length < 20)) flags.push('No transcript or detailed notes');

        return (
          <div key={c.id} className="card" style={{borderLeft: '3px solid var(--accent)'}}>
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10}}>
              <div>
                <div style={{display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4}}>
                  <span className="prep-badge badge-amber">Call #{callNum}</span>
                  {isEditing ? (
                    <select className="form-input" value={c.type} onChange={e => updateCall(c.id, 'type', e.target.value)} style={{padding: '3px 8px', fontSize: 12}}>
                      {CALL_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                  ) : (
                    <span style={{fontFamily: 'var(--f-mono)', fontSize: 11, color: 'var(--tmuted)', textTransform: 'uppercase', letterSpacing: '0.04em'}}>{c.type || 'Unknown'}</span>
                  )}
                </div>
                {isEditing ? (
                  <input className="form-input" type="date" value={c.date || ''} onChange={e => updateCall(c.id, 'date', e.target.value)} style={{padding: '3px 8px', fontSize: 12, marginBottom: 4}} />
                ) : (
                  <div style={{fontSize: 12, color: 'var(--tfaint)'}}>{c.date ? new Date(c.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }) : 'No date'}</div>
                )}
              </div>
              <div style={{display: 'flex', gap: 6}}>
                {isEditing ? (
                  <button className="btn-sm approve" onClick={saveEdits}>Save</button>
                ) : (
                  <button className="btn-sm dismiss" onClick={() => setEditingId(c.id)}>Edit</button>
                )}
                <button className="btn-sm dismiss" onClick={() => deleteCall(c.id)} style={{color: 'var(--red)'}}>Delete</button>
              </div>
            </div>

            {/* Attendees */}
            <div style={{marginBottom: 8}}>
              <div style={{fontFamily: 'var(--f-mono)', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--tfaint)', marginBottom: 3}}>Attendees</div>
              {isEditing ? (
                <input className="form-input" value={c.attendees || ''} onChange={e => updateCall(c.id, 'attendees', e.target.value)} placeholder="e.g. Sarah Chen, Dev Patel" style={{fontSize: 12}} />
              ) : (
                <div style={{fontSize: 13, color: c.attendees ? 'var(--text)' : 'var(--tfaint)'}}>{c.attendees || 'Not recorded'}</div>
              )}
            </div>

            {/* Summary */}
            <div style={{marginBottom: 8}}>
              <div style={{fontFamily: 'var(--f-mono)', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--tfaint)', marginBottom: 3}}>Summary</div>
              {isEditing ? (
                <textarea className="textarea-input" value={c.summary || ''} onChange={e => updateCall(c.id, 'summary', e.target.value)} rows={3} style={{fontSize: 12}} />
              ) : (
                <div style={{fontSize: 13, color: 'var(--tmuted)', lineHeight: 1.55}}>{c.summary || 'No summary available'}</div>
              )}
            </div>

            {/* Outcomes / Notes */}
            {(c.notes || isEditing) && (
              <div style={{marginBottom: 8}}>
                <div style={{fontFamily: 'var(--f-mono)', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--tfaint)', marginBottom: 3}}>Key Outcomes</div>
                {isEditing ? (
                  <textarea className="textarea-input" value={c.notes || ''} onChange={e => updateCall(c.id, 'notes', e.target.value)} rows={2} style={{fontSize: 12}} />
                ) : (
                  <div style={{fontSize: 12, color: 'var(--tmuted)'}}>{c.notes}</div>
                )}
              </div>
            )}

            {/* Feedback (from AI debrief, if exists) */}
            {c.feedback && (
              <div style={{marginTop: 8, padding: '8px 12px', background: 'var(--surf-2)', clipPath: 'var(--clip-sm)'}}>
                <div style={{fontFamily: 'var(--f-mono)', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--tfaint)', marginBottom: 3}}>AI Feedback</div>
                <div style={{fontSize: 12, color: 'var(--tmuted)', lineHeight: 1.5}}>{c.feedback}</div>
              </div>
            )}

            {/* Flags */}
            {flags.length > 0 && !isEditing && (
              <div style={{marginTop: 8, display: 'flex', gap: 6, flexWrap: 'wrap'}}>
                {flags.map((f, fi) => (
                  <span key={fi} style={{fontSize: 10, fontFamily: 'var(--f-mono)', color: 'var(--yellow)', background: 'rgba(234,88,12,0.08)', padding: '2px 8px', clipPath: 'var(--clip-sm)'}}>⚠ {f}</span>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function CallPrep({ dealState, prepResult, setPrepResult, loading, setLoading, error, setError }) {
  // Auto-infer next call type based on deal stage and history
  const inferredCallType = useMemo(() => {
    const callCount = dealState.calls.length;
    const stage = dealState.setup.stage || '';
    if (callCount === 0) return 'Discovery';
    const lastCall = [...dealState.calls].sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    const lastType = lastCall?.type || '';
    if (lastType === 'Discovery') return 'Technical Deep-Dive';
    if (lastType === 'Technical Deep-Dive') return 'Demo';
    if (lastType === 'Demo') return 'Scoping';
    if (lastType === 'Scoping') return 'Executive/EB Meeting';
    if (stage.includes('Negotiation')) return 'Negotiation';
    return 'Follow-up';
  }, [dealState.calls, dealState.setup.stage]);

  const generatePrep = async () => {
    setLoading(true);
    setError('');

    const prompt = `Based on the deal context above, generate call prep for the next call.
${dealState.calls.length > 0 ? `This is call #${dealState.calls.length + 1} in the deal cycle. Infer the most logical call type and attendees from context.` : 'This appears to be the first call.'}

IMPORTANT: Respond with ONLY raw JSON — no markdown code blocks, no preamble, no explanation. Start your response with { and end with }.

{
  "inferredCallType": "what type of call this should be",
  "inferredAttendees": "who should be on this call based on deal context",
  "overview": "2-3 sentence strategic framing of what this call should accomplish",
  "topics": [{"num": 1, "text": "topic with specific talk track", "rationale": "why this matters now"}],
  "coachNudges": [{"severity": "red|yellow|green", "category": "MEDDPICC element or strategic area", "message": "the specific issue", "suggestion": "exact thing to say or do"}],
  "landmines": ["specific thing to avoid and why"]
}`;

    try {
      const data = await callAPI({
        model: API_CONFIG.fastModel,
        system: [{ type: 'text', text: DEAL_COACH_BRAIN, cache_control: { type: 'ephemeral' } }],
        messages: [{ role: 'user', content: dealState.dealContext + '\n\n' + prompt }],
        maxTokens: 4000,
      });
      const text = extractText(data);
      const parsed = safeParseJSON(text);
      if (parsed) {
        setPrepResult(parsed);
      } else {
        throw new Error('Could not parse AI response. Try regenerating.');
      }
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  };

  // Auto-generate prep if calls exist and no prep result yet
  const hasAutoTriggered = useRef(false);
  useEffect(() => {
    if (dealState.calls.length > 0 && !prepResult && !loading && !hasAutoTriggered.current) {
      hasAutoTriggered.current = true;
      generatePrep();
    }
  }, [dealState.calls.length]);

  return (
    <div>
      {!prepResult && !loading && dealState.calls.length === 0 && (
        <div className="card">
          <div className="card-label">Next Call: {inferredCallType}</div>
          <p style={{fontSize: 13, color: 'var(--tmuted)', marginBottom: 16}}>
            Log your first call in the Debrief tab, then call prep will auto-generate based on your deal context.
          </p>
          <button className="btn btn-primary" onClick={generatePrep} disabled={loading}>
            {loading ? <><LoadingDots /> Generating...</> : 'Generate Call Prep Anyway'}
          </button>
        </div>
      )}

      {dealState.calls.length > 0 && !prepResult && !loading && (
        <div className="card">
          <div className="card-label">Generating prep for Call #{dealState.calls.length + 1}</div>
          <button className="btn btn-primary" onClick={generatePrep}>Generate Call Prep</button>
        </div>
      )}

      {loading && <Spinner text="Analyzing deal context and generating call prep..." />}

      {error && (
        <div className="card" style={{borderColor: 'var(--red)', color: 'var(--red)', fontSize: 13}}>
          <div className="card-label" style={{color: 'var(--red)'}}>Error</div>
          {error}
        </div>
      )}

      {prepResult && (
        <>
          {/* Regenerate bar */}
          <div style={{display:'flex', justifyContent:'flex-end', marginBottom:8}}>
            <button className="btn-sm" onClick={() => { setPrepResult(null); setError(''); }} style={{background:'transparent',border:'1px solid var(--border-md)',color:'var(--tmuted)',padding:'4px 12px',fontSize:11,fontFamily:'var(--f-mono)',cursor:'pointer',clipPath:'var(--clip-sm)'}}>↻ Regenerate</button>
          </div>
          {/* Overview */}
          <div className="card">
            <div className="card-label">Strategic Overview</div>
            <div className="prep-overview">{prepResult.overview}</div>

            {/* Topics */}
            {prepResult.topics && prepResult.topics.length > 0 && (
              <>
                <div className="card-label" style={{marginTop: 16}}>Discussion Topics</div>
                <ul className="topics-list">
                  {prepResult.topics.map((t, i) => (
                    <li key={i}>
                      <span className="topic-num">{t.num || i + 1}</span>
                      <div className="topic-text">
                        <strong style={{color: 'var(--navy)', display: 'block', marginBottom: 2}}>{t.text}</strong>
                        {t.rationale && <span style={{fontSize: 12, color: 'var(--tmuted)'}}>{t.rationale}</span>}
                      </div>
                    </li>
                  ))}
                </ul>
              </>
            )}
          </div>

          {/* Coach's Corner */}
          {prepResult.coachNudges && prepResult.coachNudges.length > 0 && (
            <div className="coach-corner">
              <div className="coach-header">
                <span className="icon">&#x1F3AF;</span>
                <h3>Coach's Corner</h3>
                <span className="count">{prepResult.coachNudges.length} nudges</span>
              </div>
              {prepResult.coachNudges.map((n, i) => (
                <div className="coach-item" key={i}>
                  <div className="coach-status" style={{background: getStatusColor(n.severity)}}></div>
                  <div className="coach-content">
                    <strong style={{color: getStatusColor(n.severity)}}>{n.category}</strong>
                    <p>{n.message}</p>
                    {n.suggestion && <div className="suggestion">{n.suggestion}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Landmines */}
          {prepResult.landmines && prepResult.landmines.length > 0 && (
            <div className="card">
              <div className="card-label" style={{color: 'var(--red)'}}>Landmines to Avoid</div>
              <ul style={{listStyle: 'none'}}>
                {prepResult.landmines.map((l, i) => (
                  <li key={i} style={{display: 'flex', gap: 8, padding: '6px 0', fontSize: 13, color: 'var(--tmuted)'}}>
                    <span style={{color: 'var(--red)', flexShrink: 0}}>&#x26A0;</span>
                    {l}
                  </li>
                ))}
              </ul>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function CallDebrief({ dealState, debriefResult, setDebriefResult, loading, setLoading, error, setError, form, setForm, files, setFiles, transcriptText, setTranscriptText }) {
  const fileInputRef = useRef(null);

  const handleFileDrop = async (e) => {
    e.preventDefault();
    e.stopPropagation();
    const droppedFiles = Array.from(e.dataTransfer?.files || e.target?.files || []);
    const readFiles = [];
    for (const f of droppedFiles) {
      try { readFiles.push(await readFile(f)); } catch (err) { console.error(err); }
    }
    setFiles(prev => [...prev, ...readFiles]);
    const textContent = readFiles.filter(f => f.type === 'text').map(f => f.text).join('\n\n');
    if (textContent) setTranscriptText(prev => prev ? prev + '\n\n' + textContent : textContent);
    // Auto-suggest call date from first uploaded filename if date field is still today's default
    const today = new Date().toISOString().split('T')[0];
    if (readFiles.length > 0) {
      for (const f of readFiles) {
        const extracted = extractDateFromFilename(f.name);
        if (extracted) {
          setForm(prev => ({ ...prev, callDate: extracted }));
          break;
        }
      }
    }
  };

  const removeFile = (idx) => setFiles(prev => prev.filter((_, i) => i !== idx));

  const analyzeCall = async () => {
    setLoading(true);
    setError('');

    // Normalize MEDDPICC keys for AI output mapping
    const meddpiccKeyMap = `Use EXACTLY these keys for meddpicc updates: metrics, economicBuyer, decisionCriteria, decisionProcess, implicatePain, champion, competition, paperProcess`;

    const prompt = `Today's date: ${new Date().toISOString().split('T')[0]}. When inferring any dates, assume year ${new Date().getFullYear()} unless explicitly stated otherwise in the transcript.

Analyze this completed call for deal: ${dealState.setup.account || 'Unknown'}

Call details:
- Type: ${form.callType || 'Not specified'} | Date: ${form.callDate || 'Not specified'} | Attendees: ${form.attendees || 'Not specified'}

${transcriptText ? 'CALL TRANSCRIPT / DOCUMENTS:\n' + transcriptText.slice(0, 15000) : ''}
${form.notes ? '\nREP NOTES:\n' + form.notes : ''}

IMPORTANT: ${meddpiccKeyMap}

Analyze everything above and output as JSON. You MUST include meddpicc updates based on any evidence found — score each element that has ANY signal in the transcript:
{
  "inferredCallType": "infer the call type from content",
  "inferredAttendees": "names mentioned in transcript",
  "inferredDate": "date of this call in YYYY-MM-DD format — use year ${new Date().getFullYear()} if year is ambiguous, null only if no date info at all",
  "callSummary": "3-5 sentence summary of what happened",
  "performanceFeedback": {
    "strengths": ["3-5 specific things done well, with evidence from transcript"],
    "improvements": ["3-5 constructive points with specific alternative approaches"]
  },
  "suggestedUpdates": {
    "stakeholders": [{"action": "add|update", "name": "", "title": "", "role": "Champion|Economic Buyer|Technical Evaluator|Decision Maker|Influencer|Coach|Blocker|End User", "engagement": "High|Medium|Low|No access", "sentiment": "Positive|Supportive|Neutral|Negative|Unknown", "reason": ""}],
    "meddpicc": {
      "metrics": {"newStatus": "green|yellow|red", "newEvidence": "specific evidence from call", "reason": "why this status"},
      "economicBuyer": {"newStatus": "green|yellow|red", "newEvidence": "...", "reason": "..."},
      "decisionCriteria": {"newStatus": "green|yellow|red", "newEvidence": "...", "reason": "..."},
      "decisionProcess": {"newStatus": "green|yellow|red", "newEvidence": "...", "reason": "..."},
      "implicatePain": {"newStatus": "green|yellow|red", "newEvidence": "...", "reason": "..."},
      "champion": {"newStatus": "green|yellow|red", "newEvidence": "...", "reason": "..."},
      "competition": {"newStatus": "green|yellow|red", "newEvidence": "...", "reason": "..."},
      "paperProcess": {"newStatus": "green|yellow|red", "newEvidence": "...", "reason": "..."}
    },
    "msp": [{"action": "add|update", "name": "", "target": "", "owner": "", "status": "Done|Overdue|At Risk|Upcoming", "reason": ""}]
  },
  "dealStateSummaryUpdate": "Updated 300-500 word rolling summary incorporating this call. Reference specific names, dates, and outcomes."
}`;

    try {
      const data = await callAPI({
        model: API_CONFIG.synthesisModel,
        system: [{ type: 'text', text: DEAL_COACH_BRAIN, cache_control: { type: 'ephemeral' } }],
        messages: [{ role: 'user', content: dealState.dealContext + '\n\n' + prompt }],
        maxTokens: 8000,
      });
      const text = extractText(data);
      const parsed = safeParseJSON(text);
      if (parsed) {
        setDebriefResult(parsed);
        // AUTO-APPLY: Save call + apply all updates immediately
        autoApplyDebrief(parsed);
      } else {
        setDebriefResult({ callSummary: text, performanceFeedback: { strengths: [], improvements: [] }, suggestedUpdates: {}, dealStateSummaryUpdate: '' });
      }
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  };

  const autoApplyDebrief = (result) => {
    // Save call to history
    const newCall = {
      id: genId(),
      type: result.inferredCallType || form.callType || 'Follow-up',
      date: form.callDate || result.inferredDate || new Date().toISOString().split('T')[0],
      attendees: result.inferredAttendees || form.attendees || '',
      summary: result.callSummary || form.notes,
      transcript: transcriptText?.slice(0, 20000),
      notes: form.notes,
    };
    dealState.setCalls(prev => [...prev, newCall]);

    // Auto-apply ALL stakeholder updates
    if (result.suggestedUpdates?.stakeholders) {
      result.suggestedUpdates.stakeholders.forEach(s => {
        if (s.name) {
          // Check if stakeholder already exists
          const exists = dealState.stakeholders.find(
            existing => existing.name.toLowerCase() === s.name.toLowerCase()
          );
          if (!exists) {
            dealState.setStakeholders(prev => [...prev, {
              id: genId(), name: s.name || '', title: s.title || '',
              role: s.role || 'Influencer', engagement: s.engagement || 'Medium',
              sentiment: s.sentiment || 'Unknown', notes: s.reason || '',
            }]);
          }
        }
      });
    }

    // Auto-apply ALL MEDDPICC updates
    if (result.suggestedUpdates?.meddpicc) {
      dealState.setMeddpicc(prev => {
        const updated = {...prev};
        Object.entries(result.suggestedUpdates.meddpicc).forEach(([key, val]) => {
          if (updated[key] && val.newStatus) {
            updated[key] = { status: val.newStatus, evidence: val.newEvidence || updated[key].evidence };
          }
        });
        return updated;
      });
    }

    // Auto-apply MSP updates
    if (result.suggestedUpdates?.msp) {
      result.suggestedUpdates.msp.forEach(m => {
        if (m.name) {
          dealState.setMsp(prev => ({
            ...prev,
            milestones: [...prev.milestones, {
              id: genId(), name: m.name, target: m.target || '',
              owner: m.owner || '', status: m.status || 'Upcoming',
            }]
          }));
        }
      });
    }

    // Update rolling summary
    if (result.dealStateSummaryUpdate) {
      dealState.setSummary(result.dealStateSummaryUpdate);
    }

    dealState.updateDealIndex();

    // Clear form for next call (but keep result visible)
    setForm({ callType: '', callDate: new Date().toISOString().split('T')[0], attendees: '', notes: '' });
    setFiles([]);
    setTranscriptText('');
  };

  const clearResults = () => {
    setDebriefResult(null);
    setForm({ callType: '', callDate: new Date().toISOString().split('T')[0], attendees: '', notes: '' });
    setFiles([]);
    setTranscriptText('');
  };

  return (
    <div>
      {/* Show banner if results exist from previous analysis */}
      {debriefResult && (
        <div className="card" style={{borderColor: 'var(--green)', background: 'rgba(22,163,74,0.04)'}}>
          <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
            <div>
              <span style={{color: 'var(--green)', fontFamily: 'var(--f-mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 500}}>
                ✓ Call analyzed & changes auto-applied
              </span>
              <p style={{fontSize: 12, color: 'var(--tmuted)', marginTop: 4}}>
                Stakeholders, MEDDPICC, milestones, and deal summary have been updated. Review changes across sections.
              </p>
            </div>
            <button className="btn btn-secondary" onClick={clearResults} style={{flexShrink: 0}}>Log Another Call</button>
          </div>
        </div>
      )}

      {!debriefResult && (
        <>
          <div className="card">
            <div className="card-label">Call Details</div>
            <div className="form-grid-3">
              <div className="form-group">
                <label className="form-label">Call Type <span style={{color: 'var(--tfaint)', textTransform: 'none', letterSpacing: 0, fontWeight: 400}}>(optional — AI will infer)</span></label>
                <select className="form-input" value={form.callType} onChange={e => setForm(prev => ({...prev, callType: e.target.value}))}>
                  <option value="">Auto-detect</option>
                  {CALL_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={form.callDate} onChange={e => setForm(prev => ({...prev, callDate: e.target.value}))} />
              </div>
              <div className="form-group">
                <label className="form-label">Attendees <span style={{color: 'var(--tfaint)', textTransform: 'none', letterSpacing: 0, fontWeight: 400}}>(optional — AI will extract)</span></label>
                <input className="form-input" type="text" value={form.attendees} onChange={e => setForm(prev => ({...prev, attendees: e.target.value}))} placeholder="Auto-detected from transcript" />
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-label">Upload Call Materials</div>
            <p style={{fontSize: 12, color: 'var(--tmuted)', marginBottom: 10}}>
              Transcripts, call recordings, customer documents, RFPs, emails, or any files from this interaction
            </p>
            <div
              className="upload-zone"
              onDrop={handleFileDrop}
              onDragOver={(e) => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--accent)'; }}
              onDragLeave={(e) => { e.currentTarget.style.borderColor = ''; }}
              onClick={() => fileInputRef.current?.click()}
            >
              <div className="upload-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </div>
              <div className="upload-text">
                Drop files here or <span className="upload-link">browse</span>
              </div>
              <div className="upload-formats">Transcripts, RFPs, emails, PDFs, DOCX, TXT — any call-related materials</div>
              <input ref={fileInputRef} type="file" accept=".txt,.vtt,.srt,.pdf,.doc,.docx,.md,.rtf,.csv" multiple style={{display: 'none'}} onChange={handleFileDrop} />
            </div>
            {files.length > 0 && (
              <div className="file-list">
                {files.map((f, i) => (
                  <div className="file-item" key={i}>
                    <span>{f.name}</span>
                    <button className="remove-btn" onClick={() => removeFile(i)}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="card">
            <div className="card-label">Rep Notes</div>
            <textarea
              className="textarea-input"
              value={form.notes}
              onChange={e => setForm(prev => ({...prev, notes: e.target.value}))}
              placeholder="What happened? Key takeaways, action items, signals... Anything not in the transcript."
              rows={4}
            />
          </div>

          <button className="btn btn-primary" onClick={analyzeCall} disabled={loading || (!form.notes && !transcriptText)} style={{width: '100%', padding: 12}}>
            {loading ? <><LoadingDots /> Analyzing...</> : 'Analyze Call & Generate Feedback'}
          </button>
          <div style={{textAlign: 'center', fontSize: 11, color: 'var(--tfaint)', marginTop: 6, fontFamily: 'var(--f-mono)'}}>
            Estimated time: 30-60 seconds depending on transcript length
          </div>
        </>
      )}

      {loading && <Spinner text="Analyzing call transcript and generating feedback... (30-60 sec)" />}

      {error && (
        <div className="card" style={{borderColor: 'var(--red)', color: 'var(--red)', fontSize: 13, marginTop: 16}}>
          <div className="card-label" style={{color: 'var(--red)'}}>Error</div>
          {error}
        </div>
      )}

      {debriefResult && (
        <div style={{marginTop: 16}}>
          <div className="card">
            <div className="card-label">Call Summary {debriefResult.inferredCallType && `— ${debriefResult.inferredCallType}`}</div>
            <p style={{fontSize: 13, color: 'var(--tmuted)', lineHeight: 1.6}}>{debriefResult.callSummary}</p>
          </div>

          <div className="perf-block">
            <div className="perf-header"><h3>Performance Feedback</h3></div>
            {debriefResult.performanceFeedback?.strengths?.length > 0 && (
              <>
                <div className="perf-group-title">Strengths</div>
                {debriefResult.performanceFeedback.strengths.map((s, i) => (
                  <div className="perf-item" key={i}><span className="icon" style={{color: 'var(--green)'}}>✓</span><span>{s}</span></div>
                ))}
              </>
            )}
            {debriefResult.performanceFeedback?.improvements?.length > 0 && (
              <>
                <div className="perf-group-title sharpen">Areas to Sharpen</div>
                {debriefResult.performanceFeedback.improvements.map((s, i) => (
                  <div className="perf-item" key={i}><span className="icon" style={{color: 'var(--yellow)'}}>→</span><span>{s}</span></div>
                ))}
              </>
            )}
          </div>

          {/* Show what was auto-applied */}
          {debriefResult.suggestedUpdates && (
            <div className="card">
              <div className="card-label">Changes Applied</div>
              {debriefResult.suggestedUpdates.stakeholders?.filter(s => s.name).map((s, i) => (
                <div key={i} style={{fontSize: 12, color: 'var(--tmuted)', padding: '4px 0', display: 'flex', gap: 6}}>
                  <span style={{color: 'var(--green)'}}>+</span> Stakeholder: <strong style={{color: 'var(--text)'}}>{s.name}</strong> ({s.role})
                </div>
              ))}
              {debriefResult.suggestedUpdates.meddpicc && Object.entries(debriefResult.suggestedUpdates.meddpicc).map(([key, val]) => (
                <div key={key} style={{fontSize: 12, color: 'var(--tmuted)', padding: '4px 0', display: 'flex', alignItems: 'center', gap: 6}}>
                  <span style={{display: 'inline-block', width: 7, height: 7, borderRadius: '50%', background: getStatusColor(val.newStatus)}}></span>
                  {MEDDPICC_LABELS[key] || key}: <strong style={{color: 'var(--text)'}}>{val.newStatus}</strong> — {val.newEvidence?.slice(0, 80)}
                </div>
              ))}
              {debriefResult.suggestedUpdates.msp?.filter(m => m.name).map((m, i) => (
                <div key={i} style={{fontSize: 12, color: 'var(--tmuted)', padding: '4px 0', display: 'flex', gap: 6}}>
                  <span style={{color: 'var(--accent)'}}>+</span> Milestone: <strong style={{color: 'var(--text)'}}>{m.name}</strong> (Target: {m.target})
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// STRATEGY (Phase 4 - MEDDPICC Scorecard + Competition)
// ═══════════════════════════════════════════════════════════════════

function StrategySection({ dealState }) {
  const { meddpicc, setMeddpicc, coaching } = dealState;
  const [compLoading, setCompLoading] = useState(false);
  const [compResult, setCompResult] = useState(null);
  const [compError, setCompError] = useState('');
  const [appliedScores, setAppliedScores] = useState(false);

  const applyCoachingScores = () => {
    if (!coaching?.meddpiccScores) return;
    setMeddpicc(prev => {
      const updated = {...prev};
      Object.entries(coaching.meddpiccScores).forEach(([key, val]) => {
        if (updated[key] && val.status) updated[key] = { status: val.status, evidence: val.evidence || updated[key].evidence || '' };
      });
      return updated;
    });
    dealState.updateDealIndex();
    setAppliedScores(true);
  };

  const cycleStatus = (key) => {
    const order = ['red', 'yellow', 'green'];
    setMeddpicc(prev => {
      const current = prev[key]?.status || 'red';
      const next = order[(order.indexOf(current) + 1) % 3];
      const updated = {...prev, [key]: {...prev[key], status: next}};
      return updated;
    });
    dealState.updateDealIndex();
  };

  const updateEvidence = (key, evidence) => {
    setMeddpicc(prev => ({...prev, [key]: {...prev[key], evidence}}));
  };

  const analyzeCompetition = async () => {
    setCompLoading(true);
    setCompError('');
    try {
      const data = await callAPI({
        model: API_CONFIG.fastModel,
        system: [{ type: 'text', text: DEAL_COACH_BRAIN, cache_control: { type: 'ephemeral' } }],
        messages: [{ role: 'user', content: dealState.dealContext + '\n\nAnalyze the competitive landscape for this deal. Output as JSON:\n{"competitor": "name", "strengths": ["our strengths vs them"], "weaknesses": ["their advantages"], "strategy": "recommended positioning"}' }],
        maxTokens: 2000,
      });
      const text = extractText(data);
      const parsed = safeParseJSON(text);
      setCompResult(parsed || { competitor: 'Unknown', strengths: [text.slice(0, 200)], weaknesses: [], strategy: '' });
    } catch (err) {
      setCompError(err.message);
    }
    setCompLoading(false);
  };

  return (
    <div style={{animation: 'fadeIn 0.25s ease'}}>
      <div className="section-header">
        <div className="section-header-text">
          <h2>MEDDIC</h2>
          <p>MEDDPICC scorecard and competitive positioning</p>
        </div>
        <SectionSaveBtn dealState={dealState} />
      </div>

      {coaching?.meddpiccScores && !appliedScores && (

          <div>
            <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>AI coaching scores are available from the Deal Coach.</div>
            <div style={{fontSize:11,color:'var(--tmuted)',marginTop:2}}>Apply them to pre-fill statuses and evidence, then edit as needed.</div>

          <button className="btn-sm approve" onClick={applyCoachingScores} style={{flexShrink:0,marginLeft:16}}>Apply AI Scores</button>

      )}

      <div className="card">
        <div className="card-label">MEDDPICC Scorecard</div>
        <div className="scorecard">
          {Object.entries(MEDDPICC_LABELS).map(([key, label]) => (
            <div className="score-row" key={key}>
              <div className="score-element">{label}</div>
              <div className="score-status" style={{cursor: 'pointer'}} onClick={() => cycleStatus(key)} title="Click to cycle status">

            </div>
          ))}
        </div>
      </div>

      <div style={{marginTop: 16}}>
        <button className="btn btn-secondary" onClick={analyzeCompetition} disabled={compLoading}>
          {compLoading ? <><LoadingDots /> Analyzing...</> : 'Analyze Competition'}
        </button>
      </div>

      {compError && <div style={{color: 'var(--red)', fontSize: 13, marginTop: 8}}>{compError}</div>}

      {compResult && (
        <div className="comp-card">
          <h3>Competitive Analysis: {compResult.competitor || 'Competition'}</h3>
          <div className="comp-grid">
            <div className="comp-col comp-strengths">
              <h4>Our Strengths</h4>
              <ul>
                {(compResult.strengths || []).map((s, i) => <li key={i}>{s}</li>)}

            </div>
            <div className="comp-col comp-weaknesses">
              <h4>Their Advantages</h4>
              <ul>
                {(compResult.weaknesses || []).map((w, i) => <li key={i}>{w}</li>)}

            <div style={{marginTop: 12, padding: '10px 14px', background: 'var(--surf-2)', borderRadius: 6, fontSize: 13, color: 'var(--tmuted)', lineHeight: 1.5}}>
              <strong style={{color: 'var(--text)'}}>Recommended Strategy:</strong> {compResult.strategy}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// MUTUAL PLAN (Phase 5 - Functional)
// ═══════════════════════════════════════════════════════════════════

function MutualPlanSection({ dealState }) {
  const { msp, setMsp } = dealState;
  const milestones = msp.milestones || [];

  const addMilestone = () => {
    setMsp(prev => ({
      ...prev,
      milestones: [...prev.milestones, { id: genId(), name: '', target: '', owner: '', status: 'Upcoming' }]
    }));
  };

  const updateMilestone = (id, field, value) => {
    setMsp(prev => ({
      ...prev,
      milestones: prev.milestones.map(m => m.id === id ? {...m, [field]: value} : m)
    }));
  };

  const removeMilestone = (id) => {
    setMsp(prev => ({...prev, milestones: prev.milestones.filter(m => m.id !== id)}));
  };

  // Sort milestones by target date: future first, past last, undated at end
  const sortMilestonesByDate = () => {
    setMsp(prev => ({
      ...prev,
      milestones: [...prev.milestones].sort((a, b) => {
        const da = a.target ? new Date(a.target) : null;
        const db = b.target ? new Date(b.target) : null;
        if (!da && !db) return 0;
        if (!da) return 1;   // undated goes to end
        if (!db) return -1;
        return da - db;      // ascending: nearest date first (future → past)
      })
    }));
  };

  const statusToClass = (s) => {
    if (s === 'Done') return 'done';
    if (s === 'Overdue') return 'overdue';
    if (s === 'At Risk') return 'at-risk';
    return 'upcoming';
  };

  return (
    <div style={{animation: 'fadeIn 0.25s ease'}}>
      <div className="section-header">
        <div className="section-header-text">
          <h2>Mutual Success Plan</h2>
          <p>Shared milestones and timeline with {dealState.setup.account || 'the customer'}</p>
        </div>
        <SectionSaveBtn dealState={dealState} onSave={sortMilestonesByDate} />
      </div>

      {/* Visual Timeline */}
      {milestones.length > 0 && (
        <div className="card">
          <div className="card-label">Timeline</div>
          <div className="plan-timeline">
            <div className="plan-line"></div>
            {milestones.map(m => (
              <div className={`plan-item ${statusToClass(m.status)}`} key={m.id}>
                <div className="plan-dot"></div>
                <div className="plan-milestone">{m.name || 'Unnamed Milestone'}</div>
                <div className="plan-meta">
                  <span>Target: {m.target || 'TBD'}</span>
                  <span>Owner: {m.owner || 'TBD'}</span>
                  <span className={`plan-status ${statusToClass(m.status)}`}>{m.status}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Editable list */}
      <div className="card">
        <div className="card-label">Milestones</div>
        {milestones.map(m => (
          <div key={m.id} style={{display: 'grid', gridTemplateColumns: '1fr 120px 120px 120px 40px', gap: 8, marginBottom: 8, alignItems: 'center'}}>
            <input className="form-input" value={m.name} onChange={e => updateMilestone(m.id, 'name', e.target.value)} placeholder="Milestone name" />
            <input className="form-input" type="date" value={m.target} onChange={e => updateMilestone(m.id, 'target', e.target.value)} />
            <input className="form-input" value={m.owner} onChange={e => updateMilestone(m.id, 'owner', e.target.value)} placeholder="Owner" />
            <select className="form-input" value={m.status} onChange={e => updateMilestone(m.id, 'status', e.target.value)}>
              {MILESTONE_STATUS_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
            <button className="remove-row-btn" onClick={() => removeMilestone(m.id)}>&times;</button>
          </div>
        ))}
        {milestones.length === 0 && (
          <div className="empty-state">
            <h3>No milestones yet</h3>
            <p>Add milestones to track your mutual success plan</p>
          </div>
        )}
      </div>

      <button className="btn btn-primary" onClick={addMilestone}>+ Add Milestone</button>
    </div>
  );
}

function DealReviewSection({ dealState }) {
  const { coaching, setCoaching, coachingTs, setCoachingTs, meddpicc, setMeddpicc, dealContext, setup } = dealState;
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const runCoaching = async () => {
    setLoading(true);
    setError('');
    try {
      const data = await callAPI({
        model: API_CONFIG.synthesisModel,
        system: [{ type: 'text', text: DEAL_COACH_BRAIN, cache_control: { type: 'ephemeral' } }],
        messages: [{ role: 'user', content: `${dealContext}

Run a complete deal coaching session. Output ONLY raw JSON — no markdown, no code fences, start with {:
{"diagnosis":"2-3 paragraph plain-English assessment of where this deal actually stands. Reference specific people by name, specific dates, specific events. Be direct about problems.","forecast":"Commit|Best Case|Pipeline|At Risk","forecastReason":"1-2 sentences explaining the forecast with specific evidence. Name the account.","topRisks":[{"risk":"short risk title","detail":"what is actually happening and why it matters","mitigation":"specific next step — who does what","severity":"red|yellow"}],"nextActions":[{"action":"short action title","detail":"how to execute this specifically","why":"why this is the priority right now","priority":1}],"meddpiccScores":{"metrics":{"status":"green|yellow|red","evidence":"specific evidence","coaching":"what to do next"},"economicBuyer":{"status":"","evidence":"","coaching":""},"decisionCriteria":{"status":"","evidence":"","coaching":""},"decisionProcess":{"status":"","evidence":"","coaching":""},"implicatePain":{"status":"","evidence":"","coaching":""},"champion":{"status":"","evidence":"","coaching":""},"competition":{"status":"","evidence":"","coaching":""},"paperProcess":{"status":"","evidence":"","coaching":""}},"stakeholderGaps":[{"gap":"specific gap","suggestion":"specific action to close it"}],"executiveSummary":"3-4 paragraph executive narrative for VP review. Include deal stage, health, key stakeholders, top risks, next milestone, and forecast. Use specific names and numbers."}

Rules: max 5 topRisks, max 5 nextActions sorted priority 1=highest. Reference ${setup.account || 'the account'} by name. Generic output = failure.` }],
        maxTokens: 8000,
      });
      const rawText = extractText(data);
      const result = safeParseJSON(rawText);
      if (!result) throw new Error(`Coaching response could not be parsed. Response started: "${rawText?.slice(0,120)}…"`);
      setCoaching(result);
      setCoachingTs(new Date().toISOString());
      dealState.updateDealIndex();
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  };

  const applyMeddpiccScores = () => {
    if (!coaching?.meddpiccScores) return;
    setMeddpicc(prev => {
      const updated = {...prev};
      Object.entries(coaching.meddpiccScores).forEach(([key, val]) => {
        if (updated[key] && val.status) updated[key] = { status: val.status, evidence: val.evidence || updated[key].evidence || '' };
      });
      return updated;
    });
    dealState.updateDealIndex();
  };

  const fcColor = { 'Commit': 'var(--green)', 'Best Case': 'var(--yellow)', 'Pipeline': 'var(--amber)', 'At Risk': 'var(--red)' };

  return (
    <div style={{animation: 'fadeIn 0.25s ease'}}>
      <div className="section-header">
        <div className="section-header-text">
          <h2>Deal Coach</h2>
          <p>AI-powered diagnosis, risk assessment, and next actions for {setup.account || 'this deal'}</p>
        </div>
        <div style={{display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0}}>
          {coachingTs && (
            <span style={{fontFamily: 'var(--f-mono)', fontSize: 10, color: 'var(--tfaint)', textTransform: 'uppercase', letterSpacing: '0.04em'}}>
              {new Date(coachingTs).toLocaleDateString('en-US', {month: 'short', day: 'numeric'})} {new Date(coachingTs).toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'})}
            </span>
          )}
          <button className="btn btn-primary" onClick={runCoaching} disabled={loading} style={{whiteSpace: 'nowrap'}}>
            {loading ? <><LoadingDots /> Coaching...</> : coaching ? '↻ Re-run' : 'Run Coaching'}
          </button>
        </div>
      </div>

      {error && <div style={{padding: '12px 16px', borderLeft: '3px solid var(--red)', color: 'var(--red)', fontSize: 13, marginBottom: 16, background: 'rgba(220,38,38,0.04)'}}>{error}</div>}
      {loading && <Spinner text="Analyzing deal — this takes 20–30 seconds..." />}

      {!loading && !coaching && !error && (
        <div className="empty-state" style={{padding: '60px 20px'}}>
          <h3>No coaching session yet</h3>
          <p>Run coaching to get AI-powered diagnosis, risk assessment, MEDDPICC scoring, and prioritized next actions specific to {setup.account || 'this deal'}.</p>
          <button className="btn btn-primary" onClick={runCoaching} style={{marginTop: 8}}>Run Coaching</button>
        </div>
      )}

      {!loading && coaching && (
        <>
          <div className="card" style={{borderLeft: `3px solid ${fcColor[coaching.forecast] || 'var(--amber)'}`, marginBottom: 16}}>
            <div style={{display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8}}>
              <span style={{fontFamily: 'var(--f-brand)', fontSize: 24, fontWeight: 800, color: fcColor[coaching.forecast] || 'var(--amber)'}}>{coaching.forecast || 'Pipeline'}</span>
              <span style={{fontFamily: 'var(--f-mono)', fontSize: 9, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', padding: '3px 8px', background: 'var(--surf-2)', color: 'var(--tmuted)', clipPath: 'var(--clip-sm)'}}>Forecast</span>
            </div>
            <div style={{fontSize: 13, color: 'var(--tmuted)', lineHeight: 1.6}}>{coaching.forecastReason}</div>
          </div>

          <div className="card">
            <div className="card-label">Deal Diagnosis</div>
            <div style={{fontSize: 13, color: 'var(--tmuted)', lineHeight: 1.8}}>
              {(coaching.diagnosis || '').split('\n').filter(Boolean).map((p, i) => <p key={i} style={{marginBottom: 10}}>{p}</p>)}
            </div>
          </div>

          {coaching.topRisks?.length > 0 && (
            <div className="card">
              <div className="card-label" style={{color: 'var(--red)'}}>Top Risks</div>
              <div className="risk-list">
                {coaching.topRisks.map((r, i) => (
                  <div className="risk-item" key={i} style={{flexDirection: 'column', alignItems: 'flex-start', gap: 6}}>
                    <div style={{display: 'flex', alignItems: 'center', gap: 8}}>
                      <span className="risk-icon" style={{color: r.severity === 'red' ? 'var(--red)' : 'var(--yellow)', fontSize: 13}}>⚠</span>
                      <span className="risk-title">{r.risk}</span>
                    </div>
                    <div style={{fontSize: 12, color: 'var(--tmuted)', lineHeight: 1.5, paddingLeft: 22}}>{r.detail}</div>
                    <div style={{fontSize: 12, color: 'var(--text)', background: 'var(--surf-2)', borderLeft: '2px solid var(--accent)', padding: '6px 10px', borderRadius: '0 4px 4px 0', marginLeft: 22, width: 'calc(100% - 22px)'}}>→ {r.mitigation}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {coaching.nextActions?.length > 0 && (
            <div className="card">
              <div className="card-label" style={{color: 'var(--green)'}}>Next Actions</div>
              <div style={{display: 'flex', flexDirection: 'column', gap: 8}}>
                {[...coaching.nextActions].sort((a, b) => (a.priority || 99) - (b.priority || 99)).map((a, i) => (
                  <div key={i} style={{display: 'flex', gap: 14, padding: '12px 14px', background: 'var(--surf-2)', clipPath: 'var(--clip-sm)'}}>
                    <div style={{fontFamily: 'var(--f-mono)', fontSize: 14, fontWeight: 700, color: 'var(--accent)', flexShrink: 0, width: 20, paddingTop: 1}}>{i + 1}</div>
                    <div style={{flex: 1}}>
                      <div style={{fontSize: 13, fontWeight: 600, color: 'var(--text)', marginBottom: 3}}>{a.action}</div>
                      {a.detail && <div style={{fontSize: 12, color: 'var(--tmuted)', lineHeight: 1.5, marginBottom: 4}}>{a.detail}</div>}
                      {a.why && <div style={{fontSize: 10, color: 'var(--accent)', fontFamily: 'var(--f-mono)', textTransform: 'uppercase', letterSpacing: '0.04em'}}>Why now: {a.why}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {coaching.meddpiccScores && (
            <div className="card">
              <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14}}>
                <div className="card-label" style={{marginBottom: 0}}>AI MEDDPICC Analysis</div>
                <button className="btn-sm approve" onClick={applyMeddpiccScores}>Apply to Scorecard</button>
              </div>
              <div className="scorecard">
                {Object.entries(MEDDPICC_LABELS).map(([key, label]) => {
                  const score = coaching.meddpiccScores[key];
                  if (!score) return null;
                  return (
                    <div className="score-row" key={key}>
                      <div className="score-element">{label}</div>
                      <div className="score-status">
                        <span className={`dot dot-${score.status || 'red'}`} style={{width: 10, height: 10, borderRadius: '50%', display: 'inline-block'}}></span>
                        <span style={{color: getStatusColor(score.status || 'red'), textTransform: 'uppercase', fontFamily: 'var(--f-mono)', fontSize: 11}}>{score.status || 'red'}</span>
                      </div>
                      <div style={{flex: 1}}>
                        <div style={{fontSize: 12, color: 'var(--tmuted)', marginBottom: score.coaching ? 4 : 0}}>{score.evidence}</div>
                        {score.coaching && <div style={{fontSize: 11, color: 'var(--accent)', fontFamily: 'var(--f-mono)', letterSpacing: '0.02em'}}>↑ {score.coaching}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {coaching.stakeholderGaps?.length > 0 && (
            <div className="card">
              <div className="card-label" style={{color: 'var(--yellow)'}}>Stakeholder Gaps</div>
              <div style={{display: 'flex', flexDirection: 'column', gap: 8}}>
                {coaching.stakeholderGaps.map((g, i) => (
                  <div key={i} style={{padding: '10px 14px', background: 'var(--surf-2)', borderLeft: '3px solid var(--yellow)', clipPath: 'var(--clip-sm)'}}>
                    <div style={{fontSize: 13, fontWeight: 500, color: 'var(--text)', marginBottom: 4}}>{g.gap}</div>
                    {g.suggestion && <div style={{fontSize: 12, color: 'var(--tmuted)'}}>→ {g.suggestion}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function DealBriefSection({ dealState }) {

  // Sync from coaching if available and we don't have a local narrative yet

    if (coaching?.executiveSummary && !aiNarrative) setAiNarrative(coaching.executiveSummary);

    try {
      const data = await callAPI({
        model: API_CONFIG.synthesisModel,

  const exportWord = () => {

      html += `<table><thead><tr><th>Name</th><th>Title</th><th>Role</th><th>Engagement</th><th>Sentiment</th><th>Notes</th></tr></thead><tbody>`;
      stakeholders.forEach(s => {
        html += `<tr><td><strong>${esc(s.name)}</strong></td><td style="color:#718096">${esc(s.title)}</td><td>${esc(s.role)}</td><td>${esc(s.engagement)}</td><td><span class="badge" style="background:${scBg(s.sentiment==='Positive'?'green':s.sentiment==='Negative'?'red':'yellow')};color:${scColor(s.sentiment==='Positive'?'green':s.sentiment==='Negative'?'red':'yellow')}">${esc(s.sentiment)}</span></td><td style="color:#718096;font-size:9pt">${esc(s.notes)}</td></tr>`;
      });
      html += `</tbody></table>`;
    }

    // Coaching stakeholder gaps
    if (coaching?.stakeholderGaps?.length) {
      html += `<p style="font-size:10pt;color:#718096"><strong>Coverage gaps:</strong> ${coaching.stakeholderGaps.map(esc).join(' · ')}</p>`;
    }

    // MEDDPICC
    html += `<h2>MEDDPICC Scorecard</h2>`;
    html += `<table><thead><tr><th>Element</th><th>Status</th><th>Evidence</th><th>Coaching Note</th></tr></thead><tbody>`;
    Object.entries(MEDDPICC_LABELS).forEach(([key, label]) => {
      const m = meddpicc[key];
      const note = coaching?.meddpiccScores?.[key]?.coaching || '';
      html += `<tr><td><strong>${esc(label)}</strong></td><td><span class="badge" style="background:${scBg(m.status)};color:${scColor(m.status)}">${m.status.toUpperCase()}</span></td><td style="color:#4A5568">${esc(m.evidence)||'—'}</td><td style="color:#718096;font-size:9pt">${esc(note)}</td></tr>`;
    });
    html += `</tbody></table>`;

    // Key Risks
    if (coaching?.topRisks?.length) {
      html += `<h2>Key Risks</h2>`;
      coaching.topRisks.forEach(r => {
        const col = r.severity === 'red' ? '#dc2626' : '#EA580C';
        html += `<div class="risk" style="border-color:${col}"><strong>${esc(r.risk)}</strong>`;
        if (r.detail) html += `<p style="font-size:10pt;color:#718096;margin:3pt 0">${esc(r.detail)}</p>`;
        html += `<p style="font-size:10pt;margin:0"><strong>Mitigation:</strong> ${esc(r.mitigation)}</p></div>`;
      });
    }

    // Next Actions
    if (coaching?.nextActions?.length) {
      html += `<h2>Recommended Next Actions</h2>`;
      [...coaching.nextActions].sort((a,b)=>(a.priority||99)-(b.priority||99)).forEach((a,i) => {
        html += `<div class="action"><strong>${i+1}. ${esc(a.action)}</strong>`;
        if (a.detail) html += `<p style="font-size:10pt;color:#718096;margin:3pt 0 0">${esc(a.detail)}</p>`;
        html += `</div>`;
      });
    }

    // Mutual Success Plan
    if (msp.milestones?.length) {
      html += `<h2>Mutual Success Plan</h2>`;
      html += `<table><thead><tr><th>Milestone</th><th>Target Date</th><th>Owner</th><th>Status</th></tr></thead><tbody>`;
      msp.milestones.forEach(m => {
        html += `<tr><td>${esc(m.name)}</td><td style="color:#718096">${esc(m.target)}</td><td style="color:#718096">${esc(m.owner)}</td><td><span class="badge" style="background:${msBg(m.status)};color:${msColor(m.status)}">${esc(m.status)}</span></td></tr>`;
      });
      html += `</tbody></table>`;
    }

    // Call History summary
    if (calls.length) {
      const sortedCalls = [...calls].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,5);
      html += `<h2>Recent Activity (last ${sortedCalls.length} calls)</h2>`;
      html += `<table><thead><tr><th>Date</th><th>Type</th><th>Attendees</th><th>Summary</th></tr></thead><tbody>`;
      sortedCalls.forEach(c => {
        html += `<tr><td style="white-space:nowrap">${esc(c.date)}</td><td>${esc(c.type)}</td><td style="color:#718096;font-size:9pt">${esc(c.attendees)}</td><td style="font-size:9pt">${esc((c.summary||'').slice(0,200))}${(c.summary||'').length>200?'…':''}</td></tr>`;
      });
      html += `</tbody></table>`;
    }

    html += `<div class="footer">Conga Win Room — Confidential &nbsp;|&nbsp; ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>`;
    html += `</body></html>`;

    const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${account.replace(/[^a-z0-9 ]/gi, '').trim()} Deal Brief.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const exportPPT = async () => {
    if (typeof PptxGenJS === 'undefined') { alert('PowerPoint library not loaded. Check your internet connection and try again.'); return; }
    const account = setup.account || 'Deal';
    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_WIDE'; // 13.33 x 7.5 inches

    // ── Brand colors ──
    const C = { amber: 'B8860B', dark: '1A2332', gray: 'F4F5F6', text: '2D3748', muted: '718096',
                 green: '16A34A', red: 'DC2626', orange: 'EA580C', white: 'FFFFFF',
                 greenBg: 'DCFCE7', redBg: 'FEE2E2', orangeBg: 'FFEDD5', lightLine: 'E2E5E9' };
    const W = 13.33, H = 7.5;

    const statusFg = (s) => s === 'green' ? C.green : s === 'red' ? C.red : C.orange;
    const statusBg = (s) => s === 'green' ? C.greenBg : s === 'red' ? C.redBg : C.orangeBg;
    const fcColor = (f) => ({ Commit: C.green, 'Best Case': C.orange, Pipeline: C.amber, 'At Risk': C.red }[f] || C.amber);
    const healthScore = computeHealthScore(meddpicc);

    const addSlideChrome = (slide, title, subtitle) => {
      // Top bar
      slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: W, h: 0.7, fill: { color: C.dark }, line: { type: 'none' } });
      // Amber accent bar
      slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0.7, w: W, h: 0.04, fill: { color: C.amber }, line: { type: 'none' } });
      // Title in bar
      slide.addText(title.toUpperCase(), { x: 0.4, y: 0, w: W - 2, h: 0.7, color: C.white, fontSize: 12, fontFace: 'Calibri', bold: true, charSpacing: 2, valign: 'middle' });
      // Account name right side
      slide.addText(account, { x: W - 3, y: 0, w: 2.8, h: 0.7, color: C.amber, fontSize: 10, fontFace: 'Calibri', bold: false, valign: 'middle', align: 'right' });
      // Subtitle below bar
      if (subtitle) slide.addText(subtitle, { x: 0.4, y: 0.8, w: W - 0.8, h: 0.35, color: C.muted, fontSize: 9, fontFace: 'Calibri', italic: true });
      // Footer
      slide.addShape(pptx.ShapeType.rect, { x: 0, y: H - 0.28, w: W, h: 0.28, fill: { color: C.gray }, line: { type: 'none' } });
      slide.addText('Conga Win Room — Confidential', { x: 0.4, y: H - 0.28, w: W / 2, h: 0.28, color: C.muted, fontSize: 7.5, fontFace: 'Calibri', valign: 'middle' });
      slide.addText(new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }), { x: W / 2, y: H - 0.28, w: W / 2 - 0.4, h: 0.28, color: C.muted, fontSize: 7.5, fontFace: 'Calibri', align: 'right', valign: 'middle' });
    };

    // ── SLIDE 1: Title ──
    const s1 = pptx.addSlide();
    s1.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: W, h: H, fill: { color: C.dark }, line: { type: 'none' } });
    s1.addShape(pptx.ShapeType.rect, { x: 0, y: H - 1.6, w: 0.12, h: 1.6, fill: { color: C.amber }, line: { type: 'none' } });
    s1.addText(account, { x: 0.5, y: 1.8, w: W - 1, h: 1.4, color: C.white, fontSize: 44, fontFace: 'Calibri', bold: true });
    s1.addText('Mutual Success Plan', { x: 0.5, y: 3.1, w: W - 1, h: 0.7, color: C.amber, fontSize: 22, fontFace: 'Calibri', bold: false, italic: true });
    const titleMeta = [setup.stage, setup.dealSize, setup.closeTarget ? `Close: ${setup.closeTarget}` : null, setup.products].filter(Boolean).join('  ·  ');
    if (titleMeta) s1.addText(titleMeta, { x: 0.5, y: 3.85, w: W - 1, h: 0.45, color: '8896A8', fontSize: 12, fontFace: 'Calibri' });
    s1.addText(new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }), { x: 0.5, y: H - 0.6, w: W - 1, h: 0.4, color: '8896A8', fontSize: 10, fontFace: 'Calibri' });
    s1.addShape(pptx.ShapeType.rect, { x: 0, y: H - 0.22, w: W, h: 0.22, fill: { color: C.amber }, line: { type: 'none' } });

    // ── SLIDE 2: Deal Snapshot ──
    const s2 = pptx.addSlide();
    addSlideChrome(s2, 'Deal Snapshot', `${account} — current deal status at a glance`);
    const snap = [
      { label: 'Stage', value: setup.stage || 'N/A' },
      { label: 'Deal Size', value: setup.dealSize || 'N/A' },
      { label: 'Close Target', value: setup.closeTarget || 'N/A' },
      { label: 'Products', value: setup.products || 'N/A' },
      { label: 'Deal Health', value: `${healthScore}%` },
      { label: 'Forecast', value: coaching?.forecast || 'Not run' },
    ];
    const snapCols = 3, snapRows = Math.ceil(snap.length / snapCols);
    const snapW = (W - 0.8) / snapCols, snapH = 1.2;
    snap.forEach((item, i) => {
      const col = i % snapCols, row = Math.floor(i / snapCols);
      const sx = 0.4 + col * snapW, sy = 1.3 + row * (snapH + 0.18);
      s2.addShape(pptx.ShapeType.rect, { x: sx, y: sy, w: snapW - 0.15, h: snapH, fill: { color: C.gray }, line: { color: C.lightLine, pt: 0.5 } });
      s2.addText(item.label.toUpperCase(), { x: sx + 0.15, y: sy + 0.1, w: snapW - 0.3, h: 0.3, color: C.muted, fontSize: 8, fontFace: 'Calibri', bold: true, charSpacing: 1.5 });
      const valColor = item.label === 'Forecast' ? fcColor(item.value) : item.label === 'Deal Health' ? (healthScore >= 60 ? C.green : healthScore >= 30 ? C.orange : C.red) : C.dark;
      s2.addText(item.value, { x: sx + 0.15, y: sy + 0.35, w: snapW - 0.3, h: 0.7, color: valColor, fontSize: 20, fontFace: 'Calibri', bold: true, valign: 'middle' });
    });
    if (coaching?.forecastReason) {
      s2.addText(`"${coaching.forecastReason}"`, { x: 0.4, y: H - 1.1, w: W - 0.8, h: 0.6, color: C.muted, fontSize: 10, fontFace: 'Calibri', italic: true });
    }

    // ── SLIDE 3: Mutual Success Plan ──
    const s3 = pptx.addSlide();
    addSlideChrome(s3, 'Mutual Success Plan', 'Jointly agreed milestones and owners');
    if (msp.milestones?.length) {
      const msHdr = [
        { text: '#', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'MILESTONE', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'TARGET DATE', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'OWNER', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'STATUS', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
      ];
      const msRows = [msHdr, ...msp.milestones.map((m, i) => {
        const sc = statusFg(m.status === 'Done' ? 'green' : (m.status === 'Overdue' || m.status === 'At Risk') ? 'red' : 'yellow');
        return [
          { text: String(i + 1), options: { color: C.muted, fontSize: 9 } },
          { text: m.name || '', options: { color: C.dark, fontSize: 10, bold: true } },
          { text: m.target || 'TBD', options: { color: C.muted, fontSize: 9 } },
          { text: m.owner || 'TBD', options: { color: C.text, fontSize: 9 } },
          { text: (m.status || 'Upcoming').toUpperCase(), options: { color: sc, fontSize: 9, bold: true } },
        ];
      })];
      const rowH = Math.min(0.42, (H - 1.7) / msRows.length);
      s3.addTable(msRows, {
        x: 0.4, y: 1.25, w: W - 0.8,
        colW: [0.4, W - 5.0, 1.4, 1.5, 1.3],
        rowH: rowH,
        border: { type: 'solid', color: C.lightLine, pt: 0.5 },
        fill: C.white,
        autoPage: true,
        autoPageRepeatHeader: true,
        fontFace: 'Calibri',
      });
    } else {
      s3.addText('No milestones defined yet.\nAdd milestones in the Mutual Plan section.', { x: 1, y: 2.5, w: W - 2, h: 2, color: C.muted, fontSize: 14, fontFace: 'Calibri', align: 'center', valign: 'middle' });
    }

    // ── SLIDE 4: Stakeholders ──
    const s4 = pptx.addSlide();
    addSlideChrome(s4, 'Stakeholder Map', `${stakeholders.length} stakeholders identified`);
    if (stakeholders.length) {
      const stHdr = [
        { text: 'NAME', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'TITLE', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'ROLE', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'ENGAGEMENT', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'SENTIMENT', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'NOTES', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
      ];
      const stRows = [stHdr, ...stakeholders.map(s => {
        const sentColor = s.sentiment === 'Positive' || s.sentiment === 'Supportive' ? C.green : s.sentiment === 'Negative' ? C.red : C.orange;
        return [
          { text: s.name || '', options: { color: C.dark, fontSize: 9, bold: true } },
          { text: s.title || '', options: { color: C.muted, fontSize: 8 } },
          { text: s.role || '', options: { color: C.text, fontSize: 9 } },
          { text: s.engagement || '', options: { color: C.text, fontSize: 9 } },
          { text: s.sentiment || '', options: { color: sentColor, fontSize: 9, bold: true } },
          { text: (s.notes || '').slice(0, 60), options: { color: C.muted, fontSize: 8 } },
        ];
      })];
      const stRowH = Math.min(0.4, (H - 1.7) / stRows.length);
      s4.addTable(stRows, {
        x: 0.4, y: 1.25, w: W - 0.8,
        colW: [1.5, 2.0, 1.6, 1.3, 1.3, W - 8.6],
        rowH: stRowH,
        border: { type: 'solid', color: C.lightLine, pt: 0.5 },
        fill: C.white,
        autoPage: true,
        autoPageRepeatHeader: true,
        fontFace: 'Calibri',
      });
      if (coaching?.stakeholderGaps?.length) {
        const gapText = coaching.stakeholderGaps.map(g => typeof g === 'string' ? g : g.gap || '').filter(Boolean).join('  ·  ');
        s4.addText(`Coverage gaps: ${gapText}`, { x: 0.4, y: H - 0.65, w: W - 0.8, h: 0.3, color: C.red, fontSize: 8.5, fontFace: 'Calibri', italic: true });
      }
    } else {
      s4.addText('No stakeholders mapped yet.', { x: 1, y: 2.5, w: W - 2, h: 2, color: C.muted, fontSize: 14, fontFace: 'Calibri', align: 'center', valign: 'middle' });
    }

    // ── SLIDE 5: MEDDPICC Scorecard ──
    const s5 = pptx.addSlide();
    addSlideChrome(s5, 'MEDDPICC Scorecard', `Deal health: ${healthScore}% — based on validated evidence`);
    const medRows = [
      [
        { text: 'ELEMENT', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'STATUS', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'EVIDENCE', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
        { text: 'COACHING NOTE', options: { bold: true, color: C.muted, fontSize: 8, charSpacing: 1 } },
      ],
      ...Object.entries(MEDDPICC_LABELS).map(([key, label]) => {
        const m = meddpicc[key];
        const note = coaching?.meddpiccScores?.[key]?.coaching || '';
        return [
          { text: label, options: { color: C.dark, fontSize: 10, bold: true } },
          { text: m.status.toUpperCase(), options: { color: statusFg(m.status), fontSize: 10, bold: true } },
          { text: m.evidence || '—', options: { color: C.text, fontSize: 9 } },
          { text: note, options: { color: C.amber, fontSize: 9, italic: !!note } },
        ];
      }),
    ];
    s5.addTable(medRows, {
      x: 0.4, y: 1.25, w: W - 0.8,
      colW: [1.8, 1.2, 5.2, W - 9.2],
      rowH: 0.45,
      border: { type: 'solid', color: C.lightLine, pt: 0.5 },
      fill: C.white,
      fontFace: 'Calibri',
    });

    // ── SLIDE 6: Key Risks & Actions (if coaching available) ──
    if (coaching?.topRisks?.length || coaching?.nextActions?.length) {
      const s6 = pptx.addSlide();
      addSlideChrome(s6, 'Risks & Next Actions', 'AI-identified deal risks and recommended actions');
      const colMid = W / 2 + 0.05;

      // Left: Risks
      s6.addText('KEY RISKS', { x: 0.4, y: 1.25, w: colMid - 0.6, h: 0.3, color: C.muted, fontSize: 8, fontFace: 'Calibri', bold: true, charSpacing: 1.5 });
      let ry = 1.6;
      (coaching.topRisks || []).forEach(r => {
        const bColor = r.severity === 'red' ? C.red : C.orange;
        s6.addShape(pptx.ShapeType.rect, { x: 0.4, y: ry, w: 0.06, h: 0.8, fill: { color: bColor }, line: { type: 'none' } });
        s6.addShape(pptx.ShapeType.rect, { x: 0.46, y: ry, w: colMid - 0.66, h: 0.8, fill: { color: 'F8F9FA' }, line: { color: C.lightLine, pt: 0.5 } });
        s6.addText(r.risk || '', { x: 0.56, y: ry + 0.04, w: colMid - 0.76, h: 0.28, color: C.dark, fontSize: 9.5, fontFace: 'Calibri', bold: true });
        s6.addText(r.mitigation || '', { x: 0.56, y: ry + 0.3, w: colMid - 0.76, h: 0.42, color: C.muted, fontSize: 8.5, fontFace: 'Calibri' });
        ry += 0.92;
      });

      // Right: Actions
      s6.addText('RECOMMENDED NEXT ACTIONS', { x: colMid, y: 1.25, w: W - colMid - 0.4, h: 0.3, color: C.muted, fontSize: 8, fontFace: 'Calibri', bold: true, charSpacing: 1.5 });
      let ay = 1.6;
      const sortedActions = [...(coaching.nextActions || [])].sort((a, b) => (a.priority || 99) - (b.priority || 99));
      sortedActions.forEach((a, i) => {
        s6.addShape(pptx.ShapeType.rect, { x: colMid, y: ay, w: W - colMid - 0.4, h: 0.88, fill: { color: 'F8F9FA' }, line: { color: C.lightLine, pt: 0.5 } });
        s6.addText(String(i + 1), { x: colMid + 0.1, y: ay + 0.04, w: 0.28, h: 0.28, color: C.amber, fontSize: 12, fontFace: 'Calibri', bold: true });
        s6.addText(a.action || '', { x: colMid + 0.4, y: ay + 0.04, w: W - colMid - 0.9, h: 0.28, color: C.dark, fontSize: 9.5, fontFace: 'Calibri', bold: true });
        s6.addText(a.detail || a.why || '', { x: colMid + 0.4, y: ay + 0.3, w: W - colMid - 0.9, h: 0.42, color: C.muted, fontSize: 8.5, fontFace: 'Calibri' });
        ay += 0.98;
      });
    }

    // ── SLIDE 7: Executive Summary (if available) ──
    if (aiNarrative) {
      const s7 = pptx.addSlide();
      addSlideChrome(s7, 'Executive Summary', 'AI-written deal assessment for VP review');
      const paras = aiNarrative.split(/\n+/).filter(Boolean);
      const bodyText = paras.map(p => ({ text: p + '\n', options: { fontSize: 11, color: C.text, breakLine: true } }));
      s7.addText(bodyText, { x: 0.4, y: 1.25, w: W - 0.8, h: H - 1.8, fontFace: 'Calibri', valign: 'top', isTextBox: true });
    }

    await pptx.writeFile({ fileName: `${account.replace(/[^a-z0-9 ]/gi, '').trim()} MSP.pptx` });
  };

  const copyToClipboard = () => {
    const lines = [
      `# Deal Brief: ${setup.account || 'Unnamed Deal'}`,
      `Stage: ${setup.stage} | Size: ${setup.dealSize||'N/A'} | Close: ${setup.closeTarget||'N/A'}`,
      '',
    ];
    if (aiNarrative) lines.push('## Executive Summary', aiNarrative, '');
    if (coaching?.forecast) lines.push(`## Forecast: ${coaching.forecast}`, coaching.forecastReason||'', '');
    if (stakeholders.length) {
      lines.push(`## Stakeholders (${stakeholders.length})`);
      stakeholders.forEach(s => lines.push(`- ${s.name} | ${s.title} | ${s.role} | ${s.sentiment}`));
      lines.push('');
    }
    lines.push('## MEDDPICC');
    Object.entries(MEDDPICC_LABELS).forEach(([k,l]) => {
      const m = meddpicc[k];
      lines.push(`- ${l}: ${m.status.toUpperCase()}${m.evidence?' — '+m.evidence:''}`);
    });
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      setCopyMsg('Copied!');
      setTimeout(() => setCopyMsg(''), 2000);
    });
  };

  const hasCoaching = !!coaching;

  return (
    <div style={{animation: 'fadeIn 0.25s ease'}}>
      <div className="section-header">
        <div className="section-header-text">
          <h2>Deal Brief</h2>
          <p>AI-written executive narrative and exportable deal summary</p>
        </div>
      </div>

      {/* AI Narrative */}
      <div className="card">
        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14}}>
          <div className="card-label" style={{marginBottom: 0}}>Executive Narrative</div>
          <button className="btn btn-primary" onClick={generateNarrative} disabled={briefLoading} style={{fontSize: 11, padding: '6px 14px'}}>
            {briefLoading ? <><LoadingDots /> Writing...</> : aiNarrative ? '↻ Regenerate' : hasCoaching ? 'Use Coaching Summary' : 'Generate AI Brief'}
          </button>
        </div>
