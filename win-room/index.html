<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script src="/auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conga Win Room</title>
<link rel="stylesheet" href="../shared/znith-tokens.css">
<style>
:root{
  --navy:#0A0E1A;
  --white-faint:rgba(255,255,255,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--f-ui);font-size:14px;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(5,7,15,0.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:56px;
  display:flex;align-items:center;gap:16px;
}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.topbar-logo-mark{width:28px;height:28px;display:flex;align-items:center;}
.topbar-logo-mark svg{width:28px;height:28px;}
.topbar-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.topbar-deal{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.topbar-company{font-family:var(--f-brand);font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-stage{flex-shrink:0;padding:2px 9px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;clip-path:var(--clip-sm);}
.stage-discovery  {background:rgba(99,179,237,0.15);color:var(--stage-discovery);}
.stage-demo       {background:var(--amber-muted);color:var(--amber);}
.stage-proposal   {background:rgba(167,139,250,0.15);color:var(--stage-proposal);}
.stage-negotiation{background:rgba(251,146,60,0.15);color:var(--stage-negotiation);}
.stage-closed_won {background:var(--green-muted);color:var(--stage-closed-won);}
.stage-closed_lost{background:rgba(255,255,255,0.06);color:var(--tfaint);}
.topbar-health{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;clip-path:var(--clip-sm);}
.health-green{background:var(--green-muted);color:var(--status-ok);}
.health-yellow{background:var(--yellow-muted);color:var(--status-warn);}
.health-red{background:var(--red-muted);color:var(--status-risk);}
.health-dot{width:6px;height:6px;border-radius:50%;}
.health-green .health-dot{background:var(--status-ok);}
.health-yellow .health-dot{background:var(--status-warn);}
.health-red .health-dot{background:var(--status-risk);}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.btn-topbar{
  display:flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--border);
  color:var(--tmuted);padding:6px 12px;clip-path:var(--clip-sm);
  font-family:var(--f-ui);font-size:12px;font-weight:600;
  letter-spacing:0.03em;cursor:pointer;transition:var(--transition);
  text-decoration:none;
}
.btn-topbar:hover{border-color:var(--border-md);color:var(--text);}
.btn-topbar.primary{background:var(--amber-muted);border-color:rgba(229,168,58,0.3);color:var(--amber);}
.btn-topbar.primary:hover{background:rgba(229,168,58,0.2);}
.btn-topbar.spinning svg{animation:spin 1s linear infinite;}
.btn-topbar.stale{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.35);color:#F87171;position:relative;}
.btn-topbar.stale:hover{background:rgba(239,68,68,0.18);border-color:rgba(239,68,68,0.5);}
.stale-dot{width:7px;height:7px;border-radius:50%;background:#EF4444;flex-shrink:0;animation:stale-pulse 1.8s ease-in-out infinite;}
@keyframes stale-pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(239,68,68,0.5);}50%{opacity:0.8;box-shadow:0 0 0 4px rgba(239,68,68,0);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── LAYOUT ── */
.layout{display:flex;gap:0;height:calc(100vh - 56px - 34px);overflow:hidden;}
.main-col{flex:1;overflow-y:auto;padding:28px 32px 40px;min-width:0;}
.side-col{width:320px;flex-shrink:0;overflow-y:auto;border-left:1px solid var(--border);padding:20px;background:var(--surf-3);}

/* ── STATES ── */
.state-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;gap:16px;padding:40px;
}
.state-icon{font-size:36px;opacity:0.3;}
.state-title{font-family:var(--f-brand);font-size:22px;font-weight:700;}
.state-sub{font-size:13px;color:var(--tmuted);line-height:1.6;max-width:380px;}
.btn-state{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--amber);color:#0A0E1A;border:none;
  padding:10px 22px;clip-path:var(--clip-sm);
  font-family:var(--f-ui);font-size:13px;font-weight:700;
  letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;
  text-decoration:none;transition:var(--transition);
}
.btn-state:hover{background:#d4a012;}

/* ── SYNTHESIS LOADING ── */
.synthesis-loading{display:flex;flex-direction:column;gap:16px;padding:20px 0;}
.synthesis-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--tmuted);}
.synthesis-step svg{flex-shrink:0;}
.synthesis-step.active{color:var(--text);}
.synthesis-step.done{color:var(--status-ok);}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulse-anim 1.2s ease-in-out infinite;}
@keyframes pulse-anim{0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

/* ── SECTION ── */
.section{margin-bottom:28px;}
.section-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--tfaint);margin-bottom:8px;}
.section-title{font-family:var(--f-brand);font-size:13px;font-weight:700;color:var(--tmuted);margin-bottom:12px;letter-spacing:0.04em;text-transform:uppercase;}

/* ── SITUATION CARD ── */
.situation-card{
  background:var(--surf);border:1px solid var(--border);
  clip-path:var(--clip-lg);padding:20px 24px;margin-bottom:24px;
}
.situation-text{font-size:15px;line-height:1.65;color:var(--text);}
.health-reason{margin-top:8px;font-size:12px;color:var(--tmuted);font-style:italic;}

/* ── GAP CARDS ── */
.gap-list{display:flex;flex-direction:column;gap:10px;}
.gap-card{
  background:var(--surf);border:1px solid var(--border);
  clip-path:var(--clip-lg);padding:16px 18px;
  display:grid;grid-template-columns:auto 1fr;gap:12px;
  transition:var(--transition);
}
.gap-card:hover{border-color:var(--border-md);}
.gap-severity{
  width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;
}
.sev-high{background:var(--status-risk);}
.sev-medium{background:var(--status-warn);}
.sev-low{background:var(--stage-discovery);}
.gap-body{}
.gap-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;}
.gap-evidence{font-size:12px;color:var(--tmuted);margin-bottom:8px;line-height:1.5;}
.gap-action{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;color:var(--amber);
  letter-spacing:0.03em;
}
.gap-action svg{flex-shrink:0;}

/* ── ACTION LIST ── */
.action-list{display:flex;flex-direction:column;gap:8px;}
.action-item{
  background:var(--surf);border:1px solid var(--border);
  clip-path:var(--clip-sm);padding:12px 16px;
  display:flex;gap:12px;align-items:flex-start;
}
.action-num{
  font-family:var(--f-mono);font-size:11px;font-weight:700;
  color:var(--amber);flex-shrink:0;margin-top:1px;min-width:18px;
}
.action-body{}
.action-text{font-size:13px;color:var(--text);font-weight:600;margin-bottom:3px;}
.action-why{font-size:12px;color:var(--tmuted);line-height:1.5;}

/* ── COACHING PULSE ── */
.coaching-list{display:flex;flex-direction:column;gap:8px;}
.coaching-item{
  display:flex;gap:10px;align-items:flex-start;
  padding:10px 14px;
  background:var(--info-faint);border:1px solid var(--info-muted);
  clip-path:var(--clip-sm);
}
.coaching-pip{width:4px;height:4px;border-radius:50%;background:var(--info);flex-shrink:0;margin-top:6px;}
.coaching-text{font-size:13px;color:var(--text);line-height:1.5;}

/* ── COMPETITIVE + NEWS ── */
.info-card{
  background:var(--surf);border:1px solid var(--border);
  clip-path:var(--clip-lg);padding:16px 18px;
  font-size:13px;color:var(--tmuted);line-height:1.6;
}
.news-list{display:flex;flex-direction:column;gap:8px;}
.news-item{
  background:var(--surf);border:1px solid var(--border);
  clip-path:var(--clip-sm);padding:10px 14px;
}
.news-headline{font-size:13px;color:var(--text);margin-bottom:3px;}
.news-date{font-size:11px;color:var(--tfaint);font-family:var(--f-mono);}

/* ── SIDEBAR ── */
.side-section{margin-bottom:24px;}
.side-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--tfaint);margin-bottom:10px;}

/* Deal meta */
.meta-grid{display:flex;flex-direction:column;gap:6px;}
.meta-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;}
.meta-key{color:var(--tfaint);}
.meta-val{color:var(--text);font-weight:500;text-align:right;}

/* MEDDPICC */
.meddpicc-list{display:flex;flex-direction:column;gap:6px;}
.meddpicc-item{
  background:var(--surf);border:1px solid var(--border);
  clip-path:var(--clip-sm);padding:8px 10px;
  display:flex;gap:8px;align-items:center;cursor:pointer;
  transition:var(--transition);
}
.meddpicc-item:hover{border-color:var(--border-md);}
.meddpicc-indicator{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ind-green{background:var(--status-ok);box-shadow:var(--sh-ok);}
.ind-yellow{background:var(--status-warn);box-shadow:var(--sh-warn);}
.ind-red{background:var(--status-risk);box-shadow:var(--sh-risk);}
.ind-unknown{background:var(--border-md);}
.meddpicc-dim{flex:1;min-width:0;}
.meddpicc-dim-label{font-size:11px;font-weight:600;color:var(--text);}
.meddpicc-dim-note{font-size:10px;color:var(--tfaint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.meddpicc-score-badge{font-family:var(--f-mono);font-size:10px;font-weight:600;flex-shrink:0;}
.md-chevron{font-size:13px;color:var(--tfaint);flex-shrink:0;margin-left:2px;line-height:1;transition:var(--transition);}
.md-row{display:flex;flex-direction:column;}
.md-detail{background:var(--surf-2);border:1px solid var(--border);border-top:none;padding:10px 12px;margin-bottom:2px;}
.md-evidence{font-size:12px;color:var(--tmuted);line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.md-gaps{margin-top:8px;}
.md-gap-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--status-risk);display:block;margin-bottom:4px;}
.md-gap-item{font-size:11px;color:var(--tmuted);margin-bottom:3px;line-height:1.4;}
.md-edit-link{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;color:var(--amber);text-decoration:none;letter-spacing:0.04em;}
.md-edit-link:hover{text-decoration:underline;}

/* ── SOURCE CONFIDENCE BADGES ── */
.conf-badge{display:inline-block;padding:1px 5px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;vertical-align:middle;margin:0 3px;line-height:1.6;white-space:nowrap;}
.conf-verified{background:rgba(22,163,74,0.15);color:#16A34A;border:1px solid rgba(22,163,74,0.25);}
.conf-rep{background:rgba(249,115,22,0.15);color:#F97316;border:1px solid rgba(249,115,22,0.25);}
.conf-inferred{background:rgba(239,68,68,0.15);color:#EF4444;border:1px solid rgba(239,68,68,0.25);}

/* Sidebar news */
.side-news-list{display:flex;flex-direction:column;gap:8px;}
.side-news-item{background:var(--surf);border:1px solid var(--border);clip-path:var(--clip-sm);padding:9px 11px;}
.side-news-item:hover{border-color:var(--border-md);}
.side-news-headline{font-size:12px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.side-news-meta{display:flex;align-items:center;gap:6px;margin-top:4px;}
.side-news-source{font-size:10px;color:var(--tfaint);font-family:var(--f-mono);}
.side-news-fresh{width:5px;height:5px;border-radius:50%;background:var(--status-ok);box-shadow:var(--sh-ok);flex-shrink:0;}
.side-news-loading{font-size:11px;color:var(--tfaint);font-style:italic;}
.side-news-viewall{font-size:10px;font-weight:600;color:var(--amber);text-decoration:none;letter-spacing:0.05em;display:inline-block;margin-top:8px;}
.side-news-viewall:hover{text-decoration:underline;}

/* Stakeholders */
.stakeholder-list{display:flex;flex-direction:column;gap:6px;}
.stakeholder-item{
  background:var(--surf);border:1px solid var(--border);
  clip-path:var(--clip-sm);padding:8px 10px;
}
.stakeholder-name{font-size:12px;font-weight:600;color:var(--text);}
.stakeholder-meta{display:flex;gap:6px;align-items:center;margin-top:2px;}
.stakeholder-title{font-size:11px;color:var(--tmuted);}
.stakeholder-role{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--info);}
.side-btn{
  width:100%;margin-top:8px;padding:8px;
  background:transparent;border:1px solid var(--border);
  color:var(--tmuted);font-family:var(--f-ui);font-size:11px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;clip-path:var(--clip-sm);
  cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:6px;
}
.side-btn:hover{border-color:var(--amber);color:var(--amber);}

/* ── ZNITH FOOTER ── */
.znith-footer{
  position:fixed;bottom:0;left:0;right:0;z-index:90;height:34px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surf);border-top:2px solid var(--amber);
}
.znith-wordmark{display:flex;align-items:center;gap:1px;font-family:var(--f-brand);font-size:12px;font-weight:800;line-height:1;}
.znith-footer-meta{display:flex;align-items:center;gap:8px;}
.znith-footer-pip{width:4px;height:4px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber-glow);}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#F4F5F6;--surf:#FFFFFF;--surf-2:#F4F5F6;--surf-3:#ECEEF0;
  --border:#E2E5E9;--border-md:#CBD0D8;
  --text:#1A2332;--tmuted:#6B7280;--tfaint:#9CA3AF;--navy:#1A2332;
  --white-faint:rgba(0,0,0,0.15);
}
[data-theme="light"] .topbar{background:rgba(244,245,246,0.95);}
[data-theme="light"] .znith-footer{background:#FFFFFF;}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar" id="topbar">
  <a href="../dashboard/" class="topbar-logo" title="Back to deals">
    <div class="topbar-logo-mark">
      <svg class="conga-mark" viewBox="0 0 1039 1080" xmlns="http://www.w3.org/2000/svg" fill="currentColor">

</div>

<!-- ── LAYOUT ── -->
<div class="layout">

  <!-- MAIN CONTENT -->
  <div class="main-col" id="mainCol">

  </div>

  <!-- SIDEBAR -->

</div>

<footer class="znith-footer">
  <div class="znith-wordmark">
    <span style="font-family:var(--f-mono);color:var(--amber);font-weight:700;">/</span>
    <span style="font-family:var(--f-brand);font-weight:800;color:var(--amber);">Z</span>
    <span style="font-family:var(--f-brand);font-weight:800;color:var(--white-faint);">nith</span>
  </div>
  <div class="znith-footer-meta">
    <span style="font-family:var(--f-mono);font-size:9px;color:var(--white-faint);letter-spacing:0.08em;">Win Room</span>
    <div class="znith-footer-pip"></div>
    <span style="font-family:var(--f-mono);font-size:9px;color:var(--white-faint);letter-spacing:0.08em;">v2.0</span>
  </div>
</footer>

<script src="../shared/dealStore.js"></script>
<script>

// ── CONSTANTS ──────────────────────────────────────────────────────────────────

const DEAL_COACH_BRAIN = `=== DEAL COACH BRAIN v2.1 ===
You are an expert B2B enterprise sales coach embedded in the Conga Win Room.
You coach reps on deal strategy using MEDDPICC methodology.

YOUR ROLE: Direct, specific, and honest. You don't sugarcoat.
When something is a risk, say so clearly and give an actionable next step.
ALWAYS reference actual company names, people, and evidence from the context provided. Generic output = failure.
If call transcripts, RFPs, or discovery notes are provided, extract and reference specific quotes, pain points, and commitments.

MEDDPICC FRAMEWORK:
- Metrics (M): Quantified business impact. GREEN=dollarized tied to exec priorities. YELLOW=pain identified not dollarized. RED=no metrics.
- Economic Buyer (E): Person who can say yes to budget. GREEN=engaged+budget confirmed. YELLOW=identified limited access. RED=unknown/no access.
- Decision Criteria (D): Requirements they evaluate against. GREEN=documented favorable. YELLOW=informal partial. RED=unknown or competitor-set.
- Decision Process (D): Steps from "we like it" to "signed". GREEN=fully mapped+timeline. YELLOW=partial. RED=unknown.
- Implicate Pain (I): Business pain creating urgency. GREEN=validated by multiple stakeholders. YELLOW=champion only. RED=assumed.
- Champion (C): Inside advocate who sells for you. GREEN=tested+carried materials. YELLOW=engaged untested. RED=no champion.
- Competition (C): Landscape and positioning. GREEN=known+clear differentiation. YELLOW=identified unclear. RED=unknown/competitor has exec access you don't.

CONGA POSITIONING:
Revenue Lifecycle Management platform: CPQ → CLM → DocGen → Revenue Management.
Key wins: vs Ironclad (CLM-only), vs DocuSign CLM (acquisition patchwork), vs Icertis (12-18mo impl), vs Salesforce Revenue Cloud (SF uses Conga CPQ internally — killshot).
When a Value Map is available, anchor the business case to those specific initiatives and metrics — not generic Conga benefits.

COACHING PRINCIPLES:
1. Champion testing: they must sell for you when you're not in the room
2. EB access: 4+ calls with no EB = always #1 risk
3. Competing event > compelling event: deadlines they can't move beat aspirational timelines
4. Never discuss price before value + EB engagement
5. Stage play: coaching must be specific to where the deal actually is — discovery coaching ≠ proposal coaching
6. Document intelligence: if transcripts or RFPs are in context, surface the most important signals from them

SOURCE CONFIDENCE TAGGING (REQUIRED):
For every significant claim or assertion in your output, tag it with one of:
  [VERIFIED] — directly corroborated by web research, official documents, or uploaded call recordings/RFPs
  [REP_STATED] — comes only from the rep's notes or transcript input; not independently confirmed
  [INFERRED] — your inference or synthesis; no direct source, based on patterns or reasoning

Rules:
- Tag inline, immediately after the claim. E.g. "Their Q1 revenue grew 15% [VERIFIED] and they are prioritizing CLM [REP_STATED] per rep notes."
- Tag every substantive claim. Skip tagging filler words, company names, or obvious facts.
- When evidence fields say "[SOURCE: REP_NOTES]" treat those claims as [REP_STATED]
- When evidence fields say "[SOURCE: WEB_RESEARCH]" treat those as [VERIFIED]
- When evidence fields say "[SOURCE: DOCS]" treat those as [VERIFIED]
- Your own synthesis and coaching deductions are [INFERRED] unless grounded in a verified source
- Do NOT tag coaching_pulse items — those are always your coaching opinion`;

// ── API ────────────────────────────────────────────────────────────────────────

async function callClaude(messages, system, maxTokens = 4000) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', messages, system, max_tokens: maxTokens })
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `API ${res.status}`); }
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
}

async function callClaudeWebSearch(prompt, maxTokens = 1500) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `API ${res.status}`); }
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
}

// ── RECENT NEWS ───────────────────────────────────────────────────────────────

const NEWS_CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours

async function fetchRecentNews(deal) {
  const section = document.getElementById('sideNewsSection');
  const list    = document.getElementById('sideNewsList');
  if (!section || !list) return;

  // Check 24h cache
  const cached = deal.news_cache;
  if (cached?.fetched_at && (Date.now() - new Date(cached.fetched_at)) < NEWS_CACHE_TTL_MS && cached.items?.length) {
    renderSidebarNews(cached.items);
    return;
  }

  // Show loading state
  section.style.display = '';
  list.innerHTML = '<div class="side-news-loading">Fetching latest news…</div>';

  const company  = deal.context.account_name || '';
  const industry = deal.research?.industry?.name || deal.research?.industry || '';
  const query    = `"${company}" ${industry} news announcements earnings 2025`;

  try {
    const raw = await callClaudeWebSearch(
      `Search for the 3 most recent and significant news items about ${company} (${industry}) from the last 90 days. ` +
      `Focus on: earnings, leadership changes, M&A activity, strategic partnerships, product launches, or major business challenges. ` +
      `Return ONLY a JSON array (no markdown, no preamble) with up to 3 items: ` +
      `[{"headline":"...","source":"...","date":"YYYY-MM-DD","url":"...","summary":"one sentence"}]. ` +
      `Only include items you can verify with a real URL. If fewer than 3 credible recent items exist, return fewer.`
    );

    let items = [];
    try {
      const m = raw.match(/\[[\s\S]*\]/);
      items = m ? JSON.parse(m[0]) : [];
    } catch { items = []; }

    // Filter to last 90 days
    const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;
    items = items.filter(n => {
      if (!n.date) return true;
      return new Date(n.date).getTime() > cutoff;
    }).slice(0, 3);

    dealStore.patch(deal.id, 'news_cache', { fetched_at: new Date().toISOString(), items });
    renderSidebarNews(items);
  } catch (e) {
    list.innerHTML = '<div class="side-news-loading">Could not load news.</div>';
  }
}

function renderSidebarNews(items) {
  const section  = document.getElementById('sideNewsSection');
  const list     = document.getElementById('sideNewsList');
  const viewAll  = document.getElementById('sideNewsViewAll');
  if (!section || !list) return;

  if (!items?.length) { section.style.display = 'none'; return; }

  section.style.display = '';
  const cutoff7d = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const sidebar  = items.slice(0, 2); // max 2 on sidebar

  list.innerHTML = sidebar.map(n => {
    const isFresh = n.date && new Date(n.date).getTime() > cutoff7d;
    const dateStr = n.date ? new Date(n.date).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '';
    const inner = `
      <div class="side-news-headline">${n.headline || ''}</div>
      <div class="side-news-meta">
        ${isFresh ? '<span class="side-news-fresh"></span>' : ''}
        <span class="side-news-source">${n.source || ''}${dateStr ? ' · ' + dateStr : ''}</span>
      </div>`;
    return n.url
      ? `<a href="${n.url}" target="_blank" class="side-news-item" style="display:block;text-decoration:none;">${inner}</a>`
      : `<div class="side-news-item">${inner}</div>`;
  }).join('');

  // Show "View all" only if there are more items than sidebar shows
  if (viewAll) viewAll.style.display = items.length > 2 ? 'inline-block' : 'none';

  // Also render full list in main content news section
  renderMainNews(items);
}

function renderMainNews(items) {
  const section = document.getElementById('mainNewsSection');
  if (!section || !items?.length) return;
  section.style.display = '';
  const cutoff7d = Date.now() - 7 * 24 * 60 * 60 * 1000;
  document.getElementById('mainNewsList').innerHTML = items.map(n => {
    const isFresh = n.date && new Date(n.date).getTime() > cutoff7d;
    const dateStr = n.date ? new Date(n.date).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '';
    return `<div class="news-item">
      <div class="news-headline" style="display:flex;align-items:center;gap:8px;">
        ${isFresh ? '<span style="width:6px;height:6px;border-radius:50%;background:var(--status-ok);box-shadow:var(--sh-ok);flex-shrink:0;display:inline-block;"></span>' : ''}
        ${n.url ? `<a href="${n.url}" target="_blank" style="color:var(--text);text-decoration:none;">${n.headline||''}</a>` : (n.headline||'')}
      </div>
      ${n.summary ? `<div style="font-size:12px;color:var(--tmuted);margin-top:4px;line-height:1.5;">${n.summary}</div>` : ''}
      <div class="news-date">${n.source||''}${dateStr ? ' · ' + dateStr : ''}</div>
    </div>`;
  }).join('');
}

function renderWithBadges(text) {
  if (!text) return '';
  return text
    .replace(/\[VERIFIED\]/g,    '<span class="conf-badge conf-verified">✓ Verified</span>')
    .replace(/\[REP_STATED\]/g,  '<span class="conf-badge conf-rep">Rep-stated</span>')
    .replace(/\[INFERRED\]/g,    '<span class="conf-badge conf-inferred">Inferred</span>');
}

function safeJSON(str) {
  try {
    const m = str.match(/```json\s*([\s\S]*?)```/) || str.match(/\{[\s\S]*\}/);
    return JSON.parse(m ? (m[1]||m[0]) : str);
  } catch { return null; }
}

function buildDealContext(d) {
  const c   = d.context;
  const res = d.research;
  const q   = d.qualification;
  let ctx   = '';

  ctx += `## Deal: ${c.account_name}\n`;
  ctx += `Stage: ${dealStore.stageLabel(c.stage)}`;
  if (c.close_date) ctx += ` | Target Close: ${c.close_date}`;
  if (c.deal_value) ctx += ` | Value: $${Number(c.deal_value).toLocaleString()}`;
  if (c.products?.length) ctx += ` | Products: ${c.products.join(', ')}`;
  ctx += '\n\n';

  if (res) {
    const co = res.company_profile;
    if (co?.summary) ctx += `### Company [SOURCE: WEB_RESEARCH]\n${co.summary}\n\n`;
    if (co?.recentNews?.length) {
      ctx += `### Recent News [SOURCE: WEB_RESEARCH]\n`;
      co.recentNews.slice(0,3).forEach(n => ctx += `- ${n.headline||n}\n`);
      ctx += '\n';
    }
    if (res.deal_brief) {
      const db = res.deal_brief;
      ctx += `### Deal Health (from Account Brief) [SOURCE: WEB_RESEARCH]\n`;
      ctx += `Health: ${db.dealHealthScore} — ${db.dealHealthReason}\n`;
      ctx += `Champion: ${db.championStatus} | Economic Buyer: ${db.economicBuyerStatus}\n`;
      ctx += `Decision Process: ${db.decisionProcessClarity} | Competitive: ${db.competitiveExposure}\n`;
      if (db.criticalGaps?.length) {
        ctx += `Critical Gaps:\n`;
        db.criticalGaps.forEach(g => ctx += `- ${typeof g === 'string' ? g : g.gap||JSON.stringify(g)}\n`);
      }
      if (db.whatMustHappenNext?.length) {
        ctx += `What Must Happen Next:\n`;
        db.whatMustHappenNext.forEach(a => ctx += `- ${typeof a === 'string' ? a : a.action||JSON.stringify(a)}\n`);
      }
      ctx += '\n';
    }
    if (res.exec_pov?.productPOV?.length) {
      ctx += `### Conga POV\n`;
      res.exec_pov.productPOV.forEach(p => ctx += `- ${p.product}: ${p.challenge}\n`);
      ctx += '\n';
    }
    if (res.call_strategy) {
      const cs = res.call_strategy;
      if (cs.landmines?.length) {
        ctx += `### Landmines / Watch-outs\n`;
        cs.landmines.forEach(l => ctx += `- ${typeof l === 'string' ? l : l.landmine||JSON.stringify(l)}\n`);
        ctx += '\n';
      }
    }
  }

  if (q?.meddpicc) {
    ctx += `### MEDDPICC Scores\n`;
    MEDDPICC_DIMS.forEach(dim => {
      const v = q.meddpicc[dim.key];
      if (v) ctx += `- ${dim.label}: score ${v.score||0}/100${v.evidence ? ' — '+v.evidence : ''}\n`;
    });
    ctx += '\n';
  }

  if (d.stakeholders?.length) {
    ctx += `### Known Stakeholders\n`;
    d.stakeholders.forEach(s => ctx += `- ${s.name} (${s.title}): ${s.role}, sentiment ${s.sentiment}\n`);
    ctx += '\n';
  }

  // Value Map — business initiatives and ROI
  const vm = d.value_map?.valueMap;
  if (vm?.initiatives?.length) {
    ctx += `### Value Map — Business Initiatives\n`;
    vm.initiatives.forEach(ini => {
      ctx += `- **${ini.initiative||ini.name||'Initiative'}**`;
      if (ini.metric) ctx += `: ${ini.metric}`;
      if (ini.roi)    ctx += ` (ROI: ${ini.roi})`;
      if (ini.owner)  ctx += ` — Owner: ${ini.owner}`;
      ctx += '\n';
    });
    if (vm.totalAnnualValue) ctx += `Total Annual Value: ${vm.totalAnnualValue}\n`;
    ctx += '\n';
  }

  // Demo Brief — latest meeting prep
  const preps = d.meeting_preps;
  if (preps?.length) {
    const latest = preps[preps.length - 1];
    ctx += `### Latest Demo Brief\n`;
    if (latest.products?.length) ctx += `Products: ${latest.products.join(', ')}\n`;
    if (latest.objective)        ctx += `Objective: ${latest.objective}\n`;
    if (latest.agenda?.length) {
      ctx += `Flow:\n`;
      latest.agenda.forEach(step => ctx += `- ${typeof step === 'string' ? step : step.step||JSON.stringify(step)}\n`);
    }
    if (latest.risks?.length) {
      ctx += `Risks:\n`;
      latest.risks.forEach(r => ctx += `- ${typeof r === 'string' ? r : r.risk||JSON.stringify(r)}\n`);
    }
    ctx += '\n';
  }

  // Document intelligence — prefer condensed summary, fall back to raw docs
  if (d.document_context?.summary) {
    ctx += `### Document Intelligence [SOURCE: DOCS] (${d.document_context.doc_count} docs condensed)\n`;
    ctx += d.document_context.summary.slice(0, 20000);
    if (d.document_context.summary.length > 20000) ctx += '\n[...truncated at 20k]';
    ctx += '\n\n';
  } else {
    const docs = d.documents?.filter(doc => doc.extracted_text);
    if (docs?.length) {
      ctx += `### Uploaded Documents [SOURCE: DOCS]\n`;
      docs.slice(0, 4).forEach(doc => {
        ctx += `**${doc.name}** (${doc.type}):\n`;
        ctx += doc.extracted_text.slice(0, 5000);
        ctx += '\n\n';
      });
    }
  }

  // Rep notes
  if (d.context?.notes) {
    ctx += `### Rep Notes [SOURCE: REP_NOTES]\n${d.context.notes}\n\n`;
  }

  return ctx;
}

async function runSynthesis() {
  if (!deal || !deal.research) return;
  if (synthesizing) return;
  synthesizing = true;

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;

  renderLoading();

  try {
    const ctx = buildDealContext(deal);
    const prompt = `${ctx}

Based on the deal context above, generate a deal intelligence brief as JSON. Be specific — use the company name, reference actual evidence, name actual people where known.

Return ONLY valid JSON, no preamble, no markdown fences:
{
  "situation": "2-3 sentence verdict on where this deal stands right now. Lead with the most important thing.",
  "health": "green|yellow|red",
  "health_reason": "one sentence explaining the health rating",
  "value_case": "The single strongest ROI or business case angle for this deal — reference specific initiatives or metrics from the Value Map if available, otherwise derive from research. 1-2 sentences, specific and dollar-anchored where possible.",
  "stage_play": "What the rep must do at this exact stage to advance the deal. Be prescriptive — specific activities, specific people, specific asks. 2-3 sentences.",
  "priority_gaps": [
    { "gap": "short gap title", "severity": "high|medium|low", "evidence": "specific signal or quote supporting this", "action": "specific next step to address this" }
  ],
  "next_actions": [
    { "action": "specific action", "why": "why this matters right now", "priority": 1 }
  ],
  "coaching_pulse": ["behavioral coaching point 1", "coaching point 2", "coaching point 3"],
  "competitive_watch": "competitive exposure summary, or null if none"
}

Include 3-5 priority gaps (ranked high→low). Include 3-4 next actions. Keep coaching_pulse to 2-3 points maximum.`;

    const raw = await callClaude([{ role: 'user', content: prompt }], DEAL_COACH_BRAIN, 3000);
    synthesis = safeJSON(raw);

    if (!synthesis) throw new Error('Could not parse synthesis response');

    // Persist synthesis so the next visit loads instantly
    dealStore.patch(deal.id, 'research.deal_brief.dealHealthScore', synthesis.health || 'yellow');
    dealStore.patch(deal.id, 'win_room', { last_run: new Date().toISOString(), health: synthesis.health || 'yellow', synthesis });
    deal = dealStore.get(deal.id);

    renderTopbarHealth(synthesis.health);
    renderMain();
    // Reset stale state after successful run
    const dot = document.getElementById('staleDot');
    const lbl = document.getElementById('refreshBtnLabel');
    btn.classList.remove('stale');
    btn.classList.add('primary');
    if (dot) dot.style.display = 'none';
    if (lbl) lbl.textContent = 'Refresh Intel';
    btn.title = 'Refresh intelligence';

  } catch (err) {
    renderError(err.message);
  } finally {
    synthesizing = false;
    btn.classList.remove('spinning');
    btn.disabled = false;
  }
}

function renderMEDDPICC() {
  const q      = deal.qualification?.meddpicc;
  const db     = deal.research?.deal_brief;
  const qiqUrl = dealStore.urlFor('../qualify-iq/index.html', deal.id);

  const signals = {
    champion:         db?.championStatus,
    economic_buyer:   db?.economicBuyerStatus,
    decision_process: db?.decisionProcessClarity,
    competition:      db?.competitiveExposure,
  };

  function statusFromSignal(sig) {
    if (!sig || sig === 'Unknown') return 'unknown';
    const s = sig.toLowerCase();
    if (s.includes('strong') || s.includes('engaged') || s.includes('confirmed') || s.includes('clear')) return 'green';
    if (s.includes('weak') || s.includes('unknown') || s.includes('limited') || s.includes('none')) return 'red';
    return 'yellow';
  }

  const html = MEDDPICC_DIMS.map(dim => {
    let status = 'unknown', evidence = 'Not yet assessed', score = null, gaps = [];

    if (q?.[dim.key]) {
      score    = q[dim.key].score;
      evidence = q[dim.key].evidence || 'No evidence recorded';
      gaps     = q[dim.key].gaps    || [];
      status   = score >= 70 ? 'green' : score >= 40 ? 'yellow' : 'red';
    } else if (signals[dim.key]) {
      status   = statusFromSignal(signals[dim.key]);
      evidence = signals[dim.key];
    }

    const indClass   = `ind-${status}`;
    const scoreStr   = score !== null ? score : '—';
    const scoreColor = status==='green'?'var(--status-ok)':status==='red'?'var(--status-risk)':status==='yellow'?'var(--status-warn)':'var(--tfaint)';
    const shortNote  = evidence.length > 55 ? evidence.slice(0, 55) + '…' : evidence;
    const gapsHtml   = gaps.length
      ? `<div class="md-gaps"><span class="md-gap-label">Gaps</span>${gaps.map(g=>`<div class="md-gap-item">• ${g}</div>`).join('')}</div>`
      : '';

    return `<div class="md-row">
      <div class="meddpicc-item" onclick="toggleMEDDPICC('${dim.key}')">
        <div class="meddpicc-indicator ${indClass}"></div>
        <div class="meddpicc-dim">
          <div class="meddpicc-dim-label">${dim.label}</div>
          <div class="meddpicc-dim-note">${shortNote}</div>
        </div>
        <div class="meddpicc-score-badge" style="color:${scoreColor}">${scoreStr}</div>
        <div class="md-chevron" id="chev-${dim.key}">›</div>
      </div>
      <div class="md-detail" id="md-${dim.key}" style="display:none">
        <div class="md-evidence">${evidence}</div>
        ${gapsHtml}
        <a href="${qiqUrl}" class="md-edit-link">Edit in Qualify IQ →</a>
      </div>
    </div>`;
  }).join('');

  document.getElementById('meddpiccList').innerHTML = html;
}

function toggleMEDDPICC(key) {
  const detail = document.getElementById('md-' + key);
  const chev   = document.getElementById('chev-' + key);
  if (!detail) return;
  const opening = detail.style.display === 'none';
  detail.style.display = opening ? 'block' : 'none';
  if (chev) chev.textContent = opening ? '⌄' : '›';
}

function renderLoading() {
  document.getElementById('mainCol').innerHTML = `
    <div style="padding:20px 0;">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--amber);margin-bottom:16px;">Synthesizing Deal Intelligence</div>
      <div class="synthesis-loading">
        <div class="synthesis-step active"><div class="pulse-dot"></div> Analyzing deal context and research</div>
        <div class="synthesis-step" style="opacity:0.4">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Identifying priority gaps
        </div>
        <div class="synthesis-step" style="opacity:0.4">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Generating coaching brief
        </div>
      </div>
    </div>`;
}

function renderMain() {
  if (!synthesis) return;
  const s = synthesis;

  let html = '';

  // Situation
  html += `<div class="section">
    <div class="section-eyebrow">Situation</div>
    <div class="situation-card">
      <div class="situation-text">${renderWithBadges(s.situation)}</div>
      ${s.health_reason ? `<div class="health-reason">${renderWithBadges(s.health_reason)}</div>` : ''}
    </div>
  </div>`;

  // Value Case + Stage Play (side by side)
  if (s.value_case || s.stage_play) {
    html += `<div class="section" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">`;
    if (s.value_case) {
      html += `<div>
        <div class="section-eyebrow">Value Case</div>
        <div class="info-card" style="border-color:rgba(229,168,58,0.2);background:var(--amber-faint);">${renderWithBadges(s.value_case)}</div>
      </div>`;
    }
    if (s.stage_play) {
      html += `<div>
        <div class="section-eyebrow">Stage Play</div>
        <div class="info-card" style="border-color:rgba(59,130,246,0.2);background:rgba(59,130,246,0.05);">${renderWithBadges(s.stage_play)}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // Priority Gaps
  if (s.priority_gaps?.length) {
    html += `<div class="section">
      <div class="section-eyebrow">Priority Gaps</div>
      <div class="gap-list">
        ${s.priority_gaps.map(g => `
          <div class="gap-card">
            <div class="gap-severity ${severityClass(g.severity)}"></div>
            <div class="gap-body">
              <div class="gap-title">${renderWithBadges(g.gap)}</div>
              ${g.evidence ? `<div class="gap-evidence">${renderWithBadges(g.evidence)}</div>` : ''}
              ${g.action ? `<div class="gap-action">
                <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                ${renderWithBadges(g.action)}
              </div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  // Next Actions
  if (s.next_actions?.length) {
    html += `<div class="section">
      <div class="section-eyebrow">Next Actions</div>
      <div class="action-list">
        ${s.next_actions.map((a, i) => `
          <div class="action-item">
            <div class="action-num">${i+1}</div>
            <div class="action-body">
              <div class="action-text">${renderWithBadges(a.action)}</div>
              ${a.why ? `<div class="action-why">${renderWithBadges(a.why)}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  // Coaching Pulse — no badges, these are always coach opinion
  if (s.coaching_pulse?.length) {
    html += `<div class="section">
      <div class="section-eyebrow">Coaching Pulse</div>
      <div class="coaching-list">
        ${s.coaching_pulse.map(c => `
          <div class="coaching-item">
            <div class="coaching-pip"></div>
            <div class="coaching-text">${c}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  // Competitive Watch
  if (s.competitive_watch && s.competitive_watch !== 'null') {
    html += `<div class="section">
      <div class="section-eyebrow">Competitive Watch</div>
      <div class="info-card">${renderWithBadges(s.competitive_watch)}</div>
    </div>`;
  }

  // Recent News placeholder — populated by fetchRecentNews()
  html += `<div class="section" id="mainNewsSection" style="display:none">
    <div class="section-eyebrow">Recent News</div>
    <div class="news-list" id="mainNewsList"></div>
  </div>`;

  document.getElementById('mainCol').innerHTML = html;
}

function renderError(msg) {
  document.getElementById('mainCol').innerHTML = `
    <div class="state-screen">
      <div class="state-icon">⚠</div>
      <div class="state-title">Synthesis failed</div>
      <div class="state-sub">${msg}</div>
      <button class="btn-state" onclick="runSynthesis()">Try Again</button>
    </div>`;
}

function renderNoResearch() {
  document.getElementById('mainCol').innerHTML = `
    <div class="state-screen">
      <div class="state-icon">◈</div>
      <div class="state-title">Run Account Research first</div>
      <div class="state-sub">Win Room synthesizes from your deal's research data. Build the Account Brief for ${deal.context.account_name} to unlock deal intelligence.</div>
      <a class="btn-state" href="${dealStore.urlFor('../account-brief-v2/index.html', deal.id)}">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Build Account Brief
      </a>
    </div>`;
}

function renderNoDeal() {
  document.getElementById('mainCol').innerHTML = `
    <div class="state-screen">
      <div class="state-icon">◈</div>
      <div class="state-title">No deal selected</div>
      <div class="state-sub">Open Win Room from a deal card on the dashboard.</div>
      <a class="btn-state" href="../dashboard/">Go to Dashboard</a>
    </div>`;
  document.getElementById('sideCol').style.display = 'none';
}

// ── ACTIONS ────────────────────────────────────────────────────────────────────

function openQualifyIQ() {
  if (!deal) return;
  window.location.href = dealStore.urlFor('../qualify-iq/index.html', deal.id);
}

// ── INIT ──────────────────────────────────────────────────────────────────────

(async function init() {
  deal = dealStore.getFromUrl();

  if (!deal) {
    renderNoDeal();
    return;
  }

  renderTopbar();
  renderSidebar();

  if (!deal.research) {
    renderNoResearch();
    return;
  }

  // Load cached synthesis if available — no API call needed
  const cached = deal.win_room?.synthesis;
  if (cached) {
    synthesis = cached;
    renderTopbarHealth(synthesis.health);
    renderMain();
    // Show age on refresh button and check for new intel
    const lastRun = deal.win_room?.last_run;
    if (lastRun) {
      const mins = Math.round((Date.now() - new Date(lastRun)) / 60000);
      const age  = mins < 60 ? `${mins}m ago` : `${Math.round(mins/60)}h ago`;
      const btn  = document.getElementById('refreshBtn');
      const dot  = document.getElementById('staleDot');
      const lbl  = document.getElementById('refreshBtnLabel');
      const newIntel = deal.calls_updated_at && new Date(deal.calls_updated_at) > new Date(lastRun);
      if (newIntel && btn && dot && lbl) {
        btn.classList.remove('primary');
        btn.classList.add('stale');
        dot.style.display = 'block';
        lbl.textContent = 'New Intel — Refresh';
        btn.title = `New call intel uploaded after last synthesis (${age}) — click to incorporate`;
      } else if (btn) {
        btn.title = `Last run ${age} — click to refresh`;
      }
    }
  } else {
    await runSynthesis();
  }

  // Fetch recent news independently — uses 24h cache, non-blocking
  fetchRecentNews(deal).catch(() => {});
})();

</script>
</body>
</html>
