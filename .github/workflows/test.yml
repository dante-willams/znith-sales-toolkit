name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '0 14 * * 1-5'  # 9am ET, weekdays

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: npm run lint:stale-fns

  smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run test:smoke
        env:
          SMOKE_URL: https://znith-sales-toolkit.vercel.app
          TOOLKIT_PASSWORD: ${{ secrets.TOOLKIT_PASSWORD }}
      - name: Alert on smoke failure
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.SMOKE_ALERT_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            --data '{"text":"⚠️ *znith-sales-toolkit* smoke tests failed. <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}'
