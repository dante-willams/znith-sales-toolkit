name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '0 14 * * 1-5'  # 9am ET, weekdays

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: npm run lint:stale-fns

  smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run test:smoke
        env:
          SMOKE_URL: https://znith-sales-toolkit.vercel.app
          TOOLKIT_PASSWORD: ${{ secrets.TOOLKIT_PASSWORD }}
      # Failure alerts: GitHub emails the repo owner automatically on scheduled
      # workflow failures — no webhook needed. Confirm in GitHub Settings →
      # Notifications → Actions → "Send notifications for failed workflows".
